// ----- Practice -----
// Exam constants (EPSO AD/426/25 — Data MCQ)
const MCQ_EXAM_TOTAL = 30;
const MCQ_EXAM_DURATION_MS = 40 * 60 * 1000;

// opts: { mode: 'free_study'|'timed_exam'|'topic_drill', drillTopic: 'eu_regulation'|... }
function startPractice(opts){
  const settings = loadSettings();
  let pool = buildPool(settings);
  const mode = (opts && opts.mode) || 'free_study';
  const drillTopic = opts && opts.drillTopic;

  if(mode === 'topic_drill' && drillTopic){
    // Match either an MCQ topic slug (q.topic) OR an SJT sub-behaviour tag
    // (q.sub_behaviors array). Sub-behaviours live at reaction level, so if any
    // reaction of a scenario has the tag, that reaction is in pool — and its
    // siblings will be pulled in by advanceQuestion's set_id grouping.
    pool = pool.filter(q =>
      q.topic === drillTopic ||
      (Array.isArray(q.sub_behaviors) && q.sub_behaviors.includes(drillTopic))
    );
    if(pool.length === 0){ toast(`No questions found for "${drillTopic}"`); return; }
  }

  if(pool.length === 0){ toast('No questions match the current filter'); return; }

  // Timed exam: pick 30 random questions, lock the pool, set a global deadline
  let poolIds;
  let exam_deadline_ms = null;
  let exam_target_count = null;
  if(mode === 'timed_exam'){
    const shuffled = pool.slice();
    for(let i = shuffled.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    exam_target_count = Math.min(MCQ_EXAM_TOTAL, shuffled.length);
    poolIds = shuffled.slice(0, exam_target_count).map(q => q.id);
    exam_deadline_ms = Date.now() + MCQ_EXAM_DURATION_MS;
  } else {
    poolIds = pool.map(q => q.id);
  }

  SESSION = {
    mode,
    drillTopic: drillTopic || null,
    exam_deadline_ms,
    exam_target_count,
    exam_answers: [],          // for timed_exam results screen
    poolIds,
    picked: [],
    sjt_queue: [],
    currentQid: null,
    picked_letter: null,
    revealed: false,
    answered_count: 0,
    correct_count: 0,          // can be fractional for SJT (0.5 per partial)
    correct_in_time_count: 0,  // same
  };
  advanceQuestion();
}
function resumePractice(){
  const s = loadSession();
  if(!s){ render(); return; }
  SESSION = s;
  // Reset the per-question timer on resume — the saved q_started_ms is stale
  // (could be hours old). Only reset if not already revealed.
  if(!SESSION.revealed) SESSION.q_started_ms = Date.now();
  // SJT scenario: if there's one in progress and not revealed, give the user a
  // fresh scenario timer on resume (training rather than strict exam fidelity).
  // Existing ratings with their set_at_ms <= old deadline still count as in-time
  // via the snapshot already taken; any new ratings after resume are evaluated
  // against the new deadline.
  if(SESSION.sjt_scenario && !SESSION.sjt_scenario.revealed){
    const sc = SESSION.sjt_scenario;
    sc.started_ms = Date.now();
    sc.deadline_ms = Date.now() + (sc.duration_sec || SJT_SCENARIO_DURATION_SEC) * 1000;
    // Preserve snapshot_at_expiry if the timer had already expired before the pause.
  }
  MODE = 'practice';
  render();
}
async function exitPractice(){
  stopTimer();
  if(SESSION && SESSION.picked.length > 1) saveSession(SESSION);
  else clearSession();
  await promptSaveStats();
  SESSION = null;
  MODE = 'home';
  SCROLL_TARGET = 'top';
  render();
}
function stopTimer(){
  if(TIMER_ID){ clearInterval(TIMER_ID); TIMER_ID = null; }
}
// Scenario-level SJT timer. Ticks the remaining time in the header and, at deadline,
// freezes a snapshot of whatever was rated so far for "in time" credit. Does NOT auto-submit
// (per spec) — the user can keep rating or re-rating, the snapshot is already locked.
function startSjtTimer(){
  stopTimer();
  TIMER_ID = setInterval(() => {
    const sc = SESSION && SESSION.sjt_scenario;
    if(!sc || sc.revealed){ stopTimer(); return; }
    const rem = sc.deadline_ms - Date.now();
    const el = document.getElementById('sjt-scn-rem');
    const hdr = document.getElementById('sjt-scn-header');
    const stickyEl = document.getElementById('sjt-scn-rem-sticky');
    const stickyBar = document.getElementById('sjt-scn-bar-sticky');
    const remTxt = fmtTime(Math.max(0, rem));
    if(el) el.textContent = remTxt;
    if(stickyEl){
      stickyEl.textContent = remTxt;
      stickyEl.className = 'tmr';
      if(rem <= 0) stickyEl.classList.add('over');
      else if(rem < 30 * 1000) stickyEl.classList.add('warn');
    }
    if(stickyBar){
      const totalMs = (sc.duration_sec || 0) * 1000;
      const pct = totalMs > 0 ? Math.max(0, Math.min(100, (rem / totalMs) * 100)) : 0;
      stickyBar.style.width = pct + '%';
      stickyBar.className = 'time-bar';
      if(rem <= 0) stickyBar.classList.add('over');
      else if(pct < 20) stickyBar.classList.add('warn');
    }
    if(hdr){
      hdr.classList.remove('warn', 'over');
      if(rem <= 0) hdr.classList.add('over');
      else if(rem < 30 * 1000) hdr.classList.add('warn');
    }
    // Freeze the in-time snapshot at the deadline and persist.
    if(rem <= 0 && !sc.snapshot_at_expiry){
      takeSjtSnapshot();
    }
  }, 500);
}

function startTimer(){
  stopTimer();
  TIMER_ID = setInterval(() => {
    const el = document.getElementById('timer');
    const bar = document.getElementById('time-bar');
    if(!el || !SESSION || !SESSION.q_started_ms) return;
    const elapsed = Date.now() - SESSION.q_started_ms;
    const targetMs = effectiveTargetMs();
    const pct = Math.max(0, 100 - (elapsed / targetMs * 100));
    const remaining = Math.max(0, targetMs - elapsed);
    el.textContent = remaining > 0 ? fmtTime(remaining) : '-' + fmtTime(elapsed - targetMs);
    el.className = 'tmr';
    if(elapsed > targetMs) el.className = 'tmr over';
    else if(elapsed > targetMs * 0.8) el.className = 'tmr warn';
    if(bar){
      bar.style.width = pct + '%';
      bar.className = 'time-bar';
      if(pct <= 0) bar.className = 'time-bar over';
      else if(pct < 20) bar.className = 'time-bar warn';
    }

    // Timed exam: also update the global deadline banner + auto-end on expiry
    if(SESSION.mode === 'timed_exam' && SESSION.exam_deadline_ms){
      const rem = SESSION.exam_deadline_ms - Date.now();
      const banner = document.getElementById('exam-banner');
      const examTimerEl = document.getElementById('exam-timer');
      if(examTimerEl) examTimerEl.textContent = fmtTime(Math.max(0, rem));
      if(banner){
        banner.classList.remove('warn', 'over');
        if(rem <= 0) banner.classList.add('over');
        else if(rem < 5 * 60 * 1000) banner.classList.add('warn');
      }
      if(rem <= 0){
        stopTimer();
        MODE = 'results';
        SCROLL_TARGET = 'top';
        render();
      }
    }
  }, 500);
}
// SJT scenario defaults — real exam pacing (120s reading + 40s per extra reaction).
// For a 5-reaction scenario that is ~280s; we use 240s (4 min) as a slightly tighter default,
// rounded to a clean number. Can be extended per-scenario via target_sec on the question.
const SJT_SCENARIO_DURATION_SEC = 240;

// Start the grouped per-scenario SJT flow: situation at top, all reactions rated together,
// single scenario timer, reveal (with sub-behaviour tags) only after submit.
function startSjtScenario(siblings){
  const first = siblings[0];
  // Mark all siblings as picked so pickNext won't re-offer them until the scenario is done
  for(const s of siblings){ SESSION.picked.push(s.id); }
  // Allow a scenario to carry its own duration via the first reaction's target_sec
  // (interpreted as the scenario total, not per-reaction, in the new flow).
  const durationSec = typeof first.scenario_sec === 'number'
    ? first.scenario_sec
    : SJT_SCENARIO_DURATION_SEC;
  const now = Date.now();
  SESSION.sjt_scenario = {
    set_id: first.set_id,
    reaction_ids: siblings.map(s => s.id),
    started_ms: now,
    duration_sec: durationSec,
    deadline_ms: now + durationSec * 1000,
    ratings: {},              // { reactionId: { letter, set_at_ms } }
    snapshot_at_expiry: null, // { reactionId: letter }  — frozen at timer expiry
    revealed: false,
  };
  // Keep currentQid for legacy consumers; renderPractice branches on sjt_scenario first.
  SESSION.currentQid = first.id;
  SESSION.picked_letter = null;
  SESSION.revealed = false;
  saveSession(SESSION);
  MODE = 'practice';
  SCROLL_TARGET = 'top';
  render();
}

function pickSjtRating(reactionId, letter){
  const sc = SESSION && SESSION.sjt_scenario;
  if(!sc || sc.revealed) return;
  if(!sc.reaction_ids.includes(reactionId)) return;
  const now = Date.now();
  const prev = sc.ratings[reactionId];
  // Toggle-off if clicking the same letter again
  if(prev && prev.letter === letter){
    delete sc.ratings[reactionId];
  } else {
    sc.ratings[reactionId] = { letter, set_at_ms: now };
  }
  saveSession(SESSION);
  render();
}

// Snapshot of what was rated at deadline time — frozen, used for "in time" credit.
function takeSjtSnapshot(){
  const sc = SESSION && SESSION.sjt_scenario;
  if(!sc || sc.snapshot_at_expiry) return;
  const snap = {};
  for(const [rid, v] of Object.entries(sc.ratings)){
    // A rating counts as in-time if it was set on or before the deadline.
    if(v && typeof v.set_at_ms === 'number' && v.set_at_ms <= sc.deadline_ms){
      snap[rid] = v.letter;
    }
  }
  sc.snapshot_at_expiry = snap;
  saveSession(SESSION);
}

function submitSjtScenario(){
  const sc = SESSION && SESSION.sjt_scenario;
  if(!sc || sc.revealed) return;
  // If timer hasn't hit 0 yet, "in time" = everything currently rated.
  if(!sc.snapshot_at_expiry){
    const snap = {};
    for(const [rid, v] of Object.entries(sc.ratings)){
      if(v && v.letter) snap[rid] = v.letter;
    }
    sc.snapshot_at_expiry = snap;
  }

  // Per-reaction stats: final score from current rating, in-time score from snapshot.
  for(const rid of sc.reaction_ids){
    const q = DB.questions.find(x => x.id === rid);
    if(!q) continue;
    const final = sc.ratings[rid];
    const inTimeLetter = sc.snapshot_at_expiry[rid];
    const finalScore = final ? sjtScore(final.letter, q.correct) : 0;
    const inTimeScore = inTimeLetter ? sjtScore(inTimeLetter, q.correct) : 0;
    const withinTime = !!inTimeLetter;
    const elapsed = final ? Math.max(0, final.set_at_ms - sc.started_ms) : (sc.duration_sec * 1000);
    recordAnswer(rid, finalScore, elapsed, withinTime);
    SESSION.answered_count = (SESSION.answered_count || 0) + 1;
    SESSION.correct_count = (SESSION.correct_count || 0) + finalScore;
    // correct_in_time_count uses the in-time rating score (not the final) so that
    // re-rating late doesn't erode what you'd earned in time.
    if(withinTime) SESSION.correct_in_time_count = (SESSION.correct_in_time_count || 0) + inTimeScore;
  }

  sc.revealed = true;
  stopTimer();
  saveSession(SESSION);
  SCROLL_TARGET = 'top';
  render();
}

function advanceQuestion(){
  // Timed exam: stop at target count or when deadline is reached
  if(SESSION.mode === 'timed_exam'){
    const done = SESSION.answered_count >= (SESSION.exam_target_count || MCQ_EXAM_TOTAL);
    const expired = SESSION.exam_deadline_ms && Date.now() >= SESSION.exam_deadline_ms;
    if(done || expired){
      stopTimer();
      MODE = 'results';
      SCROLL_TARGET = 'top';
      render();
      return;
    }
  }

  // Finished an SJT scenario — clear it before picking the next.
  if(SESSION.sjt_scenario){
    SESSION.sjt_scenario = null;
  }

  const pool = DB.questions.filter(q => SESSION.poolIds.includes(q.id));
  const excluded = new Set(SESSION.picked);
  // Allow recycling once we've seen everything once in this session
  // (Except timed exam: ran through a fixed pool; when exhausted, end.)
  let next = pickNext(pool, excluded);
  if(!next && pool.length > 0 && SESSION.mode !== 'timed_exam'){
    SESSION.picked = [];          // recycle
    next = pickNext(pool, new Set());
  }
  if(!next){
    if(SESSION.mode === 'timed_exam'){
      stopTimer();
      MODE = 'results';
      SCROLL_TARGET = 'top';
      render();
      return;
    }
    stopTimer();
    toast('No more questions');
    promptSaveStats().finally(() => {
      MODE='home'; SESSION=null; clearSession(); render();
    });
    return;
  }

  // SJT: show all reactions of the situation together in the new per-scenario flow.
  if(next.type === 'sjt' && next.set_id){
    const siblings = DB.questions
      .filter(q => q.set_id === next.set_id)  // all siblings, not just pool — same scenario
      .sort((a,b) => a.id.localeCompare(b.id));
    startSjtScenario(siblings);
    return;
  }

  // Non-SJT: single-question flow (numerical, mcq).
  SESSION.picked.push(next.id);
  SESSION.currentQid = next.id;
  SESSION.picked_letter = null;
  SESSION.revealed = false;
  SESSION.q_started_ms = Date.now();
  SESSION.q_elapsed_ms = null;
  saveSession(SESSION);
  MODE = 'practice';
  SCROLL_TARGET = 'top';
  render();
}
function pickAnswer(letter){
  if(SESSION.revealed) return;
  SESSION.picked_letter = letter;
  render();
}
// Effective target time:
//   - SJT: 120s for the first reaction of a situation (reading + first answer), 40s for r2/r3/r4.
//     If a question carries its own `target_sec`, that value wins.
//   - Non-SJT: user-configurable default from settings.
function effectiveTargetMs(){
  const q = DB && SESSION ? DB.questions.find(x => x.id === SESSION.currentQid) : null;
  if(q && q.type === 'sjt'){
    if(typeof q.target_sec === 'number') return q.target_sec * 1000;
    return (SESSION.sjt_first_reaction ? 120 : 40) * 1000;
  }
  if(q && q.type === 'mcq'){
    if(typeof q.target_sec === 'number') return q.target_sec * 1000;
    return 80 * 1000;  // default 40min / 30Q = 80s per question
  }
  const base = (loadSettings().targetSec || 120) * 1000;
  return base;
}

// SJT partial scoring: exact = 1, ±1 neighbor = 0.5, else = 0
const SJT_SCALE = ['A','B','C','D','E'];  // -- - +/- + ++
function sjtScore(picked, correct){
  const pi = SJT_SCALE.indexOf(picked);
  const ci = SJT_SCALE.indexOf(correct);
  if(pi < 0 || ci < 0) return 0;
  const dist = Math.abs(pi - ci);
  if(dist === 0) return 1;
  if(dist === 1) return 0.5;
  return 0;
}

function submitAnswer(){
  if(!SESSION.picked_letter || SESSION.revealed) return;
  const q = DB.questions.find(x => x.id === SESSION.currentQid);
  const elapsed = Date.now() - (SESSION.q_started_ms || Date.now());
  const targetMs = effectiveTargetMs();
  const withinTime = elapsed <= targetMs;

  // SJT uses partial scoring (0 / 0.5 / 1); other types are 0 or 1
  let isCorrect;
  let sjtPts = null;
  let score;
  if(q.type === 'sjt'){
    sjtPts = sjtScore(SESSION.picked_letter, q.correct);
    score = sjtPts;
    isCorrect = sjtPts >= 1;  // only exact match counts as "correct" for pickNext tiering
  } else {
    isCorrect = SESSION.picked_letter === q.correct;
    score = isCorrect ? 1 : 0;
  }

  recordAnswer(q.id, score, elapsed, withinTime);
  SESSION.revealed = true;
  SESSION.q_elapsed_ms = elapsed;
  SESSION.q_within_time = withinTime;
  SESSION.q_sjt_pts = sjtPts;
  SESSION.answered_count++;
  // Credit: SJT partial = 0.5, SJT exact = 1, other correct = 1, else 0
  const credit = (sjtPts != null) ? sjtPts : (isCorrect ? 1 : 0);
  // Always add credit to correct count (even if over time)
  SESSION.correct_count = (SESSION.correct_count||0) + credit;
  // Only add credit to in-time if within time
  if(withinTime && credit > 0) SESSION.correct_in_time_count = (SESSION.correct_in_time_count||0) + credit;

  // Timed exam: keep a lightweight answer trail for the results screen
  if(SESSION.mode === 'timed_exam'){
    SESSION.exam_answers = SESSION.exam_answers || [];
    SESSION.exam_answers.push({
      qid: q.id,
      picked: SESSION.picked_letter,
      correct: q.correct,
      isCorrect,
      topic: q.topic || null,
      elapsed,
    });
  }

  stopTimer();
  saveSession(SESSION);
  SCROLL_TARGET = 'explanation';
  render();
}
// New SJT per-scenario renderer. Shows the situation once, then all N reactions with
// independent A–E rating rows, a single scenario timer, and a Submit-all button.
// Tags + expected-score badges + explanations are hidden until submit — so earlier
// reactions don't leak signal for later ones.
function renderSjtScenario(root){
  const sc = SESSION.sjt_scenario;
  const reactions = sc.reaction_ids.map(id => DB.questions.find(q => q.id === id)).filter(Boolean);
  if(reactions.length === 0){ MODE = 'home'; render(); return; }
  const first = reactions[0];
  const SJT_LABELS = {'A':'--','B':'-','C':'+/-','D':'+','E':'++'};
  const revealed = !!sc.revealed;

  // Compute remaining time and banner state.
  const now = Date.now();
  const remainingMs = Math.max(0, sc.deadline_ms - now);
  const expired = remainingMs <= 0;
  let hdrCls = 'sjt-scn-header';
  if(expired) hdrCls += ' over';
  else if(remainingMs < 30 * 1000) hdrCls += ' warn';

  const ratedCount = Object.keys(sc.ratings).length;
  const total = reactions.length;

  // --- Per-reaction card HTML ---
  const cardsHtml = reactions.map((q, i) => {
    const letter = sc.ratings[q.id] ? sc.ratings[q.id].letter : null;
    const setAt = sc.ratings[q.id] ? sc.ratings[q.id].set_at_ms : null;
    const ratedInTime = setAt != null && setAt <= sc.deadline_ms;
    const statusHtml = letter
      ? `<span class="status rated${ratedInTime ? '' : ' late'}">${ratedInTime ? 'Rated' : 'Rated (late)'} · ${esc(SJT_LABELS[letter] || letter)}</span>`
      : `<span class="status">Not rated</span>`;

    // Rating buttons A–E
    const btnHtml = ['A','B','C','D','E'].map(L => {
      let cls = 'sjt-btn';
      if(revealed){
        cls += ' dis';
        if(L === q.correct) cls += ' ok';
        else if(L === letter){
          const pts = sjtScore(letter, q.correct);
          cls += pts === 0.5 ? ' partial' : ' ko';
        }
        else cls += ' fd';
      } else if(L === letter){
        cls += ' sel';
      }
      return `<div class="${cls}" data-reaction="${esc(q.id)}" data-letter="${L}">${SJT_LABELS[L]}</div>`;
    }).join('');

    // Reveal body (explanation + correct + user score)
    let revealHtml = '';
    if(revealed){
      const finalLetter = letter;
      const finalPts = finalLetter ? sjtScore(finalLetter, q.correct) : 0;
      let cls, head;
      if(!finalLetter){
        cls = 'eko';
        head = `Not rated · correct answer: ${SJT_LABELS[q.correct]}`;
      } else if(finalPts >= 1){
        cls = 'eok';
        head = `✓ Exact — 1 pt · answer: ${SJT_LABELS[q.correct]}`;
      } else if(finalPts === 0.5){
        cls = 'epartial';
        head = `~ Voisin — 0.5 pt · answer: ${SJT_LABELS[q.correct]}`;
      } else {
        cls = 'eko';
        head = `✗ Incorrect — 0 pt · answer: ${SJT_LABELS[q.correct]}`;
      }
      // Per-reaction sub-behaviour tags (only available after submit).
      const tags = (q.sub_behaviors || []).map(t =>
        `<span class="tag">${esc(SUBB_LABELS[t] || t)}</span>`
      ).join('');
      const tagsHtml = tags ? `<div class="sjt-tags">${tags}</div>` : '';
      const expl = q.explanation
        ? `<div class="rbody">${esc(q.explanation).replace(/\n/g, '<br>')}</div>`
        : '';
      revealHtml = `<div class="sjt-reaction-reveal ${cls}">
        <div class="rhead">${head}</div>
        ${expl}
        ${tagsHtml}
      </div>`;
    }

    return `<div class="sjt-reaction" data-rid="${esc(q.id)}">
      <div class="sjt-reaction-hdr">
        <div class="num">${i + 1}</div>
        <div class="lbl">Réaction ${i + 1} / ${total}</div>
        ${statusHtml}
      </div>
      <div class="sjt-reaction-text">${esc((q.question || '').replace(/^RÉACTION\s+\d+\s*:\s*/i, ''))}</div>
      <div class="sjt-scores">${btnHtml}</div>
      ${revealHtml}
    </div>`;
  }).join('');

  // --- Scenario total (post-submit) ---
  let totalHtml = '';
  if(revealed){
    let finalSum = 0, inTimeSum = 0, ratedN = 0, inTimeN = 0;
    for(const q of reactions){
      const finalLetter = sc.ratings[q.id] ? sc.ratings[q.id].letter : null;
      const inTimeLetter = sc.snapshot_at_expiry ? sc.snapshot_at_expiry[q.id] : null;
      if(finalLetter){ finalSum += sjtScore(finalLetter, q.correct); ratedN++; }
      if(inTimeLetter){ inTimeSum += sjtScore(inTimeLetter, q.correct); inTimeN++; }
    }
    const finalDisp = Number.isInteger(finalSum) ? finalSum : finalSum.toFixed(1);
    const inTimeDisp = Number.isInteger(inTimeSum) ? inTimeSum : inTimeSum.toFixed(1);
    totalHtml = `<div class="sjt-scn-total">
      <div class="big">${finalDisp} / ${total}</div>
      <div class="sub">Final · ${ratedN}/${total} rated · In time: ${inTimeDisp}/${total} (${inTimeN} in time)</div>
    </div>`;
  }

  // --- Submit button state ---
  const canSubmit = ratedCount > 0 && !revealed;
  const allRated = ratedCount === total;
  const submitLbl = revealed ? 'Next scenario →' : (allRated ? 'Submit all' : `Submit (${ratedCount}/${total} rated)`);

  // Compact sticky countdown chip + shrinking bar (mirrors MCQ .tmr + .time-bar)
  // so both the remaining time and a visual depletion cue stay visible while
  // scrolling through the reaction list.
  const totalMs = (sc.duration_sec || 0) * 1000;
  let stickyTimerCls = 'tmr';
  if(expired) stickyTimerCls = 'tmr over';
  else if(remainingMs < 30 * 1000) stickyTimerCls = 'tmr warn';
  const stickyTimerTxt = revealed ? '—' : fmtTime(remainingMs);
  let stickyBarPct, stickyBarCls;
  if(revealed){
    stickyBarPct = 0;
    stickyBarCls = '';
  } else if(expired || totalMs <= 0){
    stickyBarPct = 0;
    stickyBarCls = 'over';
  } else {
    stickyBarPct = Math.max(0, Math.min(100, (remainingMs / totalMs) * 100));
    stickyBarCls = stickyBarPct < 20 ? 'warn' : '';
  }

  root.appendChild($(`
    <div class="practice">
      <div class="hdr">
        <div class="hdr-row">
          <div class="progress">Scenario · ${ratedCount}/${total} rated · ${Number.isInteger(SESSION.correct_count||0)?(SESSION.correct_count||0):(SESSION.correct_count||0).toFixed(1)}/${SESSION.answered_count||0} ✓</div>
          <div class="${stickyTimerCls}" id="sjt-scn-rem-sticky">${stickyTimerTxt}</div>
          <button class="exit" id="exit-btn">Exit</button>
        </div>
        <div class="time-bar-wrap"><div class="time-bar ${stickyBarCls}" id="sjt-scn-bar-sticky" style="width:${stickyBarPct}%"></div></div>
      </div>

      <div class="${hdrCls}" id="sjt-scn-header">
        <div>
          <div class="lbl">SJT Scenario</div>
          <div class="progress" style="font-size:12px;color:var(--sub);margin-top:2px">${esc(first.book_ref ? first.book_ref.replace(/ · Réaction.*$/, '') : sc.set_id)}</div>
        </div>
        <div>
          <div class="lbl" style="text-align:right">${revealed ? 'Finished' : (expired ? 'Time up' : 'Time left')}</div>
          <div class="rem" id="sjt-scn-rem">${revealed ? '—' : fmtTime(remainingMs)}</div>
        </div>
      </div>

      ${first.situation ? `<div class="sjt-situation"><div class="sjt-title">Situation</div>${esc(first.situation)}</div>` : ''}

      ${totalHtml}

      ${cardsHtml}

      <div class="sjt-scn-submit">
        ${revealed
          ? `<button class="btn btn-primary" id="sjt-next-btn">Next scenario →</button>`
          : `<button class="btn btn-primary" id="sjt-submit-btn" ${canSubmit ? '' : 'disabled'}>${submitLbl}</button>`}
      </div>
    </div>
  `));

  // Rating button clicks
  root.querySelectorAll('.sjt-btn[data-reaction]').forEach(el => {
    el.addEventListener('click', () => pickSjtRating(el.dataset.reaction, el.dataset.letter));
  });
  root.querySelector('#exit-btn').addEventListener('click', exitPractice);
  root.querySelector('#sjt-submit-btn')?.addEventListener('click', submitSjtScenario);
  root.querySelector('#sjt-next-btn')?.addEventListener('click', advanceQuestion);

  // Keep the scenario timer ticking only while not revealed.
  if(!revealed) startSjtTimer();
  else stopTimer();
}

function renderPractice(root){
  // SJT scenarios use the new grouped UI (all reactions on one page).
  if(SESSION && SESSION.sjt_scenario){
    return renderSjtScenario(root);
  }
  const q = DB.questions.find(x => x.id === SESSION.currentQid);
  if(!q){ MODE='home'; render(); return; }
  const stats = loadStats();
  const qs = stats[q.id] || { attempts:0, correct:0 };
  const settings = loadSettings();
  const targetMs = effectiveTargetMs();

  // SJT situation context
  let situationHtml = '';
  if(q.type === 'sjt' && q.situation){
    situationHtml = `<div class="sjt-situation">${esc(q.situation)}</div>`;
  }

  const figsHtml = (q.figures || []).map(f =>
    `<img class="qfig" src="${esc(f)}" alt="figure" loading="lazy">`
  ).join('');

  // SJT: compact horizontal score buttons; others: vertical option cards
  const SJT_LABELS = {'A':'--','B':'-','C':'+/-','D':'+','E':'++'};
  let optsHtml;
  if(q.type === 'sjt'){
    optsHtml = `<div class="sjt-scores">${q.options.map(o => {
      let cls = 'sjt-btn';
      if(SESSION.revealed){
        cls += ' dis';
        if(o.letter === q.correct) cls += ' ok';
        else if(o.letter === SESSION.picked_letter){
          if(SESSION.q_sjt_pts === 0.5) cls += ' partial';
          else cls += ' ko';
        }
        else cls += ' fd';
      } else if(o.letter === SESSION.picked_letter){
        cls += ' sel';
      }
      return `<div class="${cls}" data-letter="${esc(o.letter)}">${SJT_LABELS[o.letter] || esc(o.text)}</div>`;
    }).join('')}</div>`;
  } else {
    // MCQ is never shuffled: the per-option explanations reference specific
    // letters (A/B/C/D), so re-lettering would break the mapping.
    // Numerical is shuffled to prevent position memorisation; display letters
    // follow the shuffled position.
    const shouldShuffle = q.type !== 'mcq';
    let displayOpts;
    if(shouldShuffle){
      if(!SESSION.shuffledOpts || SESSION.shuffledOpts.qid !== q.id){
        SESSION.shuffledOpts = { qid: q.id, order: shuffle(q.options) };
      }
      displayOpts = SESSION.shuffledOpts.order;
    } else {
      displayOpts = q.options;
    }
    const letters = 'ABCDE';
    // On reveal for MCQ, inline each option's explanation directly below the
    // option so users can read rationale alongside the choice (not as a
    // separate block at the bottom).
    const showInlineExpl = SESSION.revealed && q.type === 'mcq' && !!q.explanations;
    optsHtml = displayOpts.map((o, i) => {
      const displayLetter = shouldShuffle ? letters[i] : o.letter;
      let cls = 'opt';
      if(SESSION.revealed){
        cls += ' dis';
        if(o.letter === q.correct) cls += ' ok';
        else if(o.letter === SESSION.picked_letter) cls += ' ko';
        else cls += ' fd';
      } else if(o.letter === SESSION.picked_letter){
        cls += ' sel';
      }
      let inlineExplHtml = '';
      if(showInlineExpl){
        const txt = q.explanations[o.letter] || '';
        const isRight = o.letter === q.correct;
        const isPicked = o.letter === SESSION.picked_letter;
        const ecls = isRight ? 'ok' : (isPicked ? 'ko' : 'neutral');
        const badge = isRight ? '✓' : (isPicked ? '✗' : '·');
        inlineExplHtml = `<div class="mcq-expl inline ${ecls}"><span class="lead">${badge} ${esc(o.letter)}</span><span class="txt">${esc(txt)}</span></div>`;
      }
      return `<div class="${cls}" data-letter="${esc(o.letter)}">
        <div class="ol">${displayLetter}</div>
        <div class="ot">${esc(o.text)}</div>
      </div>${inlineExplHtml}`;
    }).join('');
  }

  // Feedback with time info
  let explHtml = '';
  if(SESSION.revealed){
    const ok = SESSION.picked_letter === q.correct;
    const timeStr = fmtTime(SESSION.q_elapsed_ms);
    const lateTag = !SESSION.q_within_time ? ` · over target (${fmtTime(targetMs)})` : '';
    let head, explCls;
    if(q.type === 'sjt'){
      const pts = SESSION.q_sjt_pts;
      if(pts >= 1){
        head = `✓ Exact — 1 pt · ${timeStr}${lateTag}`;
        explCls = 'eok';
      } else if(pts === 0.5){
        head = `~ Voisin — 0.5 pt · answer: ${SJT_LABELS[q.correct]} · ${timeStr}${lateTag}`;
        explCls = 'epartial';
      } else {
        head = `✗ Incorrect — 0 pt · answer: ${SJT_LABELS[q.correct]} · ${timeStr}${lateTag}`;
        explCls = 'eko';
      }
    } else {
      const correctOpt = q.options.find(o => o.letter === q.correct);
      const correctText = correctOpt ? correctOpt.text : q.correct;
      if(ok && SESSION.q_within_time){ head = `✓ Correct in ${timeStr}`; explCls = 'eok'; }
      else if(ok){ head = `✓ Correct, but late — ${timeStr}${lateTag}`; explCls = 'eok'; }
      else { head = `✗ Incorrect — answer: ${esc(correctText)} · ${timeStr}${lateTag}`; explCls = 'eko'; }
    }

    const expl = q.explanation ? `<br>${esc(q.explanation).replace(/\n/g, '<br>')}` : '';
    // MCQ: per-option explanations are now rendered inline under each option,
    // so we only emit the header here.
    const explBody = q.type === 'mcq' ? '' : expl;
    explHtml = `<div class="expl ${explCls}"><strong>${head}</strong>${explBody}</div>`;
  }

  // Per-question history label (correct can be fractional for SJT partial credit)
  let accStr = '';
  if(qs.attempts > 0){
    const correctDisp = Number.isInteger(qs.correct) ? qs.correct : qs.correct.toFixed(1);
    accStr = ` · ${correctDisp}/${qs.attempts}`;
    if(qs.best_time_ms != null) accStr += ` · best ${fmtTime(qs.best_time_ms)}`;
  }

  // Timer display: countdown from target, or frozen remaining on reveal
  let initialTimer;
  if(SESSION.revealed){
    const rem = Math.max(0, targetMs - SESSION.q_elapsed_ms);
    initialTimer = rem > 0 ? fmtTime(rem) : '-' + fmtTime(SESSION.q_elapsed_ms - targetMs);
  } else {
    const e = Date.now() - (SESSION.q_started_ms || Date.now());
    const rem = Math.max(0, targetMs - e);
    initialTimer = rem > 0 ? fmtTime(rem) : '-' + fmtTime(e - targetMs);
  }
  let timerCls = 'tmr';
  let barPct, barCls;
  if(SESSION.revealed){
    if(!SESSION.q_within_time){ timerCls = 'tmr over'; barPct = 0; barCls = 'over'; }
    else { barPct = Math.max(0, 100 - (SESSION.q_elapsed_ms / targetMs * 100)); barCls = barPct < 20 ? 'warn' : ''; }
  } else {
    const e = Date.now() - (SESSION.q_started_ms || Date.now());
    barPct = Math.max(0, 100 - (e / targetMs * 100));
    barCls = barPct < 20 ? 'warn' : barPct <= 0 ? 'over' : '';
  }

  // Timed exam: global deadline banner
  let examBannerHtml = '';
  if(SESSION.mode === 'timed_exam' && SESSION.exam_deadline_ms){
    const rem = Math.max(0, SESSION.exam_deadline_ms - Date.now());
    const cls = rem <= 0 ? 'over' : (rem < 5 * 60 * 1000 ? 'warn' : '');
    const done = SESSION.answered_count;
    const target = SESSION.exam_target_count || MCQ_EXAM_TOTAL;
    examBannerHtml = `<div class="exam-banner ${cls}" id="exam-banner">
      <div><div class="lbl">Timed exam</div><div style="font-size:13px;color:var(--sub);margin-top:2px">Q ${done + (SESSION.revealed?0:1)} of ${target}</div></div>
      <div><div class="lbl" style="text-align:right">Remaining</div><div class="rem" id="exam-timer">${fmtTime(rem)}</div></div>
    </div>`;
  }

  // Topic + difficulty tags (MCQ)
  let tagsHtml = '';
  if(q.type === 'mcq'){
    const diff = (q.difficulty || '').toLowerCase();
    const topic = q.topic || '';
    const topicLabel = TOPIC_LABELS[topic] || topic.replace(/_/g, ' ');
    tagsHtml = `<div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
      ${topic ? `<span class="tag topic">${esc(topicLabel)}</span>` : ''}
      ${diff ? `<span class="tag ${esc(diff)}">${esc(diff)}</span>` : ''}
    </div>`;
  }

  root.appendChild($(`
    <div class="practice">
      <div class="hdr">
        <div class="hdr-row">
          <div class="progress">Q${SESSION.answered_count + (SESSION.revealed?0:1)} · ${Number.isInteger(SESSION.correct_count)?SESSION.correct_count:SESSION.correct_count.toFixed(1)}/${SESSION.answered_count} ✓ · ${Number.isInteger(SESSION.correct_in_time_count||0)?(SESSION.correct_in_time_count||0):(SESSION.correct_in_time_count||0).toFixed(1)}/${SESSION.answered_count} ⏱</div>
          <div class="${timerCls}" id="timer">${initialTimer}</div>
          <button class="exit" id="exit-btn">Exit</button>
        </div>
        <div class="time-bar-wrap"><div class="time-bar ${barCls}" id="time-bar" style="width:${barPct}%"></div></div>
      </div>
      ${examBannerHtml}
      ${tagsHtml}
      <div class="qmeta">
        <span class="qref">${esc(q.book_ref || '')}</span>
        <span>${esc(q.source)} · target ${fmtTime(targetMs)}${accStr}</span>
      </div>
      ${situationHtml}
      <div class="qfigs">${figsHtml}</div>
      ${q.question_html
        ? `<div class="qtext html-mode">${q.question_html}</div>`
        : `<div class="qtext">${esc(q.question || '')}</div>`
      }
      <div class="opts">${optsHtml}</div>
      ${explHtml}
      <div class="nav">
        ${!SESSION.revealed
          ? `<button class="btn btn-primary" id="submit-btn" ${SESSION.picked_letter ? '' : 'disabled'}>Submit</button>`
          : `<button class="btn btn-primary" id="next-btn">Next →</button>`}
      </div>
    </div>
  `));

  root.querySelectorAll('.opt, .sjt-btn').forEach(el => {
    el.addEventListener('click', () => pickAnswer(el.dataset.letter));
  });
  root.querySelector('#exit-btn').addEventListener('click', exitPractice);
  root.querySelector('#submit-btn')?.addEventListener('click', submitAnswer);
  root.querySelector('#next-btn')?.addEventListener('click', advanceQuestion);

  // Run the live ticker only while waiting for an answer
  if(!SESSION.revealed) startTimer();
  else stopTimer();
}

// ----- Results (timed exam end) -----
function renderResults(root){
  if(!SESSION){ MODE='home'; render(); return; }
  const answers = SESSION.exam_answers || [];
  const total = answers.length;
  const target = SESSION.exam_target_count || MCQ_EXAM_TOTAL;
  const correct = answers.filter(a => a.isCorrect).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const pass = correct >= 15;  // EPSO AD/426/25: 15/30 threshold
  const totalTime = answers.reduce((s, a) => s + (a.elapsed || 0), 0);

  // By-topic breakdown
  const byTopic = {};
  for(const a of answers){
    const t = a.topic || 'unknown';
    if(!byTopic[t]) byTopic[t] = { ok: 0, n: 0 };
    byTopic[t].n++;
    if(a.isCorrect) byTopic[t].ok++;
  }
  const topicRows = Object.keys(byTopic).sort().map(t => {
    const { ok, n } = byTopic[t];
    const p = Math.round(ok / n * 100);
    const barCls = p < 50 ? 'low' : (p < 75 ? 'med' : '');
    return `<div class="res-topic-row">
      <div class="tname">${esc(TOPIC_LABELS[t] || t)}</div>
      <div class="tscore">${ok}/${n} · ${p}%</div>
      <div class="res-topic-bar"><div class="${barCls}" style="width:${p}%"></div></div>
    </div>`;
  }).join('');

  // Wrong-answer review
  const wrongs = answers.filter(a => !a.isCorrect);
  const wrongsHtml = wrongs.map(a => {
    const q = DB.questions.find(x => x.id === a.qid);
    if(!q) return '';
    const correctOpt = q.options.find(o => o.letter === q.correct);
    const pickedOpt = q.options.find(o => o.letter === a.picked);
    const correctText = correctOpt ? correctOpt.text : q.correct;
    const pickedText = pickedOpt ? pickedOpt.text : (a.picked || '—');
    const why = (q.explanations && q.explanations[q.correct]) || q.explanation || '';
    return `<div class="res-item">
      <div class="q">${esc(q.question || '')}</div>
      <div class="ans">Your pick: <strong>${esc(a.picked || '—')}</strong> ${esc(pickedText)} · Correct: <strong>${esc(q.correct)}</strong> ${esc(correctText)}</div>
      <div class="exp">${esc(why)}</div>
    </div>`;
  }).join('');

  const expired = SESSION.exam_deadline_ms && Date.now() >= SESSION.exam_deadline_ms && total < target;
  const missedNote = expired ? ` · time ran out (${total}/${target} answered)` : '';

  root.appendChild($(`
    <div class="results">
      <button class="back-btn" id="results-back">← Back to home</button>
      <h1>Exam results</h1>
      <div class="sub">EPSO AD/426/25 · timed mode · ${fmtTime(totalTime)} used${missedNote}</div>

      <div class="res-score">
        <div class="big">${correct}/${target}</div>
        <div class="pct">${pct}% correct</div>
        <div class="pass ${pass ? 'ok' : 'ko'}">${pass ? '✓ Pass threshold (≥ 15/30)' : '✗ Below pass threshold (15/30)'}</div>
      </div>

      <div class="section">
        <h3>Accuracy by topic</h3>
        ${topicRows || '<div style="font-size:13px;color:var(--muted)">No answers recorded.</div>'}
      </div>

      ${wrongs.length ? `<div class="res-review">
        <h3>Review · wrong answers (${wrongs.length})</h3>
        ${wrongsHtml}
      </div>` : ''}
    </div>
  `));

  root.querySelector('#results-back').addEventListener('click', async () => {
    // Persist stats (already recorded per-question); clear session.
    clearSession();
    await promptSaveStats();
    SESSION = null;
    MODE = 'home';
    SCROLL_TARGET = 'top';
    render();
  });
}

// ============================================================================
// Init
// ============================================================================
async function init(){
  // QUESTIONS_DB is set by unlockApp() after a successful bundle decrypt.
  if(!window.QUESTIONS_DB){
    document.getElementById('root').innerHTML = `
      <div class="empty">
        <h2>No question bundle loaded</h2>
        <p style="font-size:13px;margin-top:8px">
          Make sure the encrypted bundles are next to <code>index.html</code>:
          <code>questions.owner.enc.js</code> and <code>questions.friend.enc.js</code>.<br><br>
          To regenerate after editing the source, run<br>
          <code>PT_OWNER_PASS=… PT_FRIEND_PASS=… node tools/build-bundles.js</code>.
        </p>
      </div>`;
    return;
  }
  DB = window.QUESTIONS_DB;

  // One-time cleanup: purge stats for removed old SJT questions
  const CLEANUP_KEY = 'pt_sjt_cleanup_v2';
  if(!localStorage.getItem(CLEANUP_KEY)){
    const stats = loadStats();
    const validIds = new Set(DB.questions.map(q => q.id));
    let purged = 0;
    for(const id of Object.keys(stats)){
      if(!validIds.has(id)){ delete stats[id]; purged++; }
    }
    if(purged) saveStats(stats);
    localStorage.setItem(CLEANUP_KEY, '1');
  }

  // Ask the user whether to load stats from the default file. Confirm() runs
  // before first render so the home screen opens with fresh data.
  await promptLoadStats();
  // Any dirty-flag flip from init-time cleanup or merge is not user-driven —
  // start the session with a clean slate so we don't prompt to save on exit
  // unless the user actually answered something.
  STATS_DIRTY = false;

  // Browser back/forward → sync MODE. Mid-quiz back is guarded by a confirm.
  window.addEventListener('popstate', async (e) => {
    const newMode = (e.state && e.state.mode) || 'home';
    if(newMode === MODE) return;

    // Leaving an in-progress quiz: ask before discarding the screen.
    // Session itself is kept in localStorage so the user can resume from home.
    const midQuiz = MODE === 'practice' && SESSION &&
      ((SESSION.answered_count || 0) > 0 || SESSION.picked_letter);
    if(midQuiz){
      const ok = await confirmModal({
        title: 'Leave this exercise?',
        body: `Your progress is saved — you can resume later from the home screen.<div class="modal-hint">Use the in-app Exit button if you want to finish the quiz properly.</div>`,
        icon: '←', okLabel: 'Leave', cancelLabel: 'Stay',
      });
      if(!ok){
        // Re-push a matching entry so the URL reflects where we actually are.
        history.pushState({ mode: MODE }, '', '#' + MODE);
        return;
      }
    }

    MODE = newMode;
    SCROLL_TARGET = 'top';
    render();
  });

  render();
}
// init() is invoked from unlockApp() once a bundle has been decrypted.
</script>
</body>
</html>
