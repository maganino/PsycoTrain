<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PsycoTrain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F4; --card:#fff; --border:#E4E2DA;
  --text:#1a1a18; --muted:#888; --sub:#3d3d3a;
  --accent:#185FA5; --accentbg:#E6F1FB; --accentbdr:#85B7EB;
  --green:#0F6E56; --greenbg:#E1F5EE; --greenbdr:#5DCAA5;
  --red:#A32D2D; --redbg:#FCEBEB; --redbdr:#F09595;
  --amber:#854F0B; --amberbg:#FAEEDA;
}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-text-size-adjust:100%}
.container{max-width:760px;margin:0 auto;padding:14px 16px 90px}

/* Home */
.home h1{font-size:24px;font-weight:800;margin:6px 0 2px}
.home .sub{font-size:13px;color:var(--muted);margin-bottom:14px}
.stats-row{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.stat-chip{flex:1;min-width:90px;background:var(--card);border:1px solid var(--border);padding:10px 12px;border-radius:12px;text-align:center;transition:background .2s,border-color .2s}
.stat-chip strong{display:block;font-size:18px;color:var(--accent)}
.stat-chip .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.stat-chip .trend-arrow{font-size:12px;margin-left:4px;vertical-align:1px;font-weight:700}
/* Progress-trend tints: compared to the last saved-stats snapshot */
.stat-chip.trend-up{background:var(--greenbg);border-color:var(--green)}
.stat-chip.trend-up strong{color:var(--green)}
.stat-chip.trend-down{background:var(--redbg);border-color:var(--red)}
.stat-chip.trend-down strong{color:var(--red)}
.stat-chip.trend-flat .trend-arrow{color:var(--muted)}

.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.section h3{font-size:13px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 12px;border-radius:999px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.dis{opacity:.4;cursor:not-allowed}
.toggle-row{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--sub);font-weight:600}
.toggle{position:relative;width:42px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(18px)}

.actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.btn{padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:disabled{background:var(--muted);cursor:not-allowed}
.btn-secondary{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.btn-small{padding:9px 14px;font-size:13px;font-weight:600}

/* Practice */
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 10px;border-bottom:1px solid var(--border);margin:-14px -16px 12px;padding-left:16px;padding-right:16px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.hdr .progress{font-size:13px;color:var(--muted);font-weight:600}
.hdr .exit{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub)}
.tmr{font-family:'Courier New',monospace;font-size:15px;font-weight:700;color:var(--green);background:var(--greenbg);padding:5px 11px;border-radius:8px}
.tmr.warn{color:var(--amber);background:var(--amberbg)}
.tmr.over{color:var(--red);background:var(--redbg)}
.time-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.time-bar{height:100%;border-radius:3px;transition:width .5s linear,background .3s;background:var(--green)}
.time-bar.warn{background:var(--amber)}
.time-bar.over{background:var(--red)}
.timecfg{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--sub);font-weight:600}
.timecfg input{width:64px;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);font-family:inherit;font-size:14px;font-weight:600;text-align:center}
.timetag{font-size:11px;color:var(--muted);margin-left:6px}
.timetag.over{color:var(--amber)}
.qmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px}
.qref{background:#EEEDFE;padding:2px 9px;border-radius:20px;font-size:10px;color:#534AB7;font-weight:600;letter-spacing:.3px}
.qfigs img{width:100%;max-width:100%;border-radius:10px;display:block;border:1px solid var(--border);margin-bottom:8px;background:#fff}
.qtext{font-size:15px;font-weight:600;margin:10px 0 12px;line-height:1.45;white-space:pre-wrap}
.qtext.html-mode{white-space:normal}
.q-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;font-weight:400}
.q-table th,.q-table td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.q-table th{background:var(--bg);font-weight:700;font-size:13px;color:var(--accent)}
.q-table td{background:var(--card)}
/* SJT situation box */
.sjt-situation{font-size:14px;line-height:1.65;color:var(--sub);padding:14px 16px;background:var(--card);border-radius:12px;border-left:3.5px solid #534AB7;margin-bottom:14px}
.sjt-situation .sjt-title{font-weight:700;font-size:13px;color:#534AB7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
/* SJT compact score row */
.sjt-scores{display:flex;gap:8px;justify-content:center;margin:14px 0}
.sjt-btn{flex:1;max-width:80px;padding:12px 6px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-size:15px;font-weight:700;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s,background .15s,transform .08s;color:var(--sub)}
.sjt-btn:active:not(.dis){transform:scale(.95)}
.sjt-btn.sel{border-color:var(--accent);background:var(--accentbg);color:var(--accent)}
.sjt-btn.ok{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.sjt-btn.ko{border-color:var(--red);background:var(--redbg);color:var(--red)}
.sjt-btn.partial{border-color:#E0B860;background:var(--amberbg);color:var(--amber)}
.sjt-btn.fd{opacity:.4}
.sjt-btn.dis{cursor:default}
.opt{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-radius:12px;border:2px solid var(--border);background:var(--card);margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .08s,border-color .15s,background .15s}
.opt:active:not(.dis){transform:scale(.985)}
.opt.sel{border-color:var(--accent);background:var(--accentbg)}
.opt.ok{border-color:var(--green);background:var(--greenbg)}
.opt.ko{border-color:var(--red);background:var(--redbg)}
.opt.fd{opacity:.55}
.opt.dis{cursor:default}
.ol{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);font-weight:700;font-size:13px;flex-shrink:0;margin-top:1px}
.opt.sel .ol{background:var(--accent);color:#fff;border-color:var(--accent)}
.opt.ok .ol{background:var(--green);color:#fff;border-color:var(--green)}
.opt.ko .ol{background:var(--red);color:#fff;border-color:var(--red)}
.ot{font-size:14px;flex:1;line-height:1.4}
.expl{padding:13px 14px;border-radius:12px;margin-top:12px;font-size:13px;line-height:1.55;white-space:pre-wrap}
.expl.eok{background:var(--greenbg);border:1px solid var(--greenbdr);color:#0a4f3d}
.expl.epartial{background:var(--amberbg);border:1px solid #E0B860;color:#6B4A0A}
.expl.eko{background:var(--redbg);border:1px solid var(--redbdr);color:#7a1f1f}
.opt.partial{border-color:#E0B860;background:var(--amberbg)}
.opt.partial .ol{background:#BA7517;color:#fff;border-color:#BA7517}
.expl strong{font-weight:700}

.nav{display:flex;gap:8px;margin-top:14px}
.nav .btn{flex:1}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;z-index:100;pointer-events:none}
.toast.show{opacity:.95}

/* Modal (pretty confirm dialog replacing native window.confirm) */
.modal-backdrop{position:fixed;inset:0;background:rgba(26,26,24,0.48);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;opacity:0;pointer-events:none;transition:opacity .18s ease-out}
.modal-backdrop[data-open]{opacity:1;pointer-events:auto}
.modal-card{background:var(--card);border-radius:16px;max-width:360px;width:100%;padding:22px 22px 16px;box-shadow:0 16px 50px rgba(0,0,0,0.3),0 2px 8px rgba(0,0,0,0.1);border:1px solid var(--border);transform:translateY(8px) scale(0.97);transition:transform .18s ease-out;opacity:0}
.modal-backdrop[data-open] .modal-card{transform:translateY(0) scale(1);opacity:1}
.modal-icon{width:48px;height:48px;border-radius:50%;background:var(--accentbg);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 10px;line-height:1}
.modal-icon.danger{background:var(--redbg);color:var(--red)}
.modal-title{font-size:16px;font-weight:800;text-align:center;margin-bottom:6px;color:var(--text)}
.modal-body{font-size:13.5px;color:var(--sub);line-height:1.55;text-align:center;margin-bottom:18px}
.modal-hint{font-size:11.5px;color:var(--muted);margin-top:8px;font-style:italic}
.modal-actions{display:flex;gap:8px}
.modal-actions .btn{flex:1;padding:12px 10px;font-size:14px}
.btn-danger{background:var(--red);color:#fff}

/* Per-type stats */
.type-stats-section .stats-row{margin:6px 0 0}
.type-stats-section .stat-chip{min-width:70px;padding:8px 10px}
.type-stats-section .stat-chip strong{font-size:15px}
.type-stats-section .hdr-row{display:flex;justify-content:space-between;align-items:center}
.btn-reset{padding:5px 10px;border-radius:8px;border:1.5px solid var(--redbdr);background:var(--redbg);color:var(--red);font-size:11px;font-weight:600;cursor:pointer}
.btn-reset:hover{background:var(--red);color:#fff}

/* Compact home (v2) */
.dash-stats{display:flex;gap:8px;margin:10px 0 10px;flex-wrap:wrap}
.dash-stats .stat-chip{flex:1;min-width:100px;padding:12px 10px}

.pl-bar{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;padding:2px 2px 8px;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.pl-bar .chip{flex:0 0 auto;white-space:nowrap}

.action-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ia-btn{width:38px;height:38px;border-radius:999px;border:1.5px solid var(--border);background:var(--card);font-size:16px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s,color .15s;color:var(--sub);padding:0;flex-shrink:0}
.ia-btn:hover{border-color:var(--accent);color:var(--accent)}
.ia-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ia-btn.danger{border-color:var(--redbdr);color:var(--red)}
.ia-btn.danger:hover{background:var(--redbg);color:var(--red);border-color:var(--red)}
.ia-btn.warn-tri{color:var(--amber);font-size:18px}
.ia-btn.warn-tri.on{color:#fff;background:var(--amber);border-color:var(--amber)}

.time-slider-wrap{flex:1;display:flex;align-items:center;gap:10px;padding:6px 14px;border:1.5px solid var(--border);border-radius:999px;background:var(--card);min-width:180px;height:38px}
.time-slider-wrap input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:4px;min-width:80px}
.time-slider-wrap .tval{font-family:'Courier New',monospace;font-size:12px;font-weight:700;color:var(--accent);min-width:44px;text-align:right}

.start-row{display:flex;gap:8px;margin-top:10px}
.start-row .btn{flex:1}

.mini-row{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.ia-mini{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:14px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s,background .15s}
.ia-mini:hover{color:var(--accent);border-color:var(--accent)}
.ia-mini.danger:hover{color:var(--red);border-color:var(--red);background:var(--redbg)}

/* MCQ compact section (modes + drill + topic stats under the action row) */
.mcq-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.mcq-section .mode-grid{margin-top:0;margin-bottom:0}
.mcq-section .drill-pick{margin-top:8px}
.mcq-section .topic-stats{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* Empty state */
.empty{text-align:center;padding:30px 16px;color:var(--muted)}
.empty h2{font-size:18px;color:var(--text);margin-bottom:6px}

@media(max-width:380px){
  .container{padding:12px 12px 90px}
  .qtext{font-size:14px}
  .ot{font-size:13px}
  .stat-chip{min-width:75px;padding:8px 8px}
  .stat-chip strong{font-size:16px}
}
/* Lock screen */
#lockscreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
#lockscreen.hidden{display:none}
.lock-box{text-align:center;padding:24px;max-width:320px;width:100%}
.lock-box h1{font-size:22px;font-weight:800;margin-bottom:4px}
.lock-box .lock-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.lock-box input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--card);font-family:inherit;text-align:center}
.lock-box input:focus{outline:none;border-color:var(--accent)}
.lock-box button{width:100%;margin-top:10px;padding:13px;border-radius:10px;border:none;background:var(--text);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.lock-box .lock-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.lock-box.shake{animation:shake .4s}

/* Guide page */
.guide{max-width:700px;margin:0 auto}
.guide h1{font-size:22px;font-weight:800;margin:6px 0 4px}
.guide .back-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub);margin-bottom:12px;display:inline-block}
.guide h2{font-size:16px;font-weight:700;color:var(--accent);margin:18px 0 8px;padding-bottom:4px;border-bottom:1.5px solid var(--border)}
.guide h3{font-size:14px;font-weight:700;color:var(--sub);margin:14px 0 6px}
.guide p,.guide li{font-size:14px;line-height:1.6;color:var(--sub)}
.guide ul{padding-left:18px;margin:6px 0}
.guide li{margin-bottom:4px}
.guide .score-tag{display:inline-block;padding:2px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-right:4px}
.guide .score-pp{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr)}
.guide .score-p{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.guide .score-n{background:var(--amberbg);color:var(--amber);border:1px solid #e0b860}
.guide .score-m{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.guide .score-mm{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr)}
.flow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:12px 0;overflow-x:auto}
.flow-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding:10px 12px;border-radius:10px;border-left:3.5px solid var(--accent);background:var(--bg)}
.flow-step.red{border-left-color:var(--red)}
.flow-step.green{border-left-color:var(--green)}
.flow-step.amber{border-left-color:var(--amber)}
.flow-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flow-step.red .flow-num{background:var(--red)}
.flow-step.green .flow-num{background:var(--green)}
.flow-step.amber .flow-num{background:var(--amber)}
.flow-body{flex:1;font-size:13px;line-height:1.55}
.flow-body strong{color:var(--text)}
.flow-arrow{text-align:center;color:var(--muted);font-size:18px;margin:2px 0}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.comp-card h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.comp-card ul{padding-left:14px;margin:0}
.comp-card li{font-size:12px;line-height:1.5;color:var(--sub);margin-bottom:2px}
.comp-card.primary{border-color:var(--accentbdr);background:var(--accentbg)}
@media(max-width:500px){.comp-grid{grid-template-columns:1fr}}

/* Quick decision flowchart (visual) */
.qflow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 12px;margin:12px 0}
.qflow-row{display:flex;justify-content:center;align-items:stretch;gap:8px;margin-bottom:6px}
.qflow-q{flex:1;max-width:280px;background:var(--accentbg);border:2px solid var(--accentbdr);border-radius:12px;padding:12px 10px;text-align:center}
.qflow-q .acr{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.6px;margin-bottom:2px}
.qflow-q .ttl{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.qflow-q .hint{font-size:11px;color:var(--muted);line-height:1.35}
.qflow-fail{flex:0 0 90px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-size:11px;color:var(--muted);font-weight:600}
.qflow-fail .arr{font-size:18px;color:var(--muted);margin-bottom:2px}
.qflow-fail .badge{display:inline-block;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:800;border:2px solid}
.qflow-fail .badge.mm{background:var(--redbg);color:var(--red);border-color:var(--redbdr)}
.qflow-fail .badge.m{background:#fff3e0;color:#e65100;border-color:#ffcc80}
.qflow-fail .badge.n{background:var(--amberbg);color:var(--amber);border-color:#e0b860}
.qflow-fail .badge.p{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.qflow-fail .badge.pp{background:var(--greenbg);color:var(--green);border-color:var(--greenbdr)}
.qflow-down{text-align:center;color:var(--accent);font-size:22px;font-weight:700;margin:2px 0;line-height:1}
.qflow-final{text-align:center;margin-top:8px}
.qflow-final .badge{display:inline-block;padding:8px 18px;border-radius:10px;font-size:16px;font-weight:800;background:var(--greenbg);color:var(--green);border:2px solid var(--greenbdr)}
@media(max-width:500px){
  .qflow-row{flex-direction:column;align-items:center}
  .qflow-fail{flex:0 0 auto;flex-direction:row;gap:8px;margin-top:4px}
  .qflow-fail .arr{transform:rotate(90deg);margin:0}
}

/* New SJT per-scenario view: situation + N reactions rated together, submit at end */
.sjt-scn-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:12px}
.sjt-scn-header .lbl{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;flex:1}
.sjt-scn-header .progress{font-size:12px;font-weight:600;color:var(--sub)}
.sjt-scn-header .rem{font-family:'Courier New',monospace;font-size:20px;font-weight:800;color:var(--accent)}
.sjt-scn-header.warn{background:var(--amberbg);border-color:#e0b860}
.sjt-scn-header.warn .lbl,.sjt-scn-header.warn .rem{color:var(--amber)}

<body>

<!-- Lock screen -->
<div id="lockscreen">
  <div class="lock-box" id="lockbox">
    <h1>PsycoTrain</h1>
    <p class="lock-sub">Enter password to continue</p>
    <input type="password" id="lock-pw" placeholder="Password" autocomplete="off" autofocus>
    <button id="lock-btn">Unlock</button>
    <p class="lock-err" id="lock-err"></p>
  </div>
</div>

<!-- App (hidden until unlocked) -->
<div class="container" id="root" style="display:none"></div>
<div class="toast" id="toast"></div>
<input type="file" id="stats-file-input" accept=".json,application/json" style="display:none">

<!-- Encrypted question bundles. Each is a small JS file assigning base64'd
     {salt, iv, ct, iter} to window.__BUNDLES.<role>. The lock screen derives
     a key from the typed password and decrypts the matching bundle in the
     browser via WebCrypto. Plaintext questions.js is no longer shipped. -->
<script src="./questions.owner.enc.js"></script>
<script src="./questions.friend.enc.js"></script>
<script>
'use strict';

// ============================================================================
// Lock screen — password decrypts the matching bundle (no plaintext shipped)
// ============================================================================
// Each bundle is loaded as a separate <script> tag and lives at
// window.__BUNDLES.<role> = { salt, iv, ct, iter } (all base64). Trying every
// available bundle with the typed password is what determines the role: a
// successful AES-GCM decrypt = right password = that role. Wrong passwords
// fail with an auth error, which we surface as "Wrong password".
const LS_UNLOCK = 'pt_unlocked';   // value: 'owner' | 'friend' (the unlocked role)
const SS_PW     = 'pt_pw';         // session-only: cached password for tab reload
const FRIEND_PLAYLIST_KEY = 'BOSA_SJT_BA_CRIT';

function currentRole() {
  const v = sessionStorage.getItem(LS_UNLOCK);
  return (v === 'friend' || v === 'owner') ? v : null;
}
function isFriend() { return currentRole() === 'friend'; }

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function decryptBundle(bundle, password) {
  const salt = b64ToBytes(bundle.salt);
  const iv   = b64ToBytes(bundle.iv);
  const ct   = b64ToBytes(bundle.ct);
  const baseKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: bundle.iter, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false, ['decrypt']
  );
  const ptBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(ptBuf));
}

function showLockError(msg) {
  document.getElementById('lock-err').textContent = msg;
  const box = document.getElementById('lockbox');
  box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
}

async function unlockApp(role, db) {
  window.QUESTIONS_DB = db;
  sessionStorage.setItem(LS_UNLOCK, role);
  document.getElementById('lockscreen').classList.add('hidden');
  document.getElementById('root').style.display = '';
  await init();
}

// Try every available bundle against the password; first one that decrypts wins.
async function attemptUnlock(password) {
  const bundles = window.__BUNDLES || {};
  // Try friend before owner so a friend password isn't shadowed by an
  // (incredibly unlikely) collision; matters zero in practice.
  for (const role of ['friend', 'owner']) {
    if (!bundles[role]) continue;
    try {
      const db = await decryptBundle(bundles[role], password);
      sessionStorage.setItem(SS_PW, password);
      await unlockApp(role, db);
      return true;
    } catch (_) { /* wrong key for this bundle — try next */ }
  }
  return false;
}

async function tryUnlock() {
  const pw = document.getElementById('lock-pw').value;
  if (!pw) return;
  const ok = await attemptUnlock(pw);

// Fisher-Yates shuffle (returns new array)
function shuffle(arr){ const a = [...arr]; for(let i = a.length-1; i > 0; i--){ const j = Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ----- Progress snapshot -----
// Shape: { global: {accuracy, accuracyInTime, avgCorrectMs},
//          byPlaylist: { [key]: {accuracy, accuracyInTime, avgCorrectMs} } }
function loadDashSnapshot(){ return lsGet(LS_SNAPSHOT) || { global: null, byPlaylist: {} }; }
function saveDashSnapshot(snap){ return lsSet(LS_SNAPSHOT, snap); }
// Re-aggregate stats to produce the same numbers renderHome shows, so a later
// diff against the live dashboard is apples-to-apples.
function computeDashSnapshot(){
  const stats = loadStats();
  const out = { global: null, byPlaylist: {} };
  let gA = 0, gSum = 0, gSumIT = 0, gBestSum = 0, gBestCount = 0;
  const bySrc = {};
  for(const q of (DB && DB.questions) || []){
    const s = stats[q.id];
    if(s && s.attempts > 0){
      gA++;
      const sc = statScore(s);
      gSum += sc;
      if(s.last_within_time) gSumIT += sc;
    }
    if(s && s.best_time_ms != null){
      gBestSum += s.best_time_ms;
      gBestCount++;
    }
    if(!bySrc[q.source]) bySrc[q.source] = {a:0, sum:0, sumIT:0, bestSum:0, bestCount:0};
    if(s && s.attempts > 0){
      bySrc[q.source].a++;
      const sc = statScore(s);
      bySrc[q.source].sum += sc;
      if(s.last_within_time) bySrc[q.source].sumIT += sc;
    }
    if(s && s.best_time_ms != null){
      bySrc[q.source].bestSum += s.best_time_ms;
      bySrc[q.source].bestCount++;
    }
  }
  out.global = {
    accuracy: gA > 0 ? Math.round(gSum / gA * 100) : 0,
    accuracyInTime: gA > 0 ? Math.round(gSumIT / gA * 100) : 0,
    avgCorrectMs: gBestCount > 0 ? gBestSum / gBestCount : null,
  };
  for(const k of Object.keys(bySrc)){
    const v = bySrc[k];
    out.byPlaylist[k] = {
      accuracy: v.a > 0 ? Math.round(v.sum / v.a * 100) : 0,
      accuracyInTime: v.a > 0 ? Math.round(v.sumIT / v.a * 100) : 0,
      avgCorrectMs: v.bestCount > 0 ? v.bestSum / v.bestCount : null,
    };
  }
  return out;
}
// Classify delta: higher-is-better for accuracy, lower-is-better for time.
// Returns 'up' | 'down' | 'flat' | 'new' (no baseline yet).
function trendClass(current, baseline, lowerIsBetter){
  if(baseline == null || current == null) return 'new';
  const eps = lowerIsBetter ? 500 : 1;  // 0.5s or 1 percentage point
  const diff = current - baseline;
  if(Math.abs(diff) < eps) return 'flat';
  const better = lowerIsBetter ? diff < 0 : diff > 0;
  return better ? 'up' : 'down';
}

// ----- Per-question stats -----
function qStat(qid){
  return loadStats()[qid] || {
    attempts:0, correct:0, correct_within_time:0,
    last_correct:null, last_within_time:null,
    last_time_ms:null, best_time_ms:null, last_ts:0
  };
}
// score: 0..1 (SJT can be 0 / 0.5 / 1, others are 0 or 1)
function recordAnswer(qid, score, timeMs, withinTime){
  const s = loadStats();
  const r = s[qid] || {
    attempts:0, correct:0, correct_within_time:0,
    last_correct:null, last_within_time:null,
    last_time_ms:null, best_time_ms:null, last_ts:0
  };
  r.attempts++;
  // Accumulate fractional score (neighbor match on SJT = 0.5)
  r.correct = (r.correct || 0) + score;
  if(withinTime) r.correct_within_time = (r.correct_within_time || 0) + score;
  if(score > 0 && timeMs != null && (r.best_time_ms == null || timeMs < r.best_time_ms)){
    r.best_time_ms = timeMs;
  }
  r.last_score = score;                // 0, 0.5, or 1
  r.last_correct = score >= 1;         // boolean, used by pickNext tiering
  r.last_within_time = withinTime;
  r.last_time_ms = timeMs;
  r.last_ts = Date.now();
  s[qid] = r;
  saveStats(s);
}
// Normalize a stats entry to a numeric score (backward-compat for old boolean-only entries)
function statScore(s){
  if(!s || s.attempts === 0) return 0;
  if(typeof s.last_score === 'number') return s.last_score;
  return s.last_correct ? 1 : 0;
}
function fmtTime(ms){
  if(ms == null) return '—';
  const s = Math.round(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}

// ============================================================================
// Question selection (tiered priority)
// ============================================================================
function buildPool(filters){
  let pool = DB.questions.slice();
  if(filters.playlist) pool = pool.filter(q => q.source === filters.playlist);
  if(filters.weakOnly){
    const stats = loadStats();
    pool = pool.filter(q => {
      const s = stats[q.id];
      if(!s || s.attempts === 0) return true;       // unseen counts as weak
      return s.correct / s.attempts < 0.6;
    });
  }
  return pool;
}

// Pick the next question id from the pool, applying tier priority:
//   Tier 1: never seen → random
//   Tier 2: last attempt was wrong → random
//   Tier 3: oldest viewed first
// `excludeIds` = set of qids already picked in this session (avoid immediate repeats)
function pickNext(pool, excludeIds){
  const stats = loadStats();
  const candidates = pool.filter(q => !excludeIds.has(q.id));
  if(candidates.length === 0) return null;

  const t1 = [], t2 = [], t3 = [];
  for(const q of candidates){
    const s = stats[q.id];
    if(!s || s.attempts === 0) t1.push(q);
    else if(s.last_correct === false) t2.push(q);
    else t3.push(q);
  }
  if(t1.length) return t1[Math.floor(Math.random()*t1.length)];
  if(t2.length) return t2[Math.floor(Math.random()*t2.length)];
  if(t3.length){
    t3.sort((a,b) => (stats[a.id]?.last_ts||0) - (stats[b.id]?.last_ts||0));
    return t3[0];
  }
  return null;
}

// Stats sync (Option 2 — manual save + manual load via file picker)
// ============================================================================
function mergeStatsFromObject(remote){
  if(!remote || typeof remote !== 'object'){
    toast('Invalid stats file'); return;
  }
  const local = loadStats();
  const merged = { ...local };
  let updated = 0;
  for(const qid in remote){
    const lr = local[qid];
    const rr = remote[qid];
    if(!lr || (rr.last_ts||0) > (lr.last_ts||0)){
      merged[qid] = rr;
      updated++;
    }
  }
  saveStats(merged);
  toast(updated > 0 ? `Merged ${updated} record(s) from stats.json` : 'Stats already up to date');
  render();
}

function pickStatsFile(){
  const input = document.getElementById('stats-file-input');
  input.value = '';
  input.onchange = (ev) => {
    const f = ev.target.files && ev.target.files[0];
    if(!f) return;
    const reader = new FileReader();

        const obj = JSON.parse(reader.result);

        saveDashSnapshot(computeDashSnapshot());
      }catch(e){

      }
    };

  };

}

// On iOS Safari there's no showSaveFilePicker, but navigator.share with a File
// opens the system share sheet which includes "Save to Files" — that lets the
// user pick any folder (including the one they loaded from). Falls back to the
// classic anchor-download when share-with-files isn't supported either.
async function downloadStats(){
  const stats = loadStats();
  const json = JSON.stringify(stats, null, 2);
  const file = new File([json], 'stats.json', { type: 'application/json' });

  if(typeof navigator !== 'undefined' && navigator.canShare && navigator.canShare({ files: [file] })){
    try {
      await navigator.share({ files: [file], title: 'PsycoTrain stats', text: 'Save stats.json to Files (iCloud · PsycoTrain folder)' });
      toast('Stats shared — tap "Save to Files" to keep them');
      return;
    } catch(e){
      // User cancelled or share failed — fall through to anchor download.
      if(e && e.name === 'AbortError') return;
    }
  }

  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stats.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Save stats.json into the app folder, overwriting any existing one');
}

// ============================================================================
// Default-path stats sync (File System Access API + IndexedDB handle cache).
// The user picks their iCloud stats.json once (suggested location:
//   /Users/ninonenni/Library/Mobile Documents/com~apple~CloudDocs/exercise/PsycoTrain/stats.json
// ). We persist the FileSystemFileHandle in IndexedDB; every subsequent load
// and save reuses it silently — effectively the "default path".
// Fallback on Safari/iOS (no FSA): existing download/upload dialogs.
// ============================================================================
const STATS_DEFAULT_NAME = 'stats.json';
const FSA_DB_NAME = 'psycotrain_fsa';
const FSA_STORE = 'handles';
const FSA_HANDLE_KEY = 'stats_file';

function hasFSA(){ return typeof window !== 'undefined' && 'showSaveFilePicker' in window; }

function fsaDb(){
  return new Promise((res, rej) => {
    const req = indexedDB.open(FSA_DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(FSA_STORE);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function fsaGetHandle(){
  try {
    const db = await fsaDb();
    return await new Promise((res, rej) => {
      const tx = db.transaction(FSA_STORE, 'readonly');
      const r = tx.objectStore(FSA_STORE).get(FSA_HANDLE_KEY);
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => rej(r.error);
    });
  } catch(e){ return null; }
}
async function fsaSetHandle(h){
  const db = await fsaDb();
  await new Promise((res, rej) => {
    const tx = db.transaction(FSA_STORE, 'readwrite');
    tx.objectStore(FSA_STORE).put(h, FSA_HANDLE_KEY);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function fsaEnsurePermission(handle, mode){
  const opts = { mode };
  if((await handle.queryPermission(opts)) === 'granted') return true;
  return (await handle.requestPermission(opts)) === 'granted';
}

// Called at app startup. User can cancel; returns quickly in that case.
async function promptLoadStats(){
  const ok = await confirmModal({
    title: 'Load your saved stats?',
    body: `Restore previously saved progress from disk.<div class="modal-hint">Default location: iCloud · PsycoTrain / stats.json</div>`,
    icon: '⇣', okLabel: 'Load', cancelLabel: 'Skip',
  });
  if(!ok) return;
  if(!hasFSA()){ pickStatsFile(); return; }
  try {
    let handle = await fsaGetHandle();
    if(!handle){
      // First run: user picks the iCloud stats.json. The browser can't seed a
      // full path but remembers the folder for subsequent pickers.
      const picked = await window.showOpenFilePicker({
        types: [{ description: 'Stats JSON', accept: { 'application/json': ['.json'] } }],
        multiple: false,
      }).catch(() => null);
      handle = picked && picked[0] ? picked[0] : null;
      if(!handle) return;
      await fsaSetHandle(handle);
    }
    if(!(await fsaEnsurePermission(handle, 'read'))){ toast('Permission denied'); return; }
    const file = await handle.getFile();
    const txt = await file.text();
    mergeStatsFromObject(JSON.parse(txt));
    STATS_DIRTY = false;
    // Seed the dashboard baseline with the freshly loaded state so trend
    // coloring compares "now vs last load" until the next explicit save.
    saveDashSnapshot(computeDashSnapshot());
  } catch(e){
    toast('Load failed: ' + (e.message || e));
  }
}

// Called on test exit / end-of-quiz / results-back. Skips silently if the
// session didn't change any stats.
async function promptSaveStats(){
  if(!STATS_DIRTY) return;
  const ok = await confirmModal({
    title: 'Save your stats?',
    body: `Write your progress to disk so you can restore it later.<div class="modal-hint">Default location: iCloud · PsycoTrain / stats.json</div>`,
    icon: '⇡', okLabel: 'Save', cancelLabel: 'Not now',
  });
  if(!ok) return;
  if(!hasFSA()){ await downloadStats(); STATS_DIRTY = false; saveDashSnapshot(computeDashSnapshot()); return; }
  try {
    let handle = await fsaGetHandle();
    if(!handle){
      handle = await window.showSaveFilePicker({
        suggestedName: STATS_DEFAULT_NAME,
        types: [{ description: 'Stats JSON', accept: { 'application/json': ['.json'] } }],
      }).catch(() => null);
      if(!handle) return;
      await fsaSetHandle(handle);
    }
    if(!(await fsaEnsurePermission(handle, 'readwrite'))){ toast('Permission denied'); return; }
    const w = await handle.createWritable();
    await w.write(JSON.stringify(loadStats(), null, 2));
    await w.close();
    STATS_DIRTY = false;
    saveDashSnapshot(computeDashSnapshot());
    toast('Stats saved');
  } catch(e){
    toast('Save failed: ' + (e.message || e));
  }
}

// In-app confirmation modal — replaces window.confirm().
// Usage: await confirmModal({ title, body, icon, okLabel, cancelLabel, danger }).
// Resolves to true on OK, false on Cancel / Esc / backdrop click.
let __MODAL_EL__ = null;
function confirmModal({ title, body = '', icon = '?', okLabel = 'OK', cancelLabel = 'Cancel', danger = false }){
  if(!__MODAL_EL__){
    const el = document.createElement('div');
    el.className = 'modal-backdrop';
    el.innerHTML = `
      <div class="modal-card" role="dialog" aria-modal="true">
        <div class="modal-icon"></div>
        <div class="modal-title"></div>
        <div class="modal-body"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" data-action="cancel"></button>
          <button class="btn btn-primary" data-action="ok"></button>
        </div>
      </div>`;
    document.body.appendChild(el);
    __MODAL_EL__ = el;
  }
  const el = __MODAL_EL__;
  const iconEl = el.querySelector('.modal-icon');
  iconEl.textContent = icon;
  iconEl.classList.toggle('danger', !!danger);
  el.querySelector('.modal-title').textContent = title;
  el.querySelector('.modal-body').innerHTML = body;
  const okBtn = el.querySelector('[data-action="ok"]');
  const cancelBtn = el.querySelector('[data-action="cancel"]');
  okBtn.textContent = okLabel;
  cancelBtn.textContent = cancelLabel;
  okBtn.classList.toggle('btn-danger', !!danger);
  okBtn.classList.toggle('btn-primary', !danger);
  return new Promise(resolve => {
    const done = (v) => {
      el.removeAttribute('data-open');
      okBtn.onclick = null; cancelBtn.onclick = null; el.onclick = null;
      document.removeEventListener('keydown', keyHandler);
      resolve(v);
    };
    const keyHandler = (e) => {
      if(e.key === 'Escape'){ e.preventDefault(); done(false); }
      else if(e.key === 'Enter'){ e.preventDefault(); done(true); }
    };
    requestAnimationFrame(() => el.setAttribute('data-open', ''));
    okBtn.onclick = () => done(true);
    cancelBtn.onclick = () => done(false);
    el.onclick = (e) => { if(e.target === el) done(false); };
    document.addEventListener('keydown', keyHandler);
    setTimeout(() => okBtn.focus(), 80);
  });
}

// Keep the browser history API in sync with MODE so the browser back button
// navigates between screens (instead of leaving the site). Each MODE transition
// pushes a new entry; internal re-renders within the same mode do nothing.
function syncHistory(){
  const state = history.state;
  if(!state){
    history.replaceState({ mode: MODE }, '', '#' + MODE);
  } else if(state.mode !== MODE){
    history.pushState({ mode: MODE }, '', '#' + MODE);
  }
}

function render(){
  const root = document.getElementById('root');
  syncHistory();
  root.innerHTML = '';
  if(MODE === 'home') renderHome(root);
  else if(MODE === 'guide') renderGuide(root);
  else if(MODE === 'practice') renderPractice(root);
  else if(MODE === 'results') renderResults(root);
  if(SCROLL_TARGET === 'top') window.scrollTo(0, 0);
  else if(SCROLL_TARGET === 'explanation'){
    const el = root.querySelector('.expl') || root.querySelector('.nav');
    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  SCROLL_TARGET = 'none';
}

// ----- Home -----
function renderHome(root){
  const settings = loadSettings();
  // Friend role is pinned to a single playlist. Force the in-memory value so
  // the rest of the function picks it up; do NOT persist (would clobber owner's choice).
  if(isFriend()) settings.playlist = FRIEND_PLAYLIST_KEY;
  const stats = loadStats();

  // Aggregate stats — global (uses fractional scores: SJT neighbor = 0.5).
  // Speed on correct answers: average best_time_ms across questions ever
  // answered correctly. Uses existing data so no schema change needed.
  const total = DB.questions.length;
  let gAttempted = 0, gScoreSum = 0, gScoreInTimeSum = 0;
  let gBestSum = 0, gBestCount = 0;
  for(const q of DB.questions){
    const s = stats[q.id];
    if(s && s.attempts > 0){
      gAttempted++;
      const sc = statScore(s);
      gScoreSum += sc;
      if(s.last_within_time) gScoreInTimeSum += sc;
    }
    if(s && s.best_time_ms != null){
      gBestSum += s.best_time_ms;
      gBestCount++;
    }
  }
  const globalStats = {
    attempted: gAttempted,
    total,
    accuracy: gAttempted > 0 ? Math.round(gScoreSum / gAttempted * 100) : 0,
    accuracyInTime: gAttempted > 0 ? Math.round(gScoreInTimeSum / gAttempted * 100) : 0,
    avgCorrectMs: gBestCount > 0 ? gBestSum / gBestCount : null,
  };

  // Per-source counts + stats (one entry per playlist key).
  const sourceCounts = {};
  const sourceStats = {};
  for(const q of DB.questions){
    sourceCounts[q.source] = (sourceCounts[q.source] || 0) + 1;
    if(!sourceStats[q.source]) sourceStats[q.source] = {total:0, attempted:0, scoreSum:0, scoreInTimeSum:0, bestSum:0, bestCount:0};
    sourceStats[q.source].total++;
    const s = stats[q.id];
    if(s && s.attempts > 0){
      sourceStats[q.source].attempted++;
      const sc = statScore(s);
      sourceStats[q.source].scoreSum += sc;
      if(s.last_within_time) sourceStats[q.source].scoreInTimeSum += sc;
    }
    if(s && s.best_time_ms != null){
      sourceStats[q.source].bestSum += s.best_time_ms;
      sourceStats[q.source].bestCount++;
    }
  }

  const pool = buildPool(settings);
  const activePlaylist = settings.playlist ? playlistByKey(settings.playlist) : null;
  const isMcq = !!(activePlaylist && activePlaylist.type === 'mcq');
  const isSjt = !!(activePlaylist && activePlaylist.type === 'sjt');
  const hasGuide = isSjt || isMcq;

  // The dashboard row adapts to the active playlist.
  let dash;
  if(activePlaylist){
    const ss = sourceStats[activePlaylist.key] || {total:0, attempted:0, scoreSum:0, scoreInTimeSum:0, bestSum:0, bestCount:0};
    dash = {
      attempted: ss.attempted,
      total: ss.total,
      accuracy: ss.attempted > 0 ? Math.round(ss.scoreSum / ss.attempted * 100) : 0,
      accuracyInTime: ss.attempted > 0 ? Math.round(ss.scoreInTimeSum / ss.attempted * 100) : 0,
      avgCorrectMs: ss.bestCount > 0 ? ss.bestSum / ss.bestCount : null,
    };
  } else {
    dash = globalStats;
  }

  const canReset = dash.attempted > 0;

  // MCQ section (mode buttons, drill dropdown, topic stats) — only for MCQ.
  let mcqSectionHtml = '';
  if(isMcq){
    const playlistQs = DB.questions.filter(q => q.source === activePlaylist.key);
    const byTopic = {};
    for(const q of playlistQs){
      const t = q.topic || 'unknown';
      if(!byTopic[t]) byTopic[t] = { n: 0, attempted: 0, scoreSum: 0 };
      byTopic[t].n++;
      const s = stats[q.id];
      if(s && s.attempts > 0){
        byTopic[t].attempted++;
        byTopic[t].scoreSum += statScore(s);
      }
    }
    const topicRows = Object.keys(byTopic)
      .filter(t => byTopic[t].attempted > 0)
      .sort((a, b) => (byTopic[a].scoreSum / byTopic[a].attempted) - (byTopic[b].scoreSum / byTopic[b].attempted))
      .map(t => {
        const { n, attempted, scoreSum } = byTopic[t];
        const acc = Math.round(scoreSum / attempted * 100);
        const label = TOPIC_LABELS[t] || t;
        const barCls = acc < 50 ? 'low' : (acc < 75 ? 'med' : '');
        return `<div class="topic-row" data-drill-topic="${esc(t)}">
          <div class="tr-name">${esc(label)}</div>
          <div class="tr-score">${attempted}/${n} · ${acc}%</div>
          <div class="tr-bar"><div class="${barCls}" style="width:${acc}%"></div></div>
        </div>`;
      }).join('');
    const topicStatsHtml = topicRows
      ? `<div class="topic-stats"><h4>Your topics · weakest first · tap to drill</h4>${topicRows}</div>`
      : '';

    mcqSectionHtml = `<div class="mcq-section">
      <div class="mode-grid">
        <div class="mode-btn" data-mcq-mode="timed_exam" title="30 random Qs · 40-minute global countdown">
          <span class="emoji">⚡</span>
          <span class="title">Timed Exam</span>
          <span class="sub">30 Qs · 40 min</span>
        </div>
        <div class="mode-btn" data-mcq-mode="free_study" title="Unlimited questions · immediate per-option feedback">
          <span class="emoji">📚</span>
          <span class="title">Free Study</span>
          <span class="sub">Unlimited</span>
        </div>
        <div class="mode-btn" data-mcq-mode="topic_drill" title="Focus on one topic — EU regulations, a framework, or a specific duty">
          <span class="emoji">🎯</span>
          <span class="title">Topic Drill</span>
          <span class="sub">Pick a topic</span>
        </div>
      </div>
      <div id="drill-pick-box" class="drill-pick" style="display:none">
        <select id="drill-topic">
          <option value="eu_regulation">EU regulations</option>
          <option value="framework">Frameworks / acronyms</option>
          <option value="data_architecture">Duty · Data architecture</option>
          <option value="data_governance">Duty · Data governance</option>
          <option value="data_policy">Duty · Data policies &amp; strategy</option>
          <option value="data_engineering">Duty · Data engineering</option>
          <option value="data_platforms">Duty · Data platforms</option>
          <option value="bi_reporting">Duty · BI &amp; reporting</option>
          <option value="master_data">Duty · Master &amp; reference data</option>
          <option value="metadata_taxonomy">Duty · Metadata &amp; taxonomy</option>
          <option value="data_quality">Duty · Data quality</option>
          <option value="data_security">Duty · Data security &amp; privacy</option>
          <option value="advanced_analytics">Duty · Advanced analytics &amp; AI prep</option>
        </select>
        <button class="btn btn-primary btn-small" id="start-drill-btn">Start drill</button>
      </div>
      ${topicStatsHtml}
    </div>`;
  }

  // SJT section — sub-behaviour drill + weakest-first stats (only when an SJT playlist is selected).
  // Tags live on reactions (q.sub_behaviors array). If no tags in the data yet, the section
  // shows a friendly "no tags yet" hint rather than hiding entirely.
  let sjtSectionHtml = '';
  if(isSjt){
    const playlistQs = DB.questions.filter(q => q.source === activePlaylist.key);
    // Aggregate per sub-behaviour: count reactions tagged and user attempts/score on them.
    const bySub = {};
    let anyTags = false;
    for(const q of playlistQs){
      const tags = Array.isArray(q.sub_behaviors) ? q.sub_behaviors : [];
      if(tags.length > 0) anyTags = true;
      for(const t of tags){
        if(!bySub[t]) bySub[t] = { n: 0, attempted: 0, scoreSum: 0 };
        bySub[t].n++;
        const s = stats[q.id];
        if(s && s.attempts > 0){
          bySub[t].attempted++;
          bySub[t].scoreSum += statScore(s);
        }
      }
    }
    const subRows = Object.keys(bySub)
      .filter(t => bySub[t].attempted > 0)
      .sort((a, b) => (bySub[a].scoreSum / bySub[a].attempted) - (bySub[b].scoreSum / bySub[b].attempted))
      .map(t => {
        const { n, attempted, scoreSum } = bySub[t];
        const acc = Math.round(scoreSum / attempted * 100);
        const label = SUBB_LABELS[t] || t;
        const barCls = acc < 50 ? 'low' : (acc < 75 ? 'med' : '');
        return `<div class="topic-row" data-drill-topic="${esc(t)}">
          <div class="tr-name">${esc(label)}</div>
          <div class="tr-score">${attempted}/${n} · ${acc}%</div>
          <div class="tr-bar"><div class="${barCls}" style="width:${acc}%"></div></div>
        </div>`;
      }).join('');

    // Dropdown options: only sub-behaviours actually present in the pool (or all PC/AG if none tagged yet).
    const availableTags = Object.keys(bySub);
    const dropdownTags = availableTags.length ? availableTags : Object.keys(SUBB_LABELS);
    const dropdownOpts = dropdownTags.map(t =>
      `<option value="${esc(t)}">${esc(SUBB_LABELS[t] || t)}</option>`
    ).join('');

    const emptyHint = anyTags
      ? '<div class="empty">Drill a scenario to populate this list — weakest first.</div>'
      : '<div class="empty">Sub-behaviour tags will appear once scenarios are tagged.</div>';

    sjtSectionHtml = `<div class="mcq-section">
      <div class="drill-pick" style="display:flex">
        <select id="sjt-drill-topic" ${availableTags.length ? '' : 'disabled'}>
          <option value="">Drill all sub-behaviours</option>
          ${dropdownOpts}
        </select>
        <button class="btn btn-primary btn-small" id="sjt-start-drill-btn" ${availableTags.length ? '' : 'disabled'}>Start drill</button>
      </div>
      <div class="subb-stats">
        <h4>Your sub-behaviours · weakest first · tap to drill</h4>
        ${subRows || emptyHint}
      </div>
    </div>`;
  }

  // Friend role gets no resume button: a stale session from the owner could be
  // for any playlist, and a single-playlist user can just re-start.
  const session = isFriend() ? null : loadSession();
  const visiblePlaylists = PLAYLISTS
    .filter(p => sourceCounts[p.key])
    .filter(p => !isFriend() || p.key === FRIEND_PLAYLIST_KEY);

  // Guide button title differs for MCQ (Content Explorer vs 'how to ace').
  const guideTitle = isMcq
    ? 'Content Explorer — interactive map of regs, duties, frameworks, traps'
    : 'How to ace this test — decision flowchart, examples, competencies';
  const resetTitle = activePlaylist
    ? `Reset stats for “${activePlaylist.label}”`
    : 'Reset all practice stats';
  const timeTitle = 'Target time per question · affects numerical only; SJT uses 120/40s, MCQ uses 80s';

  // The dashboard always shows attempted/total to give a sense of coverage.
  const attemptedStr = `${dash.attempted}/${dash.total}`;
  const dashSubLabel = activePlaylist ? esc(activePlaylist.label) : 'All playlists';

  // Trend vs last-saved snapshot: tints each chip (green ↑ / red ↓ / neutral =)
  // so users see progress at a glance. Only meaningful after first save; until
  // then trendClass returns 'new' which shows no tint.
  const snap = loadDashSnapshot();
  const baseline = activePlaylist ? (snap.byPlaylist[activePlaylist.key] || null) : snap.global;
  const trendAcc = trendClass(dash.accuracy, baseline ? baseline.accuracy : null, false);
  const trendIT  = trendClass(dash.accuracyInTime, baseline ? baseline.accuracyInTime : null, false);
  const trendAvg = trendClass(dash.avgCorrectMs, baseline ? baseline.avgCorrectMs : null, true);
  const trendArrow = t => (t === 'up' ? '↑' : t === 'down' ? '↓' : t === 'flat' ? '' : '');

  root.appendChild($(`
    <div class="home">
      <h1>PsycoTrain</h1>
      <div class="sub">${total} questions · ${visiblePlaylists.length} playlists · <em>${dashSubLabel}</em></div>

      <!-- Adaptive dashboard: shows global or active-playlist stats in the same slot.
           Trend tint (trend-up/down/flat) compares each metric against the
           last explicit "save stats" snapshot. -->
      <div class="dash-stats">
        <div class="stat-chip"><strong>${attemptedStr}</strong><div class="lbl">Attempted</div></div>
        <div class="stat-chip trend-${trendAcc}" title="${baseline ? `Was ${baseline.accuracy}% at last save` : 'No saved baseline yet — save stats to start tracking'}"><strong>${dash.accuracy}%<span class="trend-arrow">${trendArrow(trendAcc)}</span></strong><div class="lbl">Accuracy</div></div>
        <div class="stat-chip trend-${trendIT}" title="${baseline ? `Was ${baseline.accuracyInTime}% at last save` : 'No saved baseline yet — save stats to start tracking'}"><strong>${dash.accuracyInTime}%<span class="trend-arrow">${trendArrow(trendIT)}</span></strong><div class="lbl">In time</div></div>
        <div class="stat-chip trend-${trendAvg}" title="${baseline && baseline.avgCorrectMs != null ? `Was ${fmtTime(baseline.avgCorrectMs)} at last save` : 'Average best time across questions answered correctly at least once'}"><strong>${dash.avgCorrectMs != null ? fmtTime(dash.avgCorrectMs) : '—'}<span class="trend-arrow">${trendArrow(trendAvg)}</span></strong><div class="lbl">Avg ✓ time</div></div>
      </div>

      <!-- Horizontal swipe bar of playlists. -->
      <div class="pl-bar" id="playlist-chips">
        ${chipHtml('playlist-chip', null, 'All', settings.playlist === null)}
        ${visiblePlaylists.map(p =>
          chipHtml('playlist-chip', p.key, `${p.label} (${sourceCounts[p.key]})`, settings.playlist === p.key)
        ).join('')}
      </div>

      <!-- Compact actions: guide · weak-only · reset · time slider. Tooltips on hover. -->
      <div class="action-row">
        ${hasGuide ? `<button class="ia-btn" id="guide-btn" title="${esc(guideTitle)}">?</button>` : ''}
        <button class="ia-btn warn-tri ${settings.weakOnly ? 'on' : ''}" id="weak-btn" title="Weak only — unseen questions + those with accuracy below 60%">⚠</button>
        ${canReset ? `<button class="ia-btn danger" id="reset-btn" title="${esc(resetTitle)}">🗑</button>` : ''}
        <div class="time-slider-wrap" title="${esc(timeTitle)}">
          <input type="range" id="target-range" min="10" max="300" step="5" value="${settings.targetSec}">
          <span class="tval" id="target-val">${settings.targetSec}s</span>
        </div>
      </div>

      ${mcqSectionHtml}
      ${sjtSectionHtml}

      <!-- Start / Resume side by side. For MCQ, mode buttons already act as Start. -->
      ${(session || !isMcq) ? `
      <div class="start-row">
        ${session ? '<button class="btn btn-primary" id="resume-btn">Resume</button>' : ''}
        ${isMcq ? '' : `<button class="btn btn-primary" id="start-btn" ${pool.length === 0 ? 'disabled' : ''}>
          Start practice${pool.length === 0 ? ' (no questions)' : ''}
        </button>`}
      </div>` : ''}

      <!-- Tiny save/load icons at the bottom. -->
      <div class="mini-row">
        <button class="ia-mini" id="save-btn" title="Save all practice stats to a JSON file">⬇</button>
        <button class="ia-mini" id="load-btn" title="Load practice stats from a JSON file">⬆</button>
      </div>
    </div>
  `));

  // Restore horizontal scroll position (chip click triggers re-render, which would
  // otherwise reset the bar to scrollLeft=0 and hide the user's chosen chip).
  // On a fresh page load PLAYLIST_SCROLL_X is 0, so the active chip may be
  // off-screen — scroll it into view instead.
  const plBarEl = root.querySelector('#playlist-chips');
  if(plBarEl){
    if(PLAYLIST_SCROLL_X > 0){
      plBarEl.scrollLeft = PLAYLIST_SCROLL_X;
    } else {
      const activeChip = plBarEl.querySelector('.chip.on');
      if(activeChip){
        const chipLeft = activeChip.offsetLeft;
        const chipCenter = chipLeft + activeChip.offsetWidth / 2;
        const target = Math.max(0, chipCenter - plBarEl.clientWidth / 2);
        plBarEl.scrollLeft = target;
        PLAYLIST_SCROLL_X = plBarEl.scrollLeft;
      }
    }
  }

  // Wire up playlist chips → switch playlist.
  root.querySelectorAll('#playlist-chips .chip').forEach(c => {
    c.addEventListener('click', () => {
      PLAYLIST_SCROLL_X = c.parentElement.scrollLeft;
      const newKey = c.dataset.value === '__null__' ? null : c.dataset.value;
      settings.playlist = newKey;
      // Adjust default target time when switching: non-SJT playlists benefit
      // from a type-tailored default; SJT ignores it (per-question override).
      if(newKey){
        const p = playlistByKey(newKey);
        if(p && p.type !== 'sjt') settings.targetSec = defaultTargetForType(p.type);
      } else {
        settings.targetSec = 120;
      }
      saveSettings(settings);
      render();
    });
  });

  // Action icons
  root.querySelector('#guide-btn')?.addEventListener('click', () => {
    GUIDE_KEY = settings.playlist;
    MODE = 'guide';
    SCROLL_TARGET = 'top';
    render();
  });
  root.querySelector('#weak-btn')?.addEventListener('click', () => {
    settings.weakOnly = !settings.weakOnly;
    saveSettings(settings);
    render();
  });
  root.querySelector('#reset-btn')?.addEventListener('click', () => {
    if(activePlaylist) resetStatsForPlaylist(activePlaylist.key);
    else resetAllStats();
  });

  // Time slider — live label + persist.
  const tRange = root.querySelector('#target-range');
  const tLabel = root.querySelector('#target-val');
  if(tRange && tLabel){
    tRange.addEventListener('input', () => { tLabel.textContent = `${tRange.value}s`; });
    tRange.addEventListener('change', () => {
      let v = parseInt(tRange.value, 10);
      if(!Number.isFinite(v) || v < 10) v = 10;
      if(v > 300) v = 300;
      settings.targetSec = v;
      saveSettings(settings);
    });
  }

  // Start / Resume
  root.querySelector('#start-btn')?.addEventListener('click', () => startPractice());
  root.querySelector('#resume-btn')?.addEventListener('click', resumePractice);

  // MCQ mode buttons + drill
  root.querySelectorAll('.mode-btn[data-mcq-mode]').forEach(b => {
    b.addEventListener('click', () => {
      const m = b.dataset.mcqMode;
      if(m === 'topic_drill'){
        const box = root.querySelector('#drill-pick-box');
        if(box) box.style.display = box.style.display === 'none' ? 'flex' : 'none';
        return;
      }
      startPractice({ mode: m });
    });
  });
  root.querySelector('#start-drill-btn')?.addEventListener('click', () => {
    const topic = root.querySelector('#drill-topic')?.value;
    if(!topic) return;
    startPractice({ mode: 'topic_drill', drillTopic: topic });
  });
  // SJT sub-behaviour drill (mirrors MCQ drill button but filters by q.sub_behaviors).
  root.querySelector('#sjt-start-drill-btn')?.addEventListener('click', () => {
    const topic = root.querySelector('#sjt-drill-topic')?.value;
    if(!topic) { startPractice(); return; }  // empty → all sub-behaviours
    startPractice({ mode: 'topic_drill', drillTopic: topic });
  });
  // Per-topic dashboard rows → quick-start a topic drill (works for both MCQ topics and SJT sub-behaviours).
  root.querySelectorAll('.topic-row[data-drill-topic]').forEach(r => {
    r.addEventListener('click', () => {
      startPractice({ mode: 'topic_drill', drillTopic: r.dataset.drillTopic });
    });
  });

  // Mini save / load
  root.querySelector('#save-btn').addEventListener('click', async () => {
    await downloadStats();
    saveDashSnapshot(computeDashSnapshot());
  });
  root.querySelector('#load-btn').addEventListener('click', pickStatsFile);
}
function chipHtml(cls, value, label, on){
  return `<div class="chip ${cls} ${on?'on':''}" data-value="${value === null ? '__null__' : esc(value)}">${esc(label)}</div>`;
}

// ----- Guide -----

  if(GUIDE_KEY === 'BOSA_SJT_BA_CRIT') return renderGuideCritical(root);
  if(GUIDE_KEY === 'BOSA_SJT_BA_AGIL') return renderGuideAgility(root);
  if(GUIDE_KEY === 'EPSO_AD426_DATA') return renderEpsoExplorer(root);
  return renderGuideCollaborer(root);
}

          <li>Veut « tenir les deux en parallèle » sans arbitrage ni time-box</li>

        </ul>
        <h3 style="margin-top:12px"><span class="score-tag score-m">-</span> Pièges courants</h3>
        <ul>
          <li>« Je reprends tout cette semaine, tant pis pour le sprint » (adoption impulsive)</li>
          <li>Acceptation silencieuse d'un surcroît de travail qui bloque 5 personnes</li>
          <li>Escalade systématique à la hiérarchie au premier arbitrage</li>
        </ul>
        <h3 style="margin-top:12px"><span class="score-tag score-mm">--</span> Lignes rouges</h3>
        <ul>
          <li>Refus de principe (« on dit non proprement », « pas mon mandat »)</li>
          <li>Alignement explicite sur la résistance ambiante en présence de juniors ou d'équipe</li>
          <li>Défense verrouillée du périmètre comme règle, sans alternative proposée</li>
        </ul>
      </div>

      <h2>Stratégie pendant l'examen</h2>
      <div class="section">
        <ul>
          <li><strong>Identifier l'engagement déjà pris</strong> dans la situation : une ++ le protège explicitement, une - le sacrifie.</li>
          <li><strong>Chercher la time-box</strong> : « 2 jours », « vendredi midi », « cette semaine » — son absence plafonne à +/-.</li>
          <li><strong>L'initiative hors mandat</strong> (se proposer pilote, REX à l'équipe, doc méthode) est le marqueur le plus discriminant du ++.</li>
          <li><strong>Attention au rôle-modèle</strong> : si la situation mentionne la visibilité du protagoniste, une réaction qui ignore ce signal plafonne au + même si elle est personnellement bonne.</li>
          <li><strong>Temps cible : 120 s pour la lecture + première réaction, 40 s pour les suivantes.</strong></li>
        </ul>
      </div>
    </div>
  `));
