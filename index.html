<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PsycoTrain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F4; --card:#fff; --border:#E4E2DA;
  --text:#1a1a18; --muted:#888; --sub:#3d3d3a;
  --accent:#185FA5; --accentbg:#E6F1FB; --accentbdr:#85B7EB;
  --green:#0F6E56; --greenbg:#E1F5EE; --greenbdr:#5DCAA5;
  --red:#A32D2D; --redbg:#FCEBEB; --redbdr:#F09595;
  --amber:#854F0B; --amberbg:#FAEEDA;
}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-text-size-adjust:100%}
.container{max-width:760px;margin:0 auto;padding:14px 16px 90px}

/* Home */
.home h1{font-size:24px;font-weight:800;margin:6px 0 2px}
.home .sub{font-size:13px;color:var(--muted);margin-bottom:14px}
.stats-row{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.stat-chip{flex:1;min-width:90px;background:var(--card);border:1px solid var(--border);padding:10px 12px;border-radius:12px;text-align:center}
.stat-chip strong{display:block;font-size:18px;color:var(--accent)}
.stat-chip .lbl{font-size:11px;color:var(--muted);margin-top:2px}

.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.section h3{font-size:13px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 12px;border-radius:999px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.dis{opacity:.4;cursor:not-allowed}
.toggle-row{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--sub);font-weight:600}
.toggle{position:relative;width:42px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(18px)}

.actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.btn{padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:disabled{background:var(--muted);cursor:not-allowed}
.btn-secondary{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.btn-small{padding:9px 14px;font-size:13px;font-weight:600}

/* Practice */
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 10px;border-bottom:1px solid var(--border);margin:-14px -16px 12px;padding-left:16px;padding-right:16px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.hdr .progress{font-size:13px;color:var(--muted);font-weight:600}
.hdr .exit{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub)}
.tmr{font-family:'Courier New',monospace;font-size:15px;font-weight:700;color:var(--green);background:var(--greenbg);padding:5px 11px;border-radius:8px}
.tmr.warn{color:var(--amber);background:var(--amberbg)}
.tmr.over{color:var(--red);background:var(--redbg)}
.time-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.time-bar{height:100%;border-radius:3px;transition:width .5s linear,background .3s;background:var(--green)}
.time-bar.warn{background:var(--amber)}
.time-bar.over{background:var(--red)}
.timecfg{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--sub);font-weight:600}
.timecfg input{width:64px;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);font-family:inherit;font-size:14px;font-weight:600;text-align:center}
.timetag{font-size:11px;color:var(--muted);margin-left:6px}
.timetag.over{color:var(--amber)}
.qmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px}
.qref{background:#EEEDFE;padding:2px 9px;border-radius:20px;font-size:10px;color:#534AB7;font-weight:600;letter-spacing:.3px}
.qfigs img{width:100%;max-width:100%;border-radius:10px;display:block;border:1px solid var(--border);margin-bottom:8px;background:#fff}
.qtext{font-size:15px;font-weight:600;margin:10px 0 12px;line-height:1.45;white-space:pre-wrap}
.qtext.html-mode{white-space:normal}
.q-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;font-weight:400}
.q-table th,.q-table td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.q-table th{background:var(--bg);font-weight:700;font-size:13px;color:var(--accent)}
.q-table td{background:var(--card)}
/* SJT situation box */
.sjt-situation{font-size:14px;line-height:1.65;color:var(--sub);padding:14px 16px;background:var(--card);border-radius:12px;border-left:3.5px solid #534AB7;margin-bottom:14px}
.sjt-situation .sjt-title{font-weight:700;font-size:13px;color:#534AB7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
/* SJT compact score row */
.sjt-scores{display:flex;gap:8px;justify-content:center;margin:14px 0}
.sjt-btn{flex:1;max-width:80px;padding:12px 6px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-size:15px;font-weight:700;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s,background .15s,transform .08s;color:var(--sub)}
.sjt-btn:active:not(.dis){transform:scale(.95)}
.sjt-btn.sel{border-color:var(--accent);background:var(--accentbg);color:var(--accent)}
.sjt-btn.ok{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.sjt-btn.ko{border-color:var(--red);background:var(--redbg);color:var(--red)}
.sjt-btn.partial{border-color:#E0B860;background:var(--amberbg);color:var(--amber)}
.sjt-btn.fd{opacity:.4}
.sjt-btn.dis{cursor:default}
.opt{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-radius:12px;border:2px solid var(--border);background:var(--card);margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .08s,border-color .15s,background .15s}
.opt:active:not(.dis){transform:scale(.985)}
.opt.sel{border-color:var(--accent);background:var(--accentbg)}
.opt.ok{border-color:var(--green);background:var(--greenbg)}
.opt.ko{border-color:var(--red);background:var(--redbg)}
.opt.fd{opacity:.55}
.opt.dis{cursor:default}
.ol{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);font-weight:700;font-size:13px;flex-shrink:0;margin-top:1px}
.opt.sel .ol{background:var(--accent);color:#fff;border-color:var(--accent)}
.opt.ok .ol{background:var(--green);color:#fff;border-color:var(--green)}
.opt.ko .ol{background:var(--red);color:#fff;border-color:var(--red)}
.ot{font-size:14px;flex:1;line-height:1.4}
.expl{padding:13px 14px;border-radius:12px;margin-top:12px;font-size:13px;line-height:1.55;white-space:pre-wrap}
.expl.eok{background:var(--greenbg);border:1px solid var(--greenbdr);color:#0a4f3d}
.expl.epartial{background:var(--amberbg);border:1px solid #E0B860;color:#6B4A0A}
.expl.eko{background:var(--redbg);border:1px solid var(--redbdr);color:#7a1f1f}
.opt.partial{border-color:#E0B860;background:var(--amberbg)}
.opt.partial .ol{background:#BA7517;color:#fff;border-color:#BA7517}
.expl strong{font-weight:700}

.nav{display:flex;gap:8px;margin-top:14px}
.nav .btn{flex:1}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;z-index:100;pointer-events:none}
.toast.show{opacity:.95}

/* Per-type stats */
.type-stats-section .stats-row{margin:6px 0 0}
.type-stats-section .stat-chip{min-width:70px;padding:8px 10px}
.type-stats-section .stat-chip strong{font-size:15px}
.type-stats-section .hdr-row{display:flex;justify-content:space-between;align-items:center}
.btn-reset{padding:5px 10px;border-radius:8px;border:1.5px solid var(--redbdr);background:var(--redbg);color:var(--red);font-size:11px;font-weight:600;cursor:pointer}
.btn-reset:hover{background:var(--red);color:#fff}

/* Empty state */
.empty{text-align:center;padding:30px 16px;color:var(--muted)}
.empty h2{font-size:18px;color:var(--text);margin-bottom:6px}

@media(max-width:380px){
  .container{padding:12px 12px 90px}
  .qtext{font-size:14px}
  .ot{font-size:13px}
  .stat-chip{min-width:75px;padding:8px 8px}
  .stat-chip strong{font-size:16px}
}
/* Lock screen */
#lockscreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
#lockscreen.hidden{display:none}
.lock-box{text-align:center;padding:24px;max-width:320px;width:100%}
.lock-box h1{font-size:22px;font-weight:800;margin-bottom:4px}
.lock-box .lock-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.lock-box input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--card);font-family:inherit;text-align:center}
.lock-box input:focus{outline:none;border-color:var(--accent)}
.lock-box button{width:100%;margin-top:10px;padding:13px;border-radius:10px;border:none;background:var(--text);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.lock-box .lock-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.lock-box.shake{animation:shake .4s}

/* Guide page */
.guide{max-width:700px;margin:0 auto}
.guide h1{font-size:22px;font-weight:800;margin:6px 0 4px}
.guide .back-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub);margin-bottom:12px;display:inline-block}
.guide h2{font-size:16px;font-weight:700;color:var(--accent);margin:18px 0 8px;padding-bottom:4px;border-bottom:1.5px solid var(--border)}
.guide h3{font-size:14px;font-weight:700;color:var(--sub);margin:14px 0 6px}
.guide p,.guide li{font-size:14px;line-height:1.6;color:var(--sub)}
.guide ul{padding-left:18px;margin:6px 0}
.guide li{margin-bottom:4px}
.guide .score-tag{display:inline-block;padding:2px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-right:4px}
.guide .score-pp{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr)}
.guide .score-p{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.guide .score-n{background:var(--amberbg);color:var(--amber);border:1px solid #e0b860}
.guide .score-m{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.guide .score-mm{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr)}
.flow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:12px 0;overflow-x:auto}
.flow-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding:10px 12px;border-radius:10px;border-left:3.5px solid var(--accent);background:var(--bg)}
.flow-step.red{border-left-color:var(--red)}
.flow-step.green{border-left-color:var(--green)}
.flow-step.amber{border-left-color:var(--amber)}
.flow-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flow-step.red .flow-num{background:var(--red)}
.flow-step.green .flow-num{background:var(--green)}
.flow-step.amber .flow-num{background:var(--amber)}
.flow-body{flex:1;font-size:13px;line-height:1.55}
.flow-body strong{color:var(--text)}
.flow-arrow{text-align:center;color:var(--muted);font-size:18px;margin:2px 0}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.comp-card h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.comp-card ul{padding-left:14px;margin:0}
.comp-card li{font-size:12px;line-height:1.5;color:var(--sub);margin-bottom:2px}
.comp-card.primary{border-color:var(--accentbdr);background:var(--accentbg)}
@media(max-width:500px){.comp-grid{grid-template-columns:1fr}}

/* Quick decision flowchart (visual) */
.qflow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 12px;margin:12px 0}
.qflow-row{display:flex;justify-content:center;align-items:stretch;gap:8px;margin-bottom:6px}
.qflow-q{flex:1;max-width:280px;background:var(--accentbg);border:2px solid var(--accentbdr);border-radius:12px;padding:12px 10px;text-align:center}
.qflow-q .acr{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.6px;margin-bottom:2px}
.qflow-q .ttl{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.qflow-q .hint{font-size:11px;color:var(--muted);line-height:1.35}
.qflow-fail{flex:0 0 90px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-size:11px;color:var(--muted);font-weight:600}
.qflow-fail .arr{font-size:18px;color:var(--muted);margin-bottom:2px}
.qflow-fail .badge{display:inline-block;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:800;border:2px solid}
.qflow-fail .badge.mm{background:var(--redbg);color:var(--red);border-color:var(--redbdr)}
.qflow-fail .badge.m{background:#fff3e0;color:#e65100;border-color:#ffcc80}
.qflow-fail .badge.n{background:var(--amberbg);color:var(--amber);border-color:#e0b860}
.qflow-fail .badge.p{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.qflow-fail .badge.pp{background:var(--greenbg);color:var(--green);border-color:var(--greenbdr)}
.qflow-down{text-align:center;color:var(--accent);font-size:22px;font-weight:700;margin:2px 0;line-height:1}
.qflow-final{text-align:center;margin-top:8px}
.qflow-final .badge{display:inline-block;padding:8px 18px;border-radius:10px;font-size:16px;font-weight:800;background:var(--greenbg);color:var(--green);border:2px solid var(--greenbdr)}
@media(max-width:500px){
  .qflow-row{flex-direction:column;align-items:center}
  .qflow-fail{flex:0 0 auto;flex-direction:row;gap:8px;margin-top:4px}
  .qflow-fail .arr{transform:rotate(90deg);margin:0}
}

/* Worked examples */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid var(--border)}
.ex-card.pp{border-left-color:var(--green)}
.ex-card.p{border-left-color:#2e7d32}
.ex-card.n{border-left-color:var(--amber)}
.ex-card.m{border-left-color:#e65100}
.ex-card.mm{border-left-color:var(--red)}
.ex-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ex-head .badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:800}
.ex-head .badge.pp{background:var(--greenbg);color:var(--green)}
.ex-head .badge.p{background:#e8f5e9;color:#2e7d32}
.ex-head .badge.n{background:var(--amberbg);color:var(--amber)}
.ex-head .badge.m{background:#fff3e0;color:#e65100}
.ex-head .badge.mm{background:var(--redbg);color:var(--red)}
.ex-head .label{font-size:13px;font-weight:700;color:var(--text)}
.ex-sit{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.5}
.ex-react{font-size:13px;line-height:1.55;color:var(--sub);padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.ex-why{font-size:12px;line-height:1.55;color:var(--sub)}
.ex-why strong{color:var(--text)}
.ex-signals{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ex-signals span{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--sub)}
</style>
</head>
<body>

<!-- Lock screen -->
<div id="lockscreen">
  <div class="lock-box" id="lockbox">
    <h1>PsycoTrain</h1>
    <p class="lock-sub">Enter password to continue</p>
    <input type="password" id="lock-pw" placeholder="Password" autocomplete="off" autofocus>
    <button id="lock-btn">Unlock</button>
    <p class="lock-err" id="lock-err"></p>
  </div>
</div>

<!-- App (hidden until unlocked) -->
<div class="container" id="root" style="display:none"></div>
<div class="toast" id="toast"></div>
<input type="file" id="stats-file-input" accept=".json,application/json" style="display:none">

<!-- Load the question database via a script tag (works from file:// — fetch() does not). -->
<script src="./questions.js"></script>
<script>
'use strict';

// ============================================================================
// Lock screen
// ============================================================================
const PASS_HASH = '50127e8f738d125f5be2b9db573261a21625065beca4a349747114230460719a';
const LS_UNLOCK = 'pt_unlocked';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function unlockApp() {
  document.getElementById('lockscreen').classList.add('hidden');
  document.getElementById('root').style.display = '';
  sessionStorage.setItem(LS_UNLOCK, '1');
}

async function tryUnlock() {
  const pw = document.getElementById('lock-pw').value;
  if (!pw) return;
  const hash = await sha256(pw);
  if (hash === PASS_HASH) {
    unlockApp();
  } else {
    document.getElementById('lock-err').textContent = 'Wrong password';
    const box = document.getElementById('lockbox');
    box.classList.remove('shake');
    void box.offsetWidth;
    box.classList.add('shake');
  }
}

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem(LS_UNLOCK) === '1') {
  unlockApp();
}

document.getElementById('lock-btn').addEventListener('click', tryUnlock);
document.getElementById('lock-pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// ============================================================================
// State and storage
// ============================================================================
const LS_STATS    = 'pt_stats_v1';
const LS_SESSION  = 'pt_session_v1';
const LS_SETTINGS = 'pt_settings_v1';

let DB = null;       // {version, types, sources, questions: [...]}
let MODE = 'home';   // 'home' | 'guide' | 'practice'
let GUIDE_KEY = null;// active playlist key when MODE === 'guide' (drives which tips page)
let SESSION = null;  // see startPractice() for shape
let TIMER_ID = null; // setInterval handle for the per-question ticker

// ----- localStorage helpers -----
function lsGet(k){ try{ const s=localStorage.getItem(k); return s?JSON.parse(s):null; }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); return true; }catch(e){ alert('Save failed: '+e.message); return false; } }
function lsDel(k){ try{ localStorage.removeItem(k); }catch(e){} }

// Fisher-Yates shuffle (returns new array)
function shuffle(arr){ const a = [...arr]; for(let i = a.length-1; i > 0; i--){ const j = Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function loadStats(){ return lsGet(LS_STATS) || {}; }
function saveStats(s){ return lsSet(LS_STATS, s); }
// Default target times per question type (in seconds)
const DEFAULT_TARGET_SEC = {
  'sjt': 55,                // ~75 min / ~80 reactions
  'numerical_bosa': 105,    // ~50 min / ~28 questions
  'numerical': 120,         // existing default
};
function defaultTargetForType(type){
  return DEFAULT_TARGET_SEC[type] || 120;
}
function loadSettings(){
  const s = lsGet(LS_SETTINGS) || {};
  // Migration: old layouts stored `type` + `source` separately. A saved source
  // is a playlist key, so promote it. `type` alone (no source) is dropped.
  let playlist = s.playlist ?? null;
  if(playlist == null && s.source) playlist = s.source;
  return {
    playlist,
    weakOnly: s.weakOnly ?? false,
    targetSec: s.targetSec ?? 120,   // only affects non-SJT; SJT uses per-question target_sec
  };
}
function saveSettings(s){ return lsSet(LS_SETTINGS, s); }
function loadSession(){ return lsGet(LS_SESSION); }
function saveSession(s){ return lsSet(LS_SESSION, s); }
function clearSession(){ lsDel(LS_SESSION); }

// ----- Per-question stats -----
function qStat(qid){
  return loadStats()[qid] || {
    attempts:0, correct:0, correct_within_time:0,
    last_correct:null, last_within_time:null,
    last_time_ms:null, best_time_ms:null, last_ts:0
  };
}
// score: 0..1 (SJT can be 0 / 0.5 / 1, others are 0 or 1)
function recordAnswer(qid, score, timeMs, withinTime){
  const s = loadStats();
  const r = s[qid] || {
    attempts:0, correct:0, correct_within_time:0,
    last_correct:null, last_within_time:null,
    last_time_ms:null, best_time_ms:null, last_ts:0
  };
  r.attempts++;
  // Accumulate fractional score (neighbor match on SJT = 0.5)
  r.correct = (r.correct || 0) + score;
  if(withinTime) r.correct_within_time = (r.correct_within_time || 0) + score;
  if(score > 0 && timeMs != null && (r.best_time_ms == null || timeMs < r.best_time_ms)){
    r.best_time_ms = timeMs;
  }
  r.last_score = score;                // 0, 0.5, or 1
  r.last_correct = score >= 1;         // boolean, used by pickNext tiering
  r.last_within_time = withinTime;
  r.last_time_ms = timeMs;
  r.last_ts = Date.now();
  s[qid] = r;
  saveStats(s);
}
// Normalize a stats entry to a numeric score (backward-compat for old boolean-only entries)
function statScore(s){
  if(!s || s.attempts === 0) return 0;
  if(typeof s.last_score === 'number') return s.last_score;
  return s.last_correct ? 1 : 0;
}
function fmtTime(ms){
  if(ms == null) return '—';
  const s = Math.round(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}

// ============================================================================
// Question selection (tiered priority)
// ============================================================================
function buildPool(filters){
  let pool = DB.questions.slice();
  if(filters.playlist) pool = pool.filter(q => q.source === filters.playlist);
  if(filters.weakOnly){
    const stats = loadStats();
    pool = pool.filter(q => {
      const s = stats[q.id];
      if(!s || s.attempts === 0) return true;       // unseen counts as weak
      return s.correct / s.attempts < 0.6;
    });
  }
  return pool;
}

// Pick the next question id from the pool, applying tier priority:
//   Tier 1: never seen → random
//   Tier 2: last attempt was wrong → random
//   Tier 3: oldest viewed first
// `excludeIds` = set of qids already picked in this session (avoid immediate repeats)
function pickNext(pool, excludeIds){
  const stats = loadStats();
  const candidates = pool.filter(q => !excludeIds.has(q.id));
  if(candidates.length === 0) return null;

  const t1 = [], t2 = [], t3 = [];
  for(const q of candidates){
    const s = stats[q.id];
    if(!s || s.attempts === 0) t1.push(q);
    else if(s.last_correct === false) t2.push(q);
    else t3.push(q);
  }
  if(t1.length) return t1[Math.floor(Math.random()*t1.length)];
  if(t2.length) return t2[Math.floor(Math.random()*t2.length)];
  if(t3.length){
    t3.sort((a,b) => (stats[a.id]?.last_ts||0) - (stats[b.id]?.last_ts||0));
    return t3[0];
  }
  return null;
}

// ============================================================================
// Stats sync (Option 2 — manual save + manual load via file picker)
// ============================================================================
function mergeStatsFromObject(remote){
  if(!remote || typeof remote !== 'object'){
    toast('Invalid stats file'); return;
  }
  const local = loadStats();
  const merged = { ...local };
  let updated = 0;
  for(const qid in remote){
    const lr = local[qid];
    const rr = remote[qid];
    if(!lr || (rr.last_ts||0) > (lr.last_ts||0)){
      merged[qid] = rr;
      updated++;
    }
  }
  saveStats(merged);
  toast(updated > 0 ? `Merged ${updated} record(s) from stats.json` : 'Stats already up to date');
  render();
}

function pickStatsFile(){
  const input = document.getElementById('stats-file-input');
  input.value = '';
  input.onchange = (ev) => {
    const f = ev.target.files && ev.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const obj = JSON.parse(reader.result);
        mergeStatsFromObject(obj);
      }catch(e){
        toast('Could not parse: ' + e.message);
      }
    };
    reader.readAsText(f);
  };
  input.click();
}

function resetStatsForPlaylist(key){
  const p = playlistByKey(key);
  const label = p ? p.label : key;
  if(!confirm(`Reset all stats for "${label}"? This cannot be undone.`)) return;
  const stats = loadStats();
  const ids = DB.questions.filter(q => q.source === key).map(q => q.id);
  for(const id of ids) delete stats[id];
  saveStats(stats);
  clearSession();
  toast(`Stats reset for ${label}`);
  render();
}
function resetAllStats(){
  if(!confirm('Reset ALL stats for every test type? This cannot be undone.')) return;
  saveStats({});
  clearSession();
  toast('All stats reset');
  render();
}

function downloadStats(){
  const stats = loadStats();
  const blob = new Blob([JSON.stringify(stats, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stats.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Save stats.json into the app folder, overwriting any existing one');
}

function $(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

let SCROLL_TARGET = 'top'; // 'top' | 'explanation' | 'none'
function render(){
  const root = document.getElementById('root');
  root.innerHTML = '';
  if(MODE === 'home') renderHome(root);
  else if(MODE === 'guide') renderGuide(root);
  else if(MODE === 'practice') renderPractice(root);
  if(SCROLL_TARGET === 'top') window.scrollTo(0, 0);
  else if(SCROLL_TARGET === 'explanation'){
    const el = root.querySelector('.expl') || root.querySelector('.nav');
    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  SCROLL_TARGET = 'none';
}

// ----- Home -----
function renderHome(root){
  const settings = loadSettings();
  const stats = loadStats();

  // Aggregate stats — global (uses fractional scores: SJT neighbor = 0.5)
  const total = DB.questions.length;
  let attempted = 0, scoreSum = 0, scoreInTimeSum = 0;
  for(const q of DB.questions){
    const s = stats[q.id];
    if(s && s.attempts > 0){
      attempted++;
      const sc = statScore(s);
      scoreSum += sc;
      if(s.last_within_time) scoreInTimeSum += sc;
    }
  }
  const accuracy = attempted > 0 ? Math.round(scoreSum / attempted * 100) : 0;
  const accuracyInTime = attempted > 0 ? Math.round(scoreInTimeSum / attempted * 100) : 0;

  // How many in current filter?
  const pool = buildPool(settings);

  // Per-source counts and stats (one entry per playlist key).
  const sourceCounts = {};
  const sourceStats = {};
  for(const q of DB.questions){
    sourceCounts[q.source] = (sourceCounts[q.source] || 0) + 1;
    if(!sourceStats[q.source]) sourceStats[q.source] = {total:0, attempted:0, scoreSum:0, scoreInTimeSum:0};
    sourceStats[q.source].total++;
    const s = stats[q.id];
    if(s && s.attempts > 0){
      sourceStats[q.source].attempted++;
      const sc = statScore(s);
      sourceStats[q.source].scoreSum += sc;
      if(s.last_within_time) sourceStats[q.source].scoreInTimeSum += sc;
    }
  }

  const activePlaylist = settings.playlist ? playlistByKey(settings.playlist) : null;

  // Per-playlist card (only when a specific playlist is selected).
  let playlistCardHtml = '';
  if(activePlaylist){
    const ss = sourceStats[activePlaylist.key] || {total:0, attempted:0, scoreSum:0, scoreInTimeSum:0};
    const pAcc = ss.attempted > 0 ? Math.round(ss.scoreSum / ss.attempted * 100) : 0;
    const pAccTime = ss.attempted > 0 ? Math.round(ss.scoreInTimeSum / ss.attempted * 100) : 0;
    const hasGuide = activePlaylist.type === 'sjt';
    playlistCardHtml = `
      <div class="section type-stats-section">
        <div class="hdr-row">
          <h3>${esc(activePlaylist.label)}</h3>
          ${ss.attempted > 0 ? `<button class="btn-reset" data-reset-playlist="${esc(activePlaylist.key)}">Reset</button>` : ''}
        </div>
        <div class="stats-row">
          <div class="stat-chip"><strong>${ss.attempted}/${ss.total}</strong><div class="lbl">Done</div></div>
          <div class="stat-chip"><strong>${pAcc}%</strong><div class="lbl">Accuracy</div></div>
          <div class="stat-chip"><strong>${pAccTime}%</strong><div class="lbl">In time</div></div>
        </div>
        ${hasGuide ? `<button class="btn btn-secondary" id="playlist-guide-btn" style="margin-top:12px;width:100%">Comment réussir ce test ?</button>` : ''}
      </div>`;
  }

  const session = loadSession();

  root.appendChild($(`
    <div class="home">
      <h1>PsycoTrain</h1>
      <div class="sub">${total} questions · ${PLAYLISTS.filter(p => sourceCounts[p.key]).length} playlists</div>

      <div class="stats-row">
        <div class="stat-chip"><strong>${total}</strong><div class="lbl">Total</div></div>
        <div class="stat-chip"><strong>${attempted}</strong><div class="lbl">Attempted</div></div>
        <div class="stat-chip"><strong>${accuracy}%</strong><div class="lbl">Accuracy</div></div>
        <div class="stat-chip"><strong>${accuracyInTime}%</strong><div class="lbl">In time</div></div>
      </div>

      <div class="section">
        <h3>Playlist</h3>
        <div class="chip-row" id="playlist-chips">
          ${chipHtml('playlist-chip', null, 'All', settings.playlist === null)}
          ${PLAYLISTS.filter(p => sourceCounts[p.key]).map(p =>
            chipHtml('playlist-chip', p.key, `${p.label} (${sourceCounts[p.key]})`, settings.playlist === p.key)
          ).join('')}
        </div>
      </div>

      ${playlistCardHtml}

      <div class="section">
        <div class="toggle-row" id="weak-toggle">
          <div class="toggle ${settings.weakOnly?'on':''}"></div>
          <div>Weak only (unseen + accuracy &lt; 60%)</div>
        </div>
      </div>

      <div class="section">
        <h3>Target time per question</h3>
        <div class="timecfg">
          <input type="number" id="target-input" min="5" max="3600" step="5" value="${settings.targetSec}">
          <span>seconds (${Math.floor(settings.targetSec/60)}:${String(settings.targetSec%60).padStart(2,'0')})</span>
        </div>
        <div class="sub" style="font-size:11px;margin-top:4px">SJT uses its own per-question timing (90s / 40s) — this setting only affects numerical.</div>
      </div>

      <div class="actions">
        ${session ? '<button class="btn btn-primary" id="resume-btn">Resume session</button>' : ''}
        <button class="btn btn-primary" id="start-btn" ${pool.length === 0 ? 'disabled' : ''}>
          Start practice ${pool.length === 0 ? '(no questions)' : ''}
        </button>
        <div class="btn-row">
          <button class="btn btn-secondary btn-small" id="save-btn">⬇ Save stats</button>
          <button class="btn btn-secondary btn-small" id="load-btn">↑ Load stats</button>
          <button class="btn btn-secondary btn-small" id="reset-all-btn" style="border-color:var(--redbdr);color:var(--red)">Reset all</button>
        </div>
      </div>
    </div>
  `));

  // Wire up chip click handlers
  root.querySelectorAll('#playlist-chips .chip').forEach(c => {
    c.addEventListener('click', () => {
      const newKey = c.dataset.value === '__null__' ? null : c.dataset.value;
      settings.playlist = newKey;
      // Adjust default target time when switching: non-SJT playlists benefit
      // from a type-tailored default; SJT ignores it (per-question override).
      if(newKey){
        const p = playlistByKey(newKey);
        if(p && p.type !== 'sjt') settings.targetSec = defaultTargetForType(p.type);
      } else {
        settings.targetSec = 120;
      }
      saveSettings(settings);
      render();
    });
  });
  root.querySelector('#weak-toggle').addEventListener('click', () => {
    settings.weakOnly = !settings.weakOnly;
    saveSettings(settings);
    render();
  });
  const tIn = root.querySelector('#target-input');
  tIn.addEventListener('change', () => {
    let v = parseInt(tIn.value, 10);
    if(!Number.isFinite(v) || v < 5) v = 5;
    if(v > 3600) v = 3600;
    settings.targetSec = v;
    saveSettings(settings);
    render();
  });
  root.querySelector('#start-btn')?.addEventListener('click', startPractice);
  root.querySelector('#resume-btn')?.addEventListener('click', resumePractice);
  root.querySelector('#playlist-guide-btn')?.addEventListener('click', () => {
    GUIDE_KEY = settings.playlist;
    MODE = 'guide';
    SCROLL_TARGET = 'top';
    render();
  });
  root.querySelector('#save-btn').addEventListener('click', downloadStats);
  root.querySelector('#load-btn').addEventListener('click', pickStatsFile);
  root.querySelector('#reset-all-btn').addEventListener('click', resetAllStats);
  root.querySelectorAll('[data-reset-playlist]').forEach(b => {
    b.addEventListener('click', () => resetStatsForPlaylist(b.dataset.resetPlaylist));
  });
}
function chipHtml(cls, value, label, on){
  return `<div class="chip ${cls} ${on?'on':''}" data-value="${value === null ? '__null__' : esc(value)}">${esc(label)}</div>`;
}

      <div class="section">

        <ul>
          <li>« Je termine le livrable critique comme prévu, je bloque les 2 jours de formation, je me propose pilote »</li>
          <li>Time-box explicite : « 2 jours », « vendredi midi »</li>
          <li>Prévient nommément les parties prenantes impactées (« je préviens l'équipe QA »)</li>
          <li>Transforme l'événement en ressource pour l'équipe (REX court, doc méthode réutilisable)</li>
        </ul>
        <h3 style="margin-top:12px"><span class="score-tag score-p">+</span> Ce qui manque au ++</h3>
        <ul>
          <li>Adoption personnelle réussie mais aucun effet d'entraînement ni capitalisation</li>
          <li>Replanification OK mais pas d'initiative hors mandat</li>
        </ul>
        <h3 style="margin-top:12px"><span class="score-tag score-n">+/-</span> Zone grise</h3>
        <ul>
          <li>Veut « tenir les deux en parallèle » sans arbitrage ni time-box</li>
          <li>Livrable hybride (moitié ancien outil, moitié nouveau) qui transfère le coût à l'IT</li>
          <li>Bonne intention mais méthode absente</li>
        </ul>
        <h3 style="margin-top:12px"><span class="score-tag score-m">-</span> Pièges courants</h3>
        <ul>
          <li>« Je reprends tout cette semaine, tant pis pour le sprint » (adoption impulsive)</li>
          <li>Acceptation silencieuse d'un surcroît de travail qui bloque 5 personnes</li>
          <li>Escalade systématique à la hiérarchie au premier arbitrage</li>
        </ul>
        <h3 style="margin-top:12px"><span class="score-tag score-mm">--</span> Lignes rouges</h3>
        <ul>
          <li>Refus de principe (« on dit non proprement », « pas mon mandat »)</li>
          <li>Alignement explicite sur la résistance ambiante en présence de juniors ou d'équipe</li>
          <li>Défense verrouillée du périmètre comme règle, sans alternative proposée</li>
        </ul>
      </div>

      <h2>Stratégie pendant l'examen</h2>
      <div class="section">
        <ul>
          <li><strong>Identifier l'engagement déjà pris</strong> dans la situation : une ++ le protège explicitement, une - le sacrifie.</li>
          <li><strong>Chercher la time-box</strong> : « 2 jours », « vendredi midi », « cette semaine » — son absence plafonne à +/-.</li>
          <li><strong>L'initiative hors mandat</strong> (se proposer pilote, REX à l'équipe, doc méthode) est le marqueur le plus discriminant du ++.</li>
          <li><strong>Attention au rôle-modèle</strong> : si la situation mentionne la visibilité du protagoniste, une réaction qui ignore ce signal plafonne au + même si elle est personnellement bonne.</li>
          <li><strong>Temps cible : 90 s pour la première réaction (lecture), 40 s pour les suivantes.</strong></li>
        </ul>
      </div>
    </div>
  `));
  root.querySelector('#guide-back').addEventListener('click', () => { MODE='home'; SCROLL_TARGET='top'; render(); });
}

// ----- Practice -----
function startPractice(){
  const settings = loadSettings();
  const pool = buildPool(settings);
  if(pool.length === 0){ toast('No questions match the current filter'); return; }
  SESSION = {
    poolIds: pool.map(q => q.id),
    picked: [],
    sjt_queue: [],
    currentQid: null,
    picked_letter: null,
    revealed: false,
    answered_count: 0,
    correct_count: 0,          // can be fractional for SJT (0.5 per partial)
    correct_in_time_count: 0,  // same
  };
  advanceQuestion();
}
function resumePractice(){
  const s = loadSession();
  if(!s){ render(); return; }
  SESSION = s;
  // Reset the per-question timer on resume — the saved q_started_ms is stale
  // (could be hours old). Only reset if not already revealed.
  if(!SESSION.revealed) SESSION.q_started_ms = Date.now();
  MODE = 'practice';
  render();
}
function exitPractice(){
  stopTimer();
  if(SESSION && SESSION.picked.length > 1) saveSession(SESSION);
  else clearSession();
  SESSION = null;
  MODE = 'home';
  SCROLL_TARGET = 'top';
  render();
}
function stopTimer(){
  if(TIMER_ID){ clearInterval(TIMER_ID); TIMER_ID = null; }
}
function startTimer(){
  stopTimer();
  TIMER_ID = setInterval(() => {
    const el = document.getElementById('timer');
    const bar = document.getElementById('time-bar');
    if(!el || !SESSION || !SESSION.q_started_ms) return;
    const elapsed = Date.now() - SESSION.q_started_ms;
    const targetMs = effectiveTargetMs();
    const pct = Math.max(0, 100 - (elapsed / targetMs * 100));
    const remaining = Math.max(0, targetMs - elapsed);
    el.textContent = remaining > 0 ? fmtTime(remaining) : '-' + fmtTime(elapsed - targetMs);
    el.className = 'tmr';
    if(elapsed > targetMs) el.className = 'tmr over';
    else if(elapsed > targetMs * 0.8) el.className = 'tmr warn';
    if(bar){
      bar.style.width = pct + '%';
      bar.className = 'time-bar';
      if(pct <= 0) bar.className = 'time-bar over';
      else if(pct < 20) bar.className = 'time-bar warn';
    }
  }, 500);
}
function advanceQuestion(){
  // SJT: if there's a queued reaction from the current situation, show it next
  if(SESSION.sjt_queue && SESSION.sjt_queue.length > 0){
    const nextId = SESSION.sjt_queue.shift();
    SESSION.currentQid = nextId;
    SESSION.picked.push(nextId);
    SESSION.picked_letter = null;
    SESSION.revealed = false;
    SESSION.sjt_first_reaction = false;  // B/C/D → normal time
    SESSION.q_started_ms = Date.now();
    SESSION.q_elapsed_ms = null;
    saveSession(SESSION);
    MODE = 'practice';
    SCROLL_TARGET = 'top';
    render();
    return;
  }

  const pool = DB.questions.filter(q => SESSION.poolIds.includes(q.id));
  const excluded = new Set(SESSION.picked);
  // Allow recycling once we've seen everything once in this session
  let next = pickNext(pool, excluded);
  if(!next && pool.length > 0){
    SESSION.picked = [];          // recycle
    SESSION.sjt_queue = [];       // clear SJT queue too
    next = pickNext(pool, new Set());
  }
  if(!next){ stopTimer(); toast('No more questions'); MODE='home'; SESSION=null; clearSession(); render(); return; }

  // SJT: queue all reactions of this situation in data order (pre-balanced in JSON)
  if(next.type === 'sjt' && next.set_id){
    const siblings = pool
      .filter(q => q.set_id === next.set_id && !excluded.has(q.id))
      .sort((a,b) => a.id.localeCompare(b.id));
    // First one is shown now, rest go into the queue
    next = siblings[0];
    SESSION.sjt_queue = siblings.slice(1).map(q => q.id);
    // Mark all as picked so they won't be re-selected by pickNext
    for(const s of siblings){ SESSION.picked.push(s.id); }
    SESSION.sjt_first_reaction = true;  // Reaction 1 → double time for reading situation
  } else {
    SESSION.picked.push(next.id);
    SESSION.sjt_first_reaction = false;
  }

  SESSION.currentQid = next.id;
  SESSION.picked_letter = null;
  SESSION.revealed = false;
  SESSION.q_started_ms = Date.now();
  SESSION.q_elapsed_ms = null;
  saveSession(SESSION);
  MODE = 'practice';
  SCROLL_TARGET = 'top';
  render();
}
function pickAnswer(letter){
  if(SESSION.revealed) return;
  SESSION.picked_letter = letter;
  render();
}
// Effective target time:
//   - SJT: 90s for the first reaction of a situation (reading time), 40s for r2/r3/r4.
//     If a question carries its own `target_sec`, that value wins.
//   - Non-SJT: user-configurable default from settings.
function effectiveTargetMs(){
  const q = DB && SESSION ? DB.questions.find(x => x.id === SESSION.currentQid) : null;
  if(q && q.type === 'sjt'){
    if(typeof q.target_sec === 'number') return q.target_sec * 1000;
    return (SESSION.sjt_first_reaction ? 90 : 40) * 1000;
  }
  const base = (loadSettings().targetSec || 120) * 1000;
  return base;
}

// SJT partial scoring: exact = 1, ±1 neighbor = 0.5, else = 0
const SJT_SCALE = ['A','B','C','D','E'];  // -- - +/- + ++
function sjtScore(picked, correct){
  const pi = SJT_SCALE.indexOf(picked);
  const ci = SJT_SCALE.indexOf(correct);
  if(pi < 0 || ci < 0) return 0;
  const dist = Math.abs(pi - ci);
  if(dist === 0) return 1;
  if(dist === 1) return 0.5;
  return 0;
}

function submitAnswer(){
  if(!SESSION.picked_letter || SESSION.revealed) return;
  const q = DB.questions.find(x => x.id === SESSION.currentQid);
  const elapsed = Date.now() - (SESSION.q_started_ms || Date.now());
  const targetMs = effectiveTargetMs();
  const withinTime = elapsed <= targetMs;

  // SJT uses partial scoring (0 / 0.5 / 1); other types are 0 or 1
  let isCorrect;
  let sjtPts = null;
  let score;
  if(q.type === 'sjt'){
    sjtPts = sjtScore(SESSION.picked_letter, q.correct);
    score = sjtPts;
    isCorrect = sjtPts >= 1;  // only exact match counts as "correct" for pickNext tiering
  } else {
    isCorrect = SESSION.picked_letter === q.correct;
    score = isCorrect ? 1 : 0;
  }

  recordAnswer(q.id, score, elapsed, withinTime);
  SESSION.revealed = true;
  SESSION.q_elapsed_ms = elapsed;
  SESSION.q_within_time = withinTime;
  SESSION.q_sjt_pts = sjtPts;
  SESSION.answered_count++;
  // Credit: SJT partial = 0.5, SJT exact = 1, other correct = 1, else 0
  const credit = (sjtPts != null) ? sjtPts : (isCorrect ? 1 : 0);
  // Always add credit to correct count (even if over time)
  SESSION.correct_count = (SESSION.correct_count||0) + credit;
  // Only add credit to in-time if within time
  if(withinTime && credit > 0) SESSION.correct_in_time_count = (SESSION.correct_in_time_count||0) + credit;
  stopTimer();
  saveSession(SESSION);
  SCROLL_TARGET = 'explanation';
  render();
}
function renderPractice(root){
  const q = DB.questions.find(x => x.id === SESSION.currentQid);
  if(!q){ MODE='home'; render(); return; }
  const stats = loadStats();
  const qs = stats[q.id] || { attempts:0, correct:0 };
  const settings = loadSettings();
  const targetMs = effectiveTargetMs();

  // SJT situation context
  let situationHtml = '';
  if(q.type === 'sjt' && q.situation){
    situationHtml = `<div class="sjt-situation">${esc(q.situation)}</div>`;
  }

  const figsHtml = (q.figures || []).map(f =>
    `<img class="qfig" src="${esc(f)}" alt="figure" loading="lazy">`
  ).join('');

  // SJT: compact horizontal score buttons; others: vertical option cards
  const SJT_LABELS = {'A':'--','B':'-','C':'+/-','D':'+','E':'++'};
  let optsHtml;
  if(q.type === 'sjt'){
    optsHtml = `<div class="sjt-scores">${q.options.map(o => {
      let cls = 'sjt-btn';
      if(SESSION.revealed){
        cls += ' dis';
        if(o.letter === q.correct) cls += ' ok';
        else if(o.letter === SESSION.picked_letter){
          if(SESSION.q_sjt_pts === 0.5) cls += ' partial';
          else cls += ' ko';
        }
        else cls += ' fd';
      } else if(o.letter === SESSION.picked_letter){
        cls += ' sel';
      }
      return `<div class="${cls}" data-letter="${esc(o.letter)}">${SJT_LABELS[o.letter] || esc(o.text)}</div>`;
    }).join('')}</div>`;
  } else {
    // Shuffle numerical options; persist order in session so it's stable across re-renders
    if(!SESSION.shuffledOpts || SESSION.shuffledOpts.qid !== q.id){
      SESSION.shuffledOpts = { qid: q.id, order: shuffle(q.options) };
    }
    const displayOpts = SESSION.shuffledOpts.order;
    const letters = 'ABCDE';
    optsHtml = displayOpts.map((o, i) => {
      let cls = 'opt';
      if(SESSION.revealed){
        cls += ' dis';
        if(o.letter === q.correct) cls += ' ok';
        else if(o.letter === SESSION.picked_letter) cls += ' ko';
        else cls += ' fd';
      } else if(o.letter === SESSION.picked_letter){
        cls += ' sel';
      }
      return `<div class="${cls}" data-letter="${esc(o.letter)}">
        <div class="ol">${letters[i]}</div>
        <div class="ot">${esc(o.text)}</div>
      </div>`;
    }).join('');
  }

  // Feedback with time info
  let explHtml = '';
  if(SESSION.revealed){
    const ok = SESSION.picked_letter === q.correct;
    const timeStr = fmtTime(SESSION.q_elapsed_ms);
    const lateTag = !SESSION.q_within_time ? ` · over target (${fmtTime(targetMs)})` : '';
    let head, explCls;
    if(q.type === 'sjt'){
      const pts = SESSION.q_sjt_pts;
      if(pts >= 1){
        head = `✓ Exact — 1 pt · ${timeStr}${lateTag}`;
        explCls = 'eok';
      } else if(pts === 0.5){
        head = `~ Voisin — 0.5 pt · answer: ${SJT_LABELS[q.correct]} · ${timeStr}${lateTag}`;
        explCls = 'epartial';
      } else {
        head = `✗ Incorrect — 0 pt · answer: ${SJT_LABELS[q.correct]} · ${timeStr}${lateTag}`;
        explCls = 'eko';
      }
    } else {
      const correctOpt = q.options.find(o => o.letter === q.correct);
      const correctText = correctOpt ? correctOpt.text : q.correct;
      if(ok && SESSION.q_within_time){ head = `✓ Correct in ${timeStr}`; explCls = 'eok'; }
      else if(ok){ head = `✓ Correct, but late — ${timeStr}${lateTag}`; explCls = 'eok'; }
      else { head = `✗ Incorrect — answer: ${esc(correctText)} · ${timeStr}${lateTag}`; explCls = 'eko'; }
    }
    const expl = q.explanation ? `<br>${esc(q.explanation).replace(/\n/g, '<br>')}` : '';
    explHtml = `<div class="expl ${explCls}"><strong>${head}</strong>${expl}</div>`;
  }

  // Per-question history label (correct can be fractional for SJT partial credit)
  let accStr = '';
  if(qs.attempts > 0){
    const correctDisp = Number.isInteger(qs.correct) ? qs.correct : qs.correct.toFixed(1);
    accStr = ` · ${correctDisp}/${qs.attempts}`;
    if(qs.best_time_ms != null) accStr += ` · best ${fmtTime(qs.best_time_ms)}`;
  }

  // Timer display: countdown from target, or frozen remaining on reveal
  let initialTimer;
  if(SESSION.revealed){
    const rem = Math.max(0, targetMs - SESSION.q_elapsed_ms);
    initialTimer = rem > 0 ? fmtTime(rem) : '-' + fmtTime(SESSION.q_elapsed_ms - targetMs);
  } else {
    const e = Date.now() - (SESSION.q_started_ms || Date.now());
    const rem = Math.max(0, targetMs - e);
    initialTimer = rem > 0 ? fmtTime(rem) : '-' + fmtTime(e - targetMs);
  }
  let timerCls = 'tmr';
  let barPct, barCls;
  if(SESSION.revealed){
    if(!SESSION.q_within_time){ timerCls = 'tmr over'; barPct = 0; barCls = 'over'; }
    else { barPct = Math.max(0, 100 - (SESSION.q_elapsed_ms / targetMs * 100)); barCls = barPct < 20 ? 'warn' : ''; }
  } else {
    const e = Date.now() - (SESSION.q_started_ms || Date.now());
    barPct = Math.max(0, 100 - (e / targetMs * 100));
    barCls = barPct < 20 ? 'warn' : barPct <= 0 ? 'over' : '';
  }

  root.appendChild($(`
    <div class="practice">
      <div class="hdr">
        <div class="hdr-row">
          <div class="progress">Q${SESSION.answered_count + (SESSION.revealed?0:1)} · ${Number.isInteger(SESSION.correct_count)?SESSION.correct_count:SESSION.correct_count.toFixed(1)}/${SESSION.answered_count} ✓ · ${Number.isInteger(SESSION.correct_in_time_count||0)?(SESSION.correct_in_time_count||0):(SESSION.correct_in_time_count||0).toFixed(1)}/${SESSION.answered_count} ⏱</div>
          <div class="${timerCls}" id="timer">${initialTimer}</div>
          <button class="exit" id="exit-btn">Exit</button>
        </div>
        <div class="time-bar-wrap"><div class="time-bar ${barCls}" id="time-bar" style="width:${barPct}%"></div></div>
      </div>
      <div class="qmeta">
        <span class="qref">${esc(q.book_ref || '')}</span>
        <span>${esc(q.source)} · target ${fmtTime(targetMs)}${accStr}</span>
      </div>
      ${situationHtml}
      <div class="qfigs">${figsHtml}</div>
      ${q.question_html
        ? `<div class="qtext html-mode">${q.question_html}</div>`
        : `<div class="qtext">${esc(q.question || '')}</div>`
      }
      <div class="opts">${optsHtml}</div>
      ${explHtml}
      <div class="nav">
        ${!SESSION.revealed
          ? `<button class="btn btn-primary" id="submit-btn" ${SESSION.picked_letter ? '' : 'disabled'}>Submit</button>`
          : `<button class="btn btn-primary" id="next-btn">Next →</button>`}
      </div>
    </div>
  `));

  root.querySelectorAll('.opt, .sjt-btn').forEach(el => {
    el.addEventListener('click', () => pickAnswer(el.dataset.letter));
  });
  root.querySelector('#exit-btn').addEventListener('click', exitPractice);
  root.querySelector('#submit-btn')?.addEventListener('click', submitAnswer);
  root.querySelector('#next-btn')?.addEventListener('click', advanceQuestion);

  // Run the live ticker only while waiting for an answer
  if(!SESSION.revealed) startTimer();
  else stopTimer();
}

// ============================================================================
// Init
// ============================================================================
function init(){
  // questions.js sets window.QUESTIONS_DB synchronously via the <script> tag
  if(!window.QUESTIONS_DB){
    document.getElementById('root').innerHTML = `
      <div class="empty">
        <h2>Could not load questions.js</h2>
        <p style="font-size:13px;margin-top:8px">
          Make sure <code>index.html</code>, <code>questions.js</code> and the
          <code>images/</code> folder are in the same directory.<br><br>
          To regenerate questions.js after editing data, run
          <code>python3 ingest/build_questions_json.py</code>.
        </p>
      </div>`;
    return;
  }
  DB = window.QUESTIONS_DB;

  // One-time cleanup: purge stats for removed old SJT questions
  const CLEANUP_KEY = 'pt_sjt_cleanup_v2';
  if(!localStorage.getItem(CLEANUP_KEY)){
    const stats = loadStats();
    const validIds = new Set(DB.questions.map(q => q.id));
    let purged = 0;
    for(const id of Object.keys(stats)){
      if(!validIds.has(id)){ delete stats[id]; purged++; }
    }
    if(purged) saveStats(stats);
    localStorage.setItem(CLEANUP_KEY, '1');
  }

  render();
}
init();
</script>
