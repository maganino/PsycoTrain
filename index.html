<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PsycoTrain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F4; --card:#fff; --border:#E4E2DA;
  --text:#1a1a18; --muted:#888; --sub:#3d3d3a;
  --accent:#185FA5; --accentbg:#E6F1FB; --accentbdr:#85B7EB;
  --green:#0F6E56; --greenbg:#E1F5EE; --greenbdr:#5DCAA5;
  --red:#A32D2D; --redbg:#FCEBEB; --redbdr:#F09595;
  --amber:#854F0B; --amberbg:#FAEEDA;
}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-text-size-adjust:100%}
.container{max-width:760px;margin:0 auto;padding:14px 16px 90px}

/* Home */
.home h1{font-size:24px;font-weight:800;margin:6px 0 2px}
.home .sub{font-size:13px;color:var(--muted);margin-bottom:14px}
.stats-row{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.stat-chip{flex:1;min-width:90px;background:var(--card);border:1px solid var(--border);padding:10px 12px;border-radius:12px;text-align:center}
.stat-chip strong{display:block;font-size:18px;color:var(--accent)}
.stat-chip .lbl{font-size:11px;color:var(--muted);margin-top:2px}

.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.section h3{font-size:13px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 12px;border-radius:999px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.dis{opacity:.4;cursor:not-allowed}
.toggle-row{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--sub);font-weight:600}
.toggle{position:relative;width:42px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(18px)}

.actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.btn{padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:disabled{background:var(--muted);cursor:not-allowed}
.btn-secondary{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.btn-small{padding:9px 14px;font-size:13px;font-weight:600}

/* Practice */
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 10px;border-bottom:1px solid var(--border);margin:-14px -16px 12px;padding-left:16px;padding-right:16px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.hdr .progress{font-size:13px;color:var(--muted);font-weight:600}
.hdr .exit{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub)}
.tmr{font-family:'Courier New',monospace;font-size:15px;font-weight:700;color:var(--green);background:var(--greenbg);padding:5px 11px;border-radius:8px}
.tmr.warn{color:var(--amber);background:var(--amberbg)}
.tmr.over{color:var(--red);background:var(--redbg)}
.time-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.time-bar{height:100%;border-radius:3px;transition:width .5s linear,background .3s;background:var(--green)}
.time-bar.warn{background:var(--amber)}
.time-bar.over{background:var(--red)}
.timecfg{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--sub);font-weight:600}
.timecfg input{width:64px;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);font-family:inherit;font-size:14px;font-weight:600;text-align:center}
.timetag{font-size:11px;color:var(--muted);margin-left:6px}
.timetag.over{color:var(--amber)}
.qmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px}
.qref{background:#EEEDFE;padding:2px 9px;border-radius:20px;font-size:10px;color:#534AB7;font-weight:600;letter-spacing:.3px}
.qfigs img{width:100%;max-width:100%;border-radius:10px;display:block;border:1px solid var(--border);margin-bottom:8px;background:#fff}
.qtext{font-size:15px;font-weight:600;margin:10px 0 12px;line-height:1.45;white-space:pre-wrap}
.qtext.html-mode{white-space:normal}
.q-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;font-weight:400}
.q-table th,.q-table td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.q-table th{background:var(--bg);font-weight:700;font-size:13px;color:var(--accent)}
.q-table td{background:var(--card)}
/* SJT situation box */
.sjt-situation{font-size:14px;line-height:1.65;color:var(--sub);padding:14px 16px;background:var(--card);border-radius:12px;border-left:3.5px solid #534AB7;margin-bottom:14px}
.sjt-situation .sjt-title{font-weight:700;font-size:13px;color:#534AB7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
/* SJT compact score row */
.sjt-scores{display:flex;gap:8px;justify-content:center;margin:14px 0}
.sjt-btn{flex:1;max-width:80px;padding:12px 6px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-size:15px;font-weight:700;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s,background .15s,transform .08s;color:var(--sub)}
.sjt-btn:active:not(.dis){transform:scale(.95)}
.sjt-btn.sel{border-color:var(--accent);background:var(--accentbg);color:var(--accent)}
.sjt-btn.ok{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.sjt-btn.ko{border-color:var(--red);background:var(--redbg);color:var(--red)}
.sjt-btn.partial{border-color:#E0B860;background:var(--amberbg);color:var(--amber)}
.sjt-btn.fd{opacity:.4}
.sjt-btn.dis{cursor:default}
.opt{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-radius:12px;border:2px solid var(--border);background:var(--card);margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .08s,border-color .15s,background .15s}
.opt:active:not(.dis){transform:scale(.985)}
.opt.sel{border-color:var(--accent);background:var(--accentbg)}
.opt.ok{border-color:var(--green);background:var(--greenbg)}
.opt.ko{border-color:var(--red);background:var(--redbg)}
.opt.fd{opacity:.55}
.opt.dis{cursor:default}
.ol{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);font-weight:700;font-size:13px;flex-shrink:0;margin-top:1px}
.opt.sel .ol{background:var(--accent);color:#fff;border-color:var(--accent)}
.opt.ok .ol{background:var(--green);color:#fff;border-color:var(--green)}
.opt.ko .ol{background:var(--red);color:#fff;border-color:var(--red)}
.ot{font-size:14px;flex:1;line-height:1.4}
.expl{padding:13px 14px;border-radius:12px;margin-top:12px;font-size:13px;line-height:1.55;white-space:pre-wrap}
.expl.eok{background:var(--greenbg);border:1px solid var(--greenbdr);color:#0a4f3d}
.expl.epartial{background:var(--amberbg);border:1px solid #E0B860;color:#6B4A0A}
.expl.eko{background:var(--redbg);border:1px solid var(--redbdr);color:#7a1f1f}
.opt.partial{border-color:#E0B860;background:var(--amberbg)}
.opt.partial .ol{background:#BA7517;color:#fff;border-color:#BA7517}
.expl strong{font-weight:700}

.nav{display:flex;gap:8px;margin-top:14px}
.nav .btn{flex:1}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;z-index:100;pointer-events:none}
.toast.show{opacity:.95}

/* Per-type stats */
.type-stats-section .stats-row{margin:6px 0 0}
.type-stats-section .stat-chip{min-width:70px;padding:8px 10px}
.type-stats-section .stat-chip strong{font-size:15px}
.type-stats-section .hdr-row{display:flex;justify-content:space-between;align-items:center}
.btn-reset{padding:5px 10px;border-radius:8px;border:1.5px solid var(--redbdr);background:var(--redbg);color:var(--red);font-size:11px;font-weight:600;cursor:pointer}
.btn-reset:hover{background:var(--red);color:#fff}

/* Compact home (v2) */
.dash-stats{display:flex;gap:8px;margin:10px 0 10px;flex-wrap:wrap}
.dash-stats .stat-chip{flex:1;min-width:100px;padding:12px 10px}

.pl-bar{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;padding:2px 2px 8px;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.pl-bar .chip{flex:0 0 auto;white-space:nowrap}

.action-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ia-btn{width:38px;height:38px;border-radius:999px;border:1.5px solid var(--border);background:var(--card);font-size:16px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s,color .15s;color:var(--sub);padding:0;flex-shrink:0}
.ia-btn:hover{border-color:var(--accent);color:var(--accent)}
.ia-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ia-btn.danger{border-color:var(--redbdr);color:var(--red)}
.ia-btn.danger:hover{background:var(--redbg);color:var(--red);border-color:var(--red)}
.ia-btn.warn-tri{color:var(--amber);font-size:18px}
.ia-btn.warn-tri.on{color:#fff;background:var(--amber);border-color:var(--amber)}

.time-slider-wrap{flex:1;display:flex;align-items:center;gap:10px;padding:6px 14px;border:1.5px solid var(--border);border-radius:999px;background:var(--card);min-width:180px;height:38px}
.time-slider-wrap input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:4px;min-width:80px}
.time-slider-wrap .tval{font-family:'Courier New',monospace;font-size:12px;font-weight:700;color:var(--accent);min-width:44px;text-align:right}

.start-row{display:flex;gap:8px;margin-top:10px}
.start-row .btn{flex:1}

.mini-row{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.ia-mini{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:14px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s,background .15s}
.ia-mini:hover{color:var(--accent);border-color:var(--accent)}
.ia-mini.danger:hover{color:var(--red);border-color:var(--red);background:var(--redbg)}

/* MCQ compact section (modes + drill + topic stats under the action row) */
.mcq-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.mcq-section .mode-grid{margin-top:0;margin-bottom:0}
.mcq-section .drill-pick{margin-top:8px}
.mcq-section .topic-stats{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* Empty state */
.empty{text-align:center;padding:30px 16px;color:var(--muted)}
.empty h2{font-size:18px;color:var(--text);margin-bottom:6px}

@media(max-width:380px){
  .container{padding:12px 12px 90px}
  .qtext{font-size:14px}
  .ot{font-size:13px}
  .stat-chip{min-width:75px;padding:8px 8px}
  .stat-chip strong{font-size:16px}
}
/* Lock screen */
#lockscreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
#lockscreen.hidden{display:none}
.lock-box{text-align:center;padding:24px;max-width:320px;width:100%}
.lock-box h1{font-size:22px;font-weight:800;margin-bottom:4px}
.lock-box .lock-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.lock-box input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--card);font-family:inherit;text-align:center}
.lock-box input:focus{outline:none;border-color:var(--accent)}
.lock-box button{width:100%;margin-top:10px;padding:13px;border-radius:10px;border:none;background:var(--text);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.lock-box .lock-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.lock-box.shake{animation:shake .4s}

/* Guide page */
.guide{max-width:700px;margin:0 auto}
.guide h1{font-size:22px;font-weight:800;margin:6px 0 4px}
.guide .back-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--sub);margin-bottom:12px;display:inline-block}
.guide h2{font-size:16px;font-weight:700;color:var(--accent);margin:18px 0 8px;padding-bottom:4px;border-bottom:1.5px solid var(--border)}
.guide h3{font-size:14px;font-weight:700;color:var(--sub);margin:14px 0 6px}
.guide p,.guide li{font-size:14px;line-height:1.6;color:var(--sub)}
.guide ul{padding-left:18px;margin:6px 0}
.guide li{margin-bottom:4px}
.guide .score-tag{display:inline-block;padding:2px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-right:4px}
.guide .score-pp{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr)}
.guide .score-p{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.guide .score-n{background:var(--amberbg);color:var(--amber);border:1px solid #e0b860}
.guide .score-m{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.guide .score-mm{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr)}
.flow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:12px 0;overflow-x:auto}
.flow-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding:10px 12px;border-radius:10px;border-left:3.5px solid var(--accent);background:var(--bg)}
.flow-step.red{border-left-color:var(--red)}
.flow-step.green{border-left-color:var(--green)}
.flow-step.amber{border-left-color:var(--amber)}
.flow-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flow-step.red .flow-num{background:var(--red)}
.flow-step.green .flow-num{background:var(--green)}
.flow-step.amber .flow-num{background:var(--amber)}
.flow-body{flex:1;font-size:13px;line-height:1.55}
.flow-body strong{color:var(--text)}
.flow-arrow{text-align:center;color:var(--muted);font-size:18px;margin:2px 0}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.comp-card h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.comp-card ul{padding-left:14px;margin:0}
.comp-card li{font-size:12px;line-height:1.5;color:var(--sub);margin-bottom:2px}
.comp-card.primary{border-color:var(--accentbdr);background:var(--accentbg)}
@media(max-width:500px){.comp-grid{grid-template-columns:1fr}}

/* Quick decision flowchart (visual) */
.qflow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 12px;margin:12px 0}
.qflow-row{display:flex;justify-content:center;align-items:stretch;gap:8px;margin-bottom:6px}
.qflow-q{flex:1;max-width:280px;background:var(--accentbg);border:2px solid var(--accentbdr);border-radius:12px;padding:12px 10px;text-align:center}
.qflow-q .acr{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.6px;margin-bottom:2px}
.qflow-q .ttl{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.qflow-q .hint{font-size:11px;color:var(--muted);line-height:1.35}
.qflow-fail{flex:0 0 90px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-size:11px;color:var(--muted);font-weight:600}
.qflow-fail .arr{font-size:18px;color:var(--muted);margin-bottom:2px}
.qflow-fail .badge{display:inline-block;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:800;border:2px solid}
.qflow-fail .badge.mm{background:var(--redbg);color:var(--red);border-color:var(--redbdr)}
.qflow-fail .badge.m{background:#fff3e0;color:#e65100;border-color:#ffcc80}
.qflow-fail .badge.n{background:var(--amberbg);color:var(--amber);border-color:#e0b860}
.qflow-fail .badge.p{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.qflow-fail .badge.pp{background:var(--greenbg);color:var(--green);border-color:var(--greenbdr)}
.qflow-down{text-align:center;color:var(--accent);font-size:22px;font-weight:700;margin:2px 0;line-height:1}
.qflow-final{text-align:center;margin-top:8px}
.qflow-final .badge{display:inline-block;padding:8px 18px;border-radius:10px;font-size:16px;font-weight:800;background:var(--greenbg);color:var(--green);border:2px solid var(--greenbdr)}
@media(max-width:500px){
  .qflow-row{flex-direction:column;align-items:center}
  .qflow-fail{flex:0 0 auto;flex-direction:row;gap:8px;margin-top:4px}
  .qflow-fail .arr{transform:rotate(90deg);margin:0}
}

/* Worked examples */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid var(--border)}
.ex-card.pp{border-left-color:var(--green)}
.ex-card.p{border-left-color:#2e7d32}
.ex-card.n{border-left-color:var(--amber)}
.ex-card.m{border-left-color:#e65100}
.ex-card.mm{border-left-color:var(--red)}
.ex-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ex-head .badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:800}
.ex-head .badge.pp{background:var(--greenbg);color:var(--green)}
.ex-head .badge.p{background:#e8f5e9;color:#2e7d32}
.ex-head .badge.n{background:var(--amberbg);color:var(--amber)}
.ex-head .badge.m{background:#fff3e0;color:#e65100}
.ex-head .badge.mm{background:var(--redbg);color:var(--red)}
.ex-head .label{font-size:13px;font-weight:700;color:var(--text)}
.ex-sit{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.5}
.ex-react{font-size:13px;line-height:1.55;color:var(--sub);padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.ex-why{font-size:12px;line-height:1.55;color:var(--sub)}
.ex-why strong{color:var(--text)}
.ex-signals{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ex-signals span{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--sub)}

/* ========= EPSO (MCQ) ========= */
/* Difficulty + topic tags */
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.tag.easy{background:var(--greenbg);color:var(--green)}
.tag.medium{background:var(--amberbg);color:var(--amber)}
.tag.hard{background:var(--redbg);color:var(--red)}
.tag.topic{background:var(--accentbg);color:var(--accent)}

/* Mode selection row on home */
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.mode-btn{padding:12px 8px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.mode-btn:hover{border-color:var(--accent)}
.mode-btn .emoji{font-size:18px;display:block;margin-bottom:3px}
.mode-btn .title{font-size:13px;font-weight:700;color:var(--text);display:block}
.mode-btn .sub{font-size:11px;color:var(--muted);display:block;margin-top:2px;line-height:1.3}

<body>

<!-- Lock screen -->
<div id="lockscreen">
  <div class="lock-box" id="lockbox">
    <h1>PsycoTrain</h1>
    <p class="lock-sub">Enter password to continue</p>
    <input type="password" id="lock-pw" placeholder="Password" autocomplete="off" autofocus>
    <button id="lock-btn">Unlock</button>
    <p class="lock-err" id="lock-err"></p>
  </div>
</div>

<!-- App (hidden until unlocked) -->
<div class="container" id="root" style="display:none"></div>
<div class="toast" id="toast"></div>
<input type="file" id="stats-file-input" accept=".json,application/json" style="display:none">

<!-- Load the question database via a script tag (works from file:// — fetch() does not). -->
<script src="./questions.js"></script>
<script>
'use strict';

// ============================================================================
// Lock screen
// ============================================================================
const PASS_HASH = '50127e8f738d125f5be2b9db573261a21625065beca4a349747114230460719a';
const LS_UNLOCK = 'pt_unlocked';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function unlockApp() {
  document.getElementById('lockscreen').classList.add('hidden');
  document.getElementById('root').style.display = '';
  sessionStorage.setItem(LS_UNLOCK, '1');
}

async function tryUnlock() {
  const pw = document.getElementById('lock-pw').value;
  if (!pw) return;
  const hash = await sha256(pw);
  if (hash === PASS_HASH) {
    unlockApp();
  } else {
    document.getElementById('lock-err').textContent = 'Wrong password';
    const box = document.getElementById('lockbox');
    box.classList.remove('shake');
    void box.offsetWidth;
    box.classList.add('shake');
  }
}

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem(LS_UNLOCK) === '1') {
  unlockApp();
}

document.getElementById('lock-btn').addEventListener('click', tryUnlock);
document.getElementById('lock-pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// ============================================================================
// State and storage
// ============================================================================
const LS_STATS    = 'pt_stats_v1';
const LS_SESSION  = 'pt_session_v1';
const LS_SETTINGS = 'pt_settings_v1';

let DB = null;       // {version, types, sources, questions: [...]}
let MODE = 'home';   // 'home' | 'guide' | 'practice'
let GUIDE_KEY = null;// active playlist key when MODE === 'guide' (drives which tips page)
let SESSION = null;  // see startPractice() for shape
let TIMER_ID = null; // setInterval handle for the per-question ticker

// ----- localStorage helpers -----
function lsGet(k){ try{ const s=localStorage.getItem(k); return s?JSON.parse(s):null; }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); return true; }catch(e){ alert('Save failed: '+e.message); return false; } }
function lsDel(k){ try{ localStorage.removeItem(k); }catch(e){} }

// Fisher-Yates shuffle (returns new array)
function shuffle(arr){ const a = [...arr]; for(let i = a.length-1; i > 0; i--){ const j = Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function loadStats(){ return lsGet(LS_STATS) || {}; }
function saveStats(s){ return lsSet(LS_STATS, s); }
// Default target times per question type (in seconds)
const DEFAULT_TARGET_SEC = {
  'sjt': 55,                // ~75 min / ~80 reactions
  'numerical_bosa': 105,    // ~50 min / ~28 questions
  'numerical': 120,         // existing default
};
function defaultTargetForType(type){
  return DEFAULT_TARGET_SEC[type] || 120;
}
function loadSettings(){
  const s = lsGet(LS_SETTINGS) || {};
  // Migration: old layouts stored `type` + `source` separately. A saved source
  // is a playlist key, so promote it. `type` alone (no source) is dropped.
  let playlist = s.playlist ?? null;
  if(playlist == null && s.source) playlist = s.source;
  return {
    playlist,
    weakOnly: s.weakOnly ?? false,
    targetSec: s.targetSec ?? 120,   // only affects non-SJT; SJT uses per-question target_sec
  };
}
function saveSettings(s){ return lsSet(LS_SETTINGS, s); }
function loadSession(){ return lsGet(LS_SESSION); }
function saveSession(s){ return lsSet(LS_SESSION, s); }
function clearSession(){ lsDel(LS_SESSION); }

// ----- Per-question stats -----
function qStat(qid){
  return loadStats()[qid] || {
    attempts:0, correct:0, correct_within_time:0,
    last_correct:null, last_within_time:null,
    last_time_ms:null, best_time_ms:null, last_ts:0
  };
}
// score: 0..1 (SJT can be 0 / 0.5 / 1, others are 0 or 1)
function recordAnswer(qid, score, timeMs, withinTime){
  const s = loadStats();
  const r = s[qid] || {
    attempts:0, correct:0, correct_within_time:0,
    last_correct:null, last_within_time:null,
    last_time_ms:null, best_time_ms:null, last_ts:0
  };
  r.attempts++;
  // Accumulate fractional score (neighbor match on SJT = 0.5)
  r.correct = (r.correct || 0) + score;
  if(withinTime) r.correct_within_time = (r.correct_within_time || 0) + score;
  if(score > 0 && timeMs != null && (r.best_time_ms == null || timeMs < r.best_time_ms)){
    r.best_time_ms = timeMs;
  }
  r.last_score = score;                // 0, 0.5, or 1
  r.last_correct = score >= 1;         // boolean, used by pickNext tiering
  r.last_within_time = withinTime;
  r.last_time_ms = timeMs;
  r.last_ts = Date.now();
  s[qid] = r;
  saveStats(s);
}
// Normalize a stats entry to a numeric score (backward-compat for old boolean-only entries)
function statScore(s){
  if(!s || s.attempts === 0) return 0;
  if(typeof s.last_score === 'number') return s.last_score;
  return s.last_correct ? 1 : 0;
}
function fmtTime(ms){
  if(ms == null) return '—';
  const s = Math.round(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}

// ============================================================================
// Question selection (tiered priority)
// ============================================================================
function buildPool(filters){
  let pool = DB.questions.slice();
  if(filters.playlist) pool = pool.filter(q => q.source === filters.playlist);
  if(filters.weakOnly){
    const stats = loadStats();
    pool = pool.filter(q => {
      const s = stats[q.id];
      if(!s || s.attempts === 0) return true;       // unseen counts as weak
      return s.correct / s.attempts < 0.6;
    });
  }
  return pool;
}

// Pick the next question id from the pool, applying tier priority:
//   Tier 1: never seen → random
//   Tier 2: last attempt was wrong → random
//   Tier 3: oldest viewed first
// `excludeIds` = set of qids already picked in this session (avoid immediate repeats)
function pickNext(pool, excludeIds){
  const stats = loadStats();
  const candidates = pool.filter(q => !excludeIds.has(q.id));
  if(candidates.length === 0) return null;

  const t1 = [], t2 = [], t3 = [];
  for(const q of candidates){
    const s = stats[q.id];
    if(!s || s.attempts === 0) t1.push(q);
    else if(s.last_correct === false) t2.push(q);
    else t3.push(q);
  }
  if(t1.length) return t1[Math.floor(Math.random()*t1.length)];
  if(t2.length) return t2[Math.floor(Math.random()*t2.length)];
  if(t3.length){
    t3.sort((a,b) => (stats[a.id]?.last_ts||0) - (stats[b.id]?.last_ts||0));
    return t3[0];
  }
  return null;
}

// ============================================================================
// Stats sync (Option 2 — manual save + manual load via file picker)
// ============================================================================
function mergeStatsFromObject(remote){
  if(!remote || typeof remote !== 'object'){
    toast('Invalid stats file'); return;
  }
  const local = loadStats();
  const merged = { ...local };
  let updated = 0;
  for(const qid in remote){
    const lr = local[qid];
    const rr = remote[qid];
    if(!lr || (rr.last_ts||0) > (lr.last_ts||0)){
      merged[qid] = rr;
      updated++;
    }
  }
  saveStats(merged);
  toast(updated > 0 ? `Merged ${updated} record(s) from stats.json` : 'Stats already up to date');
  render();
}

function pickStatsFile(){
  const input = document.getElementById('stats-file-input');
  input.value = '';
  input.onchange = (ev) => {
    const f = ev.target.files && ev.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const obj = JSON.parse(reader.result);
        mergeStatsFromObject(obj);
      }catch(e){
        toast('Could not parse: ' + e.message);
      }
    };
    reader.readAsText(f);
  };
  input.click();
}

function resetStatsForPlaylist(key){
  const p = playlistByKey(key);
  const label = p ? p.label : key;
  if(!confirm(`Reset all stats for "${label}"? This cannot be undone.`)) return;
  const stats = loadStats();
  const ids = DB.questions.filter(q => q.source === key).map(q => q.id);
  for(const id of ids) delete stats[id];
  saveStats(stats);
  clearSession();
  toast(`Stats reset for ${label}`);
  render();
}
function resetAllStats(){
  if(!confirm('Reset ALL stats for every test type? This cannot be undone.')) return;
  saveStats({});
  clearSession();
  toast('All stats reset');
  render();
}

function downloadStats(){
  const stats = loadStats();
  const blob = new Blob([JSON.stringify(stats, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stats.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Save stats.json into the app folder, overwriting any existing one');
}

// ============================================================================
// UI
// ============================================================================
const TYPE_LABELS = {
  'sjt': 'SJT (Collaborer)',
  'numerical_bosa': 'Numérique BOSA',
  'numerical': 'Numerical',
  'verbal': 'Verbal',
  'abstract': 'Abstract',
  'logical': 'Logical',
  'mcq': 'MCQ',
};
// EPSO MCQ topic slugs → human labels
const TOPIC_LABELS = {
  'eu_regulation':      'EU regulation',
  'framework':          'Framework',
  'data_architecture':  'Data architecture',
  'data_governance':    'Data governance',
  'data_policy':        'Data policy',
  'data_engineering':   'Data engineering',
  'data_platforms':     'Data platforms',
  'bi_reporting':       'BI & reporting',
  'master_data':        'Master & reference',
  'metadata_taxonomy':  'Metadata & taxonomy',
  'data_quality':       'Data quality',
  'data_security':      'Data security',
  'advanced_analytics': 'Advanced analytics',
};
function typeLabel(t){ return TYPE_LABELS[t] || t; }

// Playlists: one user-facing option per source. `type` is still used internally
// (scoring, per-question timing fallback) but no longer exposed as a filter.
const PLAYLISTS = [
  { key: 'BOSA_Num',         label: 'Raisonnement numérique',        type: 'numerical_bosa' },
  { key: 'BOSA_SJT',         label: 'SJT — Collaborer',              type: 'sjt' },
  { key: 'BOSA_SJT_BA_CRIT', label: 'SJT BA — Penser critique (PC2)',type: 'sjt' },
  { key: 'BOSA_SJT_BA_AGIL', label: 'SJT BA — Agilité (AG2)',        type: 'sjt' },
  { key: 'EPSO_AD426_DATA',  label: 'EPSO AD/426/25 — Data MCQ',     type: 'mcq' },
];
function playlistByKey(k){ return PLAYLISTS.find(p => p.key === k) || null; }
function $(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

let SCROLL_TARGET = 'top'; // 'top' | 'explanation' | 'none'
function render(){
  const root = document.getElementById('root');
  root.innerHTML = '';
  if(MODE === 'home') renderHome(root);
  else if(MODE === 'guide') renderGuide(root);
  else if(MODE === 'practice') renderPractice(root);
  else if(MODE === 'results') renderResults(root);
  if(SCROLL_TARGET === 'top') window.scrollTo(0, 0);
  else if(SCROLL_TARGET === 'explanation'){
    const el = root.querySelector('.expl') || root.querySelector('.nav');
    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  SCROLL_TARGET = 'none';
}

// ----- Home -----
function renderHome(root){
  const settings = loadSettings();
  const stats = loadStats();

  // Aggregate stats — global (uses fractional scores: SJT neighbor = 0.5)
  const total = DB.questions.length;
  let gAttempted = 0, gScoreSum = 0, gScoreInTimeSum = 0;
  for(const q of DB.questions){
    const s = stats[q.id];
    if(s && s.attempts > 0){
      gAttempted++;
      const sc = statScore(s);
      gScoreSum += sc;
      if(s.last_within_time) gScoreInTimeSum += sc;
    }
  }
  const globalStats = {
    attempted: gAttempted,
    total,
    accuracy: gAttempted > 0 ? Math.round(gScoreSum / gAttempted * 100) : 0,
    accuracyInTime: gAttempted > 0 ? Math.round(gScoreInTimeSum / gAttempted * 100) : 0,
  };

  // Per-source counts + stats (one entry per playlist key).
  const sourceCounts = {};
  const sourceStats = {};
  for(const q of DB.questions){
    sourceCounts[q.source] = (sourceCounts[q.source] || 0) + 1;
    if(!sourceStats[q.source]) sourceStats[q.source] = {total:0, attempted:0, scoreSum:0, scoreInTimeSum:0};
    sourceStats[q.source].total++;
    const s = stats[q.id];
    if(s && s.attempts > 0){
      sourceStats[q.source].attempted++;
      const sc = statScore(s);
      sourceStats[q.source].scoreSum += sc;
      if(s.last_within_time) sourceStats[q.source].scoreInTimeSum += sc;
    }
  }

  const pool = buildPool(settings);
  const activePlaylist = settings.playlist ? playlistByKey(settings.playlist) : null;
  const isMcq = !!(activePlaylist && activePlaylist.type === 'mcq');
  const isSjt = !!(activePlaylist && activePlaylist.type === 'sjt');
  const hasGuide = isSjt || isMcq;

  // The dashboard row adapts to the active playlist.
  let dash;
  if(activePlaylist){
    const ss = sourceStats[activePlaylist.key] || {total:0, attempted:0, scoreSum:0, scoreInTimeSum:0};
    dash = {
      attempted: ss.attempted,
      total: ss.total,
      accuracy: ss.attempted > 0 ? Math.round(ss.scoreSum / ss.attempted * 100) : 0,
      accuracyInTime: ss.attempted > 0 ? Math.round(ss.scoreInTimeSum / ss.attempted * 100) : 0,
    };
  } else {
    dash = globalStats;
  }

  const canReset = dash.attempted > 0;

  // MCQ section (mode buttons, drill dropdown, topic stats) — only for MCQ.
  let mcqSectionHtml = '';
  if(isMcq){
    const playlistQs = DB.questions.filter(q => q.source === activePlaylist.key);
    const byTopic = {};
    for(const q of playlistQs){
      const t = q.topic || 'unknown';
      if(!byTopic[t]) byTopic[t] = { n: 0, attempted: 0, scoreSum: 0 };
      byTopic[t].n++;
      const s = stats[q.id];
      if(s && s.attempts > 0){
        byTopic[t].attempted++;
        byTopic[t].scoreSum += statScore(s);
      }
    }
    const topicRows = Object.keys(byTopic)
      .filter(t => byTopic[t].attempted > 0)
      .sort((a, b) => (byTopic[a].scoreSum / byTopic[a].attempted) - (byTopic[b].scoreSum / byTopic[b].attempted))
      .map(t => {
        const { n, attempted, scoreSum } = byTopic[t];
        const acc = Math.round(scoreSum / attempted * 100);
        const label = TOPIC_LABELS[t] || t;
        const barCls = acc < 50 ? 'low' : (acc < 75 ? 'med' : '');
        return `<div class="topic-row" data-drill-topic="${esc(t)}">
          <div class="tr-name">${esc(label)}</div>
          <div class="tr-score">${attempted}/${n} · ${acc}%</div>
          <div class="tr-bar"><div class="${barCls}" style="width:${acc}%"></div></div>
        </div>`;
      }).join('');
    const topicStatsHtml = topicRows
      ? `<div class="topic-stats"><h4>Your topics · weakest first · tap to drill</h4>${topicRows}</div>`
      : '';

    mcqSectionHtml = `<div class="mcq-section">
      <div class="mode-grid">
        <div class="mode-btn" data-mcq-mode="timed_exam" title="30 random Qs · 40-minute global countdown">
          <span class="emoji">⚡</span>
          <span class="title">Timed Exam</span>
          <span class="sub">30 Qs · 40 min</span>
        </div>
        <div class="mode-btn" data-mcq-mode="free_study" title="Unlimited questions · immediate per-option feedback">
          <span class="emoji">📚</span>
          <span class="title">Free Study</span>
          <span class="sub">Unlimited</span>
        </div>
        <div class="mode-btn" data-mcq-mode="topic_drill" title="Focus on one topic — EU regulations, a framework, or a specific duty">
          <span class="emoji">🎯</span>
          <span class="title">Topic Drill</span>
          <span class="sub">Pick a topic</span>
        </div>
      </div>
      <div id="drill-pick-box" class="drill-pick" style="display:none">
        <select id="drill-topic">
          <option value="eu_regulation">EU regulations</option>
          <option value="framework">Frameworks / acronyms</option>
          <option value="data_architecture">Duty · Data architecture</option>
          <option value="data_governance">Duty · Data governance</option>
          <option value="data_policy">Duty · Data policies &amp; strategy</option>
          <option value="data_engineering">Duty · Data engineering</option>
          <option value="data_platforms">Duty · Data platforms</option>
          <option value="bi_reporting">Duty · BI &amp; reporting</option>
          <option value="master_data">Duty · Master &amp; reference data</option>
          <option value="metadata_taxonomy">Duty · Metadata &amp; taxonomy</option>
          <option value="data_quality">Duty · Data quality</option>
          <option value="data_security">Duty · Data security &amp; privacy</option>
          <option value="advanced_analytics">Duty · Advanced analytics &amp; AI prep</option>
        </select>
        <button class="btn btn-primary btn-small" id="start-drill-btn">Start drill</button>
      </div>
      ${topicStatsHtml}
    </div>`;
  }

  const session = loadSession();
  const visiblePlaylists = PLAYLISTS.filter(p => sourceCounts[p.key]);

  // Guide button title differs for MCQ (Content Explorer vs 'how to ace').
  const guideTitle = isMcq
    ? 'Content Explorer — interactive map of regs, duties, frameworks, traps'
    : 'How to ace this test — decision flowchart, examples, competencies';
  const resetTitle = activePlaylist
    ? `Reset stats for “${activePlaylist.label}”`
    : 'Reset all practice stats';
  const timeTitle = 'Target time per question · affects numerical only; SJT uses 120/40s, MCQ uses 80s';

  // The dashboard always shows attempted/total to give a sense of coverage.
  const attemptedStr = `${dash.attempted}/${dash.total}`;
  const dashSubLabel = activePlaylist ? esc(activePlaylist.label) : 'All playlists';

  root.appendChild($(`
    <div class="home">
      <h1>PsycoTrain</h1>
      <div class="sub">${total} questions · ${visiblePlaylists.length} playlists · <em>${dashSubLabel}</em></div>

      <!-- Adaptive dashboard: shows global or active-playlist stats in the same slot. -->
      <div class="dash-stats">
        <div class="stat-chip"><strong>${attemptedStr}</strong><div class="lbl">Attempted</div></div>
        <div class="stat-chip"><strong>${dash.accuracy}%</strong><div class="lbl">Accuracy</div></div>
        <div class="stat-chip"><strong>${dash.accuracyInTime}%</strong><div class="lbl">In time</div></div>
      </div>

      <!-- Horizontal swipe bar of playlists. -->
      <div class="pl-bar" id="playlist-chips">
        ${chipHtml('playlist-chip', null, 'All', settings.playlist === null)}
        ${visiblePlaylists.map(p =>
          chipHtml('playlist-chip', p.key, `${p.label} (${sourceCounts[p.key]})`, settings.playlist === p.key)
        ).join('')}
      </div>

      <!-- Compact actions: guide · weak-only · reset · time slider. Tooltips on hover. -->
      <div class="action-row">
        ${hasGuide ? `<button class="ia-btn" id="guide-btn" title="${esc(guideTitle)}">?</button>` : ''}
        <button class="ia-btn warn-tri ${settings.weakOnly ? 'on' : ''}" id="weak-btn" title="Weak only — unseen questions + those with accuracy below 60%">⚠</button>
        ${canReset ? `<button class="ia-btn danger" id="reset-btn" title="${esc(resetTitle)}">🗑</button>` : ''}
        <div class="time-slider-wrap" title="${esc(timeTitle)}">
          <input type="range" id="target-range" min="10" max="300" step="5" value="${settings.targetSec}">
          <span class="tval" id="target-val">${settings.targetSec}s</span>
        </div>
      </div>

      ${mcqSectionHtml}

      <!-- Start / Resume side by side. For MCQ, mode buttons already act as Start. -->
      ${(session || !isMcq) ? `
      <div class="start-row">
        ${session ? '<button class="btn btn-primary" id="resume-btn">Resume</button>' : ''}
        ${isMcq ? '' : `<button class="btn btn-primary" id="start-btn" ${pool.length === 0 ? 'disabled' : ''}>
          Start practice${pool.length === 0 ? ' (no questions)' : ''}
        </button>`}
      </div>` : ''}

      <!-- Tiny save/load icons at the bottom. -->
      <div class="mini-row">
        <button class="ia-mini" id="save-btn" title="Save all practice stats to a JSON file">⬇</button>
        <button class="ia-mini" id="load-btn" title="Load practice stats from a JSON file">⬆</button>
      </div>
    </div>
  `));

  // Wire up playlist chips → switch playlist.
  root.querySelectorAll('#playlist-chips .chip').forEach(c => {
    c.addEventListener('click', () => {
      const newKey = c.dataset.value === '__null__' ? null : c.dataset.value;
      settings.playlist = newKey;
      // Adjust default target time when switching: non-SJT playlists benefit
      // from a type-tailored default; SJT ignores it (per-question override).
      if(newKey){
        const p = playlistByKey(newKey);
        if(p && p.type !== 'sjt') settings.targetSec = defaultTargetForType(p.type);
      } else {
        settings.targetSec = 120;
      }
      saveSettings(settings);
      render();
    });
  });

  // Action icons
  root.querySelector('#guide-btn')?.addEventListener('click', () => {
    GUIDE_KEY = settings.playlist;
    MODE = 'guide';
    SCROLL_TARGET = 'top';
    render();
  });
  root.querySelector('#weak-btn')?.addEventListener('click', () => {
    settings.weakOnly = !settings.weakOnly;
    saveSettings(settings);
    render();
  });
  root.querySelector('#reset-btn')?.addEventListener('click', () => {
    if(activePlaylist) resetStatsForPlaylist(activePlaylist.key);
    else resetAllStats();
  });

  // Time slider — live label + persist.
  const tRange = root.querySelector('#target-range');
  const tLabel = root.querySelector('#target-val');
  if(tRange && tLabel){
    tRange.addEventListener('input', () => { tLabel.textContent = `${tRange.value}s`; });
    tRange.addEventListener('change', () => {
      let v = parseInt(tRange.value, 10);
      if(!Number.isFinite(v) || v < 10) v = 10;
      if(v > 300) v = 300;
      settings.targetSec = v;
      saveSettings(settings);
    });
  }

  // Start / Resume
  root.querySelector('#start-btn')?.addEventListener('click', () => startPractice());
  root.querySelector('#resume-btn')?.addEventListener('click', resumePractice);

  // MCQ mode buttons + drill
  root.querySelectorAll('.mode-btn[data-mcq-mode]').forEach(b => {
    b.addEventListener('click', () => {

      if(m === 'topic_drill'){
        const box = root.querySelector('#drill-pick-box');
        if(box) box.style.display = box.style.display === 'none' ? 'flex' : 'none';
        return;
      }
      startPractice({ mode: m });
    });
  });
  root.querySelector('#start-drill-btn')?.addEventListener('click', () => {
    const topic = root.querySelector('#drill-topic')?.value;
    if(!topic) return;
    startPractice({ mode: 'topic_drill', drillTopic: topic });
  });
  // Per-topic dashboard rows → quick-start a topic drill
  root.querySelectorAll('.topic-row[data-drill-topic]').forEach(r => {
    r.addEventListener('click', () => {
      startPractice({ mode: 'topic_drill', drillTopic: r.dataset.drillTopic });
    });
  });

  // Mini save / load
  root.querySelector('#save-btn').addEventListener('click', downloadStats);
  root.querySelector('#load-btn').addEventListener('click', pickStatsFile);
}
function chipHtml(cls, value, label, on){

      <!-- TAB 2 · 11 DUTIES WHEEL -->
      <div class="tab-body" data-body="duties">
        <p class="intro">The job profile lists <strong>11 typical duties</strong>. Data Governance sits at the hub — it binds the other 10 through policy, roles and compliance.</p>
        <div class="duty-wheel">

          <div class="duty-card" data-open>
            <div class="dc-title">1 · Data architecture &amp; interoperability</div>
            <div class="dc-key">Reference architectures · EIF 4 layers · AI-enabled cloud</div>
            <div class="dc-body">Designing how data flows across systems so that 'product' in system A means the same as 'product' in system B — that's semantic interoperability. The EU reference is the EIF (Legal / Organisational / Semantic / Technical layers), with an Interoperability Governance overlay. For public administrations specifically, the Interoperable Europe Act (2024/903) turns this into a legal obligation: mandatory interoperability assessments before new public IT spend, plus a shared portal of reusable building blocks (eDelivery, eSignature, SEMIC).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">2 · Data policies &amp; strategy</div>
            <div class="dc-key">Lifecycle · EU strategies · data spaces</div>
            <div class="dc-body">Translating business or legal goals into written data policies — how long we keep data, who can use it, which quality bar applies — and governing the data lifecycle from acquisition through archival to disposal. At EU level, the compass is the European Strategy for Data (Feb 2020) and its successor, the Data Union Strategy (Nov 2025). Policy becomes concrete through the 14 Common European Data Spaces (health, agriculture, energy, mobility, etc.), the Interoperable Europe Act and supporting programmes like DSSC and Simpl.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">3 · Data engineering &amp; integration</div>
            <div class="dc-key">ETL · ELT · APIs · Kafka · Airflow</div>
            <div class="dc-body">Moving data from sources into analytics or operational stores. Classic batch = ETL (Extract → Transform → Load in an external engine); modern cloud pattern = ELT (load raw first, transform inside the warehouse's cheap compute). Real-time streaming uses Kafka (producer / consumer, partitioned topics, replay by offset). Synchronous exchange uses APIs: REST (resource-oriented, HTTP verbs) and GraphQL (single endpoint, client-defined queries). Orchestration ties it together — Airflow schedules DAGs of tasks with retries and SLAs.</div>
          </div>

          <div class="duty-card hub">
            <div class="dc-title">HUB · Data governance &amp; compliance</div>
            <div class="dc-key">Policies · roles · EU law · maturity · audits</div>
            <div class="dc-body">DAMA-DMBOK puts this at the centre because every other duty feeds into it. Governance decides <em>who owns what</em> (Data Owner, accountable), <em>who maintains quality and definitions</em> (Steward), <em>who handles storage and ops</em> (Custodian), and <em>who plays GDPR roles</em> (Controller / Processor / DPO). At the org level a CDO sets strategy. EU law anchors: GDPR for Member States (national DPAs) · Reg 2018/1725 for EU institutions (supervised by EDPS). Maturity is typically assessed against DAMA or CMMI-DM models.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">4 · Data platforms</div>
            <div class="dc-key">Warehouse · Lake · Lakehouse · big data · mining</div>
            <div class="dc-body">Three archetypes. <strong>Warehouse</strong>: structured, schema-on-write, curated — optimised for BI but costly for raw/unstructured data. <strong>Lake</strong>: cheap object storage, schema-on-read, any format — but no ACID, weak governance. <strong>Lakehouse</strong>: the modern compromise — open table formats (Delta Lake, Iceberg, Hudi) add transactions, schema enforcement and time-travel on top of lake storage, serving BI and ML from the same substrate. 'Big data' = the 3 Vs (volume, velocity, variety); often extended to 5 Vs (veracity, value).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">5 · BI &amp; reporting</div>
            <div class="dc-key">Dashboards · self-service · KPIs · predictive</div>
            <div class="dc-body">The analytics maturity ladder: descriptive (what happened — dashboards) → diagnostic (why — drill-downs) → predictive (what might happen — ML models) → prescriptive (what to do — optimisation). KPIs are the subset of metrics you've consciously tied to objectives; tracking them over time tells you if your strategy is working. Self-service BI (Power BI, Tableau, Metabase) lets business users build reports without IT tickets — fast, but only safe when governance (definitions, certified datasets) is in place.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">6 · Master &amp; reference data (MDM)</div>
            <div class="dc-key">Glossaries · IATE · EuroVoc · multilingual</div>
            <div class="dc-body"><strong>Master data</strong> = the 'nouns' of the business that everyone needs to agree on — Customer, Product, Employee, Location — usually consolidated into a golden record across source systems. <strong>Reference data</strong> = closed controlled code lists (country codes, currency codes, status enums). At EU scale multilingualism is mandatory: <strong>IATE</strong> is the inter-institutional terminology database (concepts in 24 languages), <strong>EuroVoc</strong> is the EU thesaurus used to index documents across institutions (SKOS-based).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">7 · Metadata &amp; taxonomy</div>
            <div class="dc-key">DCAT-AP · SKOS · RDF/OWL/SPARQL · 5-star · Dublin Core</div>
            <div class="dc-body">Describing data about the data — so catalogues are searchable, lineage is traceable, and meaning survives across systems. The EU portal <strong>data.europa.eu</strong> uses DCAT-AP (an application profile of W3C DCAT) to describe datasets; SKOS models thesauri; Dublin Core provides 15 core elements (title, creator, date…). Underneath sits the Semantic Web stack: RDF (subject-predicate-object triples), OWL (formal ontology), SPARQL (query language). Tim Berners-Lee's 5-star scheme grades openness from ★ (on web, open license) to ★★★★★ (linked open data).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">8 · Data quality</div>
            <div class="dc-key">Profiling · cleansing · ISO 8000 · ISO/IEC 25012</div>
            <div class="dc-body">Two complementary standards. <strong>ISO 8000</strong> is oriented toward master-data exchange and provenance (where did it come from, is it intact, is it fit for purpose?). <strong>ISO/IEC 25012</strong> defines 15 characteristics that together describe 'quality': accuracy, completeness, consistency, credibility, currentness, accessibility, compliance, confidentiality, efficiency, precision, traceability, understandability, availability, portability, recoverability. In practice you don't measure all 15 — you pick the ones that matter for the use case and build profiling + cleansing pipelines around them.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">9 · Data security &amp; privacy</div>
            <div class="dc-key">RBAC/ABAC · encryption · DPIA · anon vs pseudo · CIA</div>
            <div class="dc-body">Security and privacy sit side by side but aren't the same thing. Security's classical objectives are the CIA triad: <strong>C</strong>onfidentiality (who can see it), <strong>I</strong>ntegrity (correct and untampered), <strong>A</strong>vailability (accessible when needed). Access is enforced via RBAC (role-based) or ABAC (attribute-based). GDPR Art 25 ('privacy by design &amp; by default') bakes controls in from architecture stage. Art 35 triggers a DPIA whenever processing is 'likely to result in high risk' to rights and freedoms. Key distinction: anonymisation (irreversible) takes data out of GDPR; pseudonymisation (reversible with a separate key) keeps it in GDPR as a safeguard.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">10 · Advanced analytics &amp; AI prep</div>
            <div class="dc-key">Feature engineering · labelling · AI Act Art 10</div>
            <div class="dc-body">The ML-specific data-prep stack. <strong>Feature engineering</strong> = crafting the input variables a model will learn from (rolling averages, flags, encodings). <strong>Labelling</strong> = assigning ground truth to supervised examples. <strong>Augmentation</strong> = generating synthetic variants to boost minority classes or improve robustness. The EU anchor is AI Act Art. 10: if your system is classified as high-risk, your training / validation / test sets must be relevant and representative, as free of errors as possible, and examined for biases likely to affect health, safety or fundamental rights — with mitigation measures documented.</div>
          </div>

        </div>
      </div>

      <!-- TAB 3 · FRAMEWORKS CHEATSHEET -->
      <div class="tab-body" data-body="frameworks">
        <div class="fw-grid">

          <div class="fw-card">
            <h4>DAMA-DMBOK</h4>
            <div class="desc">Data Management Body of Knowledge — the industry-standard reference model. 11 Knowledge Areas arranged in a wheel, with <strong>Data Governance at the centre</strong> because every other area feeds policy into it and consumes policy from it.</div>
            <ul>
              <li><strong>Data Governance (hub)</strong></li>
              <li>Data Architecture · Data Modeling &amp; Design</li>
              <li>Data Storage &amp; Operations · Data Security</li>
              <li>Data Integration &amp; Interoperability</li>
              <li>Document &amp; Content Mgmt</li>
              <li>Reference &amp; Master Data · Metadata</li>
              <li>Data Warehousing &amp; BI · Data Quality</li>
            </ul>
            <div class="fw-when">When asked 'which area…' and the answer is cross-cutting — it's almost always Data Governance.</div>
          </div>

          <div class="fw-card">
            <h4>FAIR principles</h4>
            <div class="desc">A 4-letter checklist (Wilkinson et al., 2016) for making datasets research-community-ready. Adopted wholesale by the EU Open Data programme and by data.europa.eu as the default yardstick.</div>
            <ul>
              <li><strong>F</strong>indable — persistent ID, rich metadata, indexed</li>
              <li><strong>A</strong>ccessible — standardised open protocol, authentication where needed</li>
              <li><strong>I</strong>nteroperable — formal language, shared vocabularies, references</li>
              <li><strong>R</strong>eusable — clear license, provenance, community standards</li>
            </ul>
            <div class="fw-when">Scientific or research data? FAIR. Open government data? Also FAIR + 5-star.</div>
          </div>

          <div class="fw-card">
            <h4>EIF · 4 layers</h4>
            <div class="desc">European Interoperability Framework — the reference model used by every EU public-administration interoperability initiative, and the backbone of the Interoperable Europe Act (2024/903).</div>
            <ul>
              <li><strong>Legal</strong> — aligned legal frameworks</li>
              <li><strong>Organisational</strong> — business processes &amp; responsibilities</li>
              <li><strong>Semantic</strong> — meaning of exchanged data preserved</li>
              <li><strong>Technical</strong> — systems, applications, infrastructure</li>
              <li><em>+ Integrated Public Service Governance (overarching)</em></li>
            </ul>
            <div class="fw-when">Interoperability between public administrations → EIF. Interoperability between companies → not EIF's turf.</div>
          </div>

          <div class="fw-card">
            <h4>DCAT-AP · SKOS · RDF</h4>
            <div class="desc">The EU open-data metadata stack. DCAT-AP describes the <em>datasets</em>; SKOS structures the <em>vocabularies</em> used to classify them; RDF/OWL/SPARQL is the underlying semantic-web plumbing.</div>

              <li><strong>DCAT-AP</strong> — EU application profile of DCAT; powers data.europa.eu</li>

              <li><strong>SKOS</strong> — Simple Knowledge Organization System (thesauri like EuroVoc)</li>
              <li><strong>RDF / OWL / SPARQL</strong> — triples / ontology language / query language</li>
              <li><strong>Dublin Core</strong> — 15 core metadata elements (title, creator, date…)</li>
            </ul>
            <div class="fw-when">Cataloguing EU datasets → DCAT-AP. Indexing EU documents → EuroVoc via SKOS.</div>
          </div>

          <div class="fw-card">
            <h4>5-star Open Data</h4>
            <div class="desc">Tim Berners-Lee's deployment scheme (2010). A simple 1-to-5 ladder for how 'open' an open dataset really is — each star adds reusability on top of the previous.</div>
            <ul>
              <li>★ on web, open license</li>
              <li>★★ machine-readable structured data</li>
              <li>★★★ non-proprietary format (CSV &gt; Excel)</li>
              <li>★★★★ URIs to identify things</li>
              <li>★★★★★ linked to other data (Linked Open Data)</li>
            </ul>
            <div class="fw-when">If the question mentions 'URIs' or 'linked data' → you're in 4★ / 5★ territory.</div>
          </div>

          <div class="fw-card">
            <h4>CIA triad</h4>
            <div class="desc">The classical objectives of information security. Predates GDPR by decades but remains the backbone of any security control set. Often extended with Authenticity and Non-repudiation ('AIC' + N/R in some textbooks).</div>
            <ul>
              <li><strong>C</strong>onfidentiality — only authorised can access</li>
              <li><strong>I</strong>ntegrity — data not altered improperly</li>
              <li><strong>A</strong>vailability — accessible when needed</li>
              <li>+ often extended: Authenticity · Non-repudiation</li>
            </ul>
            <div class="fw-when">Security questions default here. GDPR technical-measures questions also lean on CIA.</div>
          </div>

          <div class="fw-card">
            <h4>Roles cheatsheet</h4>
            <div class="desc">Two role families are often blurred in exam questions. <strong>Data-management roles</strong> (Owner, Steward, Custodian) come from DAMA. <strong>GDPR roles</strong> (Controller, Processor, DPO) come from the regulation. CDO is an org-level leadership role; don't confuse with DPO.</div>
            <ul>
              <li><strong>Data Owner</strong> — accountable, sets policy</li>
              <li><strong>Data Steward</strong> — executes policy, quality, definitions</li>
              <li><strong>Data Custodian</strong> — IT-operational (storage, backup)</li>
              <li><strong>Controller</strong> (GDPR) — determines purpose &amp; means</li>
              <li><strong>Processor</strong> (GDPR) — acts on controller's behalf</li>
              <li><strong>DPO</strong> — advises on GDPR compliance</li>
              <li><strong>CDO</strong> — org-level data strategy</li>
            </ul>

            </ul>

          </div>

// ----- Practice -----
// Exam constants (EPSO AD/426/25 — Data MCQ)
const MCQ_EXAM_TOTAL = 30;
const MCQ_EXAM_DURATION_MS = 40 * 60 * 1000;

// opts: { mode: 'free_study'|'timed_exam'|'topic_drill', drillTopic: 'eu_regulation'|... }
function startPractice(opts){
  const settings = loadSettings();
  let pool = buildPool(settings);
  const mode = (opts && opts.mode) || 'free_study';
  const drillTopic = opts && opts.drillTopic;

  if(mode === 'topic_drill' && drillTopic){
    pool = pool.filter(q => q.topic === drillTopic);
    if(pool.length === 0){ toast(`No questions found for topic "${drillTopic}"`); return; }
  }

  if(pool.length === 0){ toast('No questions match the current filter'); return; }

  // Timed exam: pick 30 random questions, lock the pool, set a global deadline
  let poolIds;
  let exam_deadline_ms = null;
  let exam_target_count = null;
  if(mode === 'timed_exam'){
    const shuffled = pool.slice();
    for(let i = shuffled.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    exam_target_count = Math.min(MCQ_EXAM_TOTAL, shuffled.length);
    poolIds = shuffled.slice(0, exam_target_count).map(q => q.id);
    exam_deadline_ms = Date.now() + MCQ_EXAM_DURATION_MS;
  } else {
    poolIds = pool.map(q => q.id);
  }

  SESSION = {
    mode,
    drillTopic: drillTopic || null,
    exam_deadline_ms,
    exam_target_count,
    exam_answers: [],          // for timed_exam results screen
    poolIds,
    picked: [],
    sjt_queue: [],
    currentQid: null,
    picked_letter: null,
    revealed: false,
    answered_count: 0,
    correct_count: 0,          // can be fractional for SJT (0.5 per partial)
    correct_in_time_count: 0,  // same
  };
  advanceQuestion();
}
function resumePractice(){
  const s = loadSession();
  if(!s){ render(); return; }
  SESSION = s;
  // Reset the per-question timer on resume — the saved q_started_ms is stale
  // (could be hours old). Only reset if not already revealed.
  if(!SESSION.revealed) SESSION.q_started_ms = Date.now();
  MODE = 'practice';
  render();
}
function exitPractice(){
  stopTimer();
  if(SESSION && SESSION.picked.length > 1) saveSession(SESSION);
  else clearSession();
  SESSION = null;
  MODE = 'home';
  SCROLL_TARGET = 'top';
  render();
}
function stopTimer(){
  if(TIMER_ID){ clearInterval(TIMER_ID); TIMER_ID = null; }
}
function startTimer(){
  stopTimer();
  TIMER_ID = setInterval(() => {
    const el = document.getElementById('timer');
    const bar = document.getElementById('time-bar');
    if(!el || !SESSION || !SESSION.q_started_ms) return;
    const elapsed = Date.now() - SESSION.q_started_ms;
    const targetMs = effectiveTargetMs();
    const pct = Math.max(0, 100 - (elapsed / targetMs * 100));
    const remaining = Math.max(0, targetMs - elapsed);
    el.textContent = remaining > 0 ? fmtTime(remaining) : '-' + fmtTime(elapsed - targetMs);
    el.className = 'tmr';
    if(elapsed > targetMs) el.className = 'tmr over';
    else if(elapsed > targetMs * 0.8) el.className = 'tmr warn';
    if(bar){
      bar.style.width = pct + '%';
      bar.className = 'time-bar';
      if(pct <= 0) bar.className = 'time-bar over';
      else if(pct < 20) bar.className = 'time-bar warn';
    }

    // Timed exam: also update the global deadline banner + auto-end on expiry
    if(SESSION.mode === 'timed_exam' && SESSION.exam_deadline_ms){
      const rem = SESSION.exam_deadline_ms - Date.now();
      const banner = document.getElementById('exam-banner');
      const examTimerEl = document.getElementById('exam-timer');
      if(examTimerEl) examTimerEl.textContent = fmtTime(Math.max(0, rem));
      if(banner){
        banner.classList.remove('warn', 'over');
        if(rem <= 0) banner.classList.add('over');
        else if(rem < 5 * 60 * 1000) banner.classList.add('warn');
      }
      if(rem <= 0){
        stopTimer();
        MODE = 'results';
        SCROLL_TARGET = 'top';
        render();
      }
    }
  }, 500);
}
function advanceQuestion(){
  // Timed exam: stop at target count or when deadline is reached
  if(SESSION.mode === 'timed_exam'){
    const done = SESSION.answered_count >= (SESSION.exam_target_count || MCQ_EXAM_TOTAL);
    const expired = SESSION.exam_deadline_ms && Date.now() >= SESSION.exam_deadline_ms;
    if(done || expired){
      stopTimer();
      MODE = 'results';
      SCROLL_TARGET = 'top';
      render();
      return;
    }
  }

  // SJT: if there's a queued reaction from the current situation, show it next
  if(SESSION.sjt_queue && SESSION.sjt_queue.length > 0){
    const nextId = SESSION.sjt_queue.shift();
    SESSION.currentQid = nextId;
    SESSION.picked.push(nextId);
    SESSION.picked_letter = null;
    SESSION.revealed = false;
    SESSION.sjt_first_reaction = false;  // B/C/D → normal time
    SESSION.q_started_ms = Date.now();
    SESSION.q_elapsed_ms = null;
    saveSession(SESSION);
    MODE = 'practice';
    SCROLL_TARGET = 'top';
    render();
    return;
  }

  const pool = DB.questions.filter(q => SESSION.poolIds.includes(q.id));
  const excluded = new Set(SESSION.picked);
  // Allow recycling once we've seen everything once in this session
  // (Except timed exam: ran through a fixed pool; when exhausted, end.)
  let next = pickNext(pool, excluded);
  if(!next && pool.length > 0 && SESSION.mode !== 'timed_exam'){
    SESSION.picked = [];          // recycle
    SESSION.sjt_queue = [];       // clear SJT queue too
    next = pickNext(pool, new Set());
  }
  if(!next){
    if(SESSION.mode === 'timed_exam'){
      stopTimer();
      MODE = 'results';
      SCROLL_TARGET = 'top';
      render();
      return;
    }
    stopTimer(); toast('No more questions'); MODE='home'; SESSION=null; clearSession(); render(); return;
  }

  // SJT: queue all reactions of this situation in data order (pre-balanced in JSON)
  if(next.type === 'sjt' && next.set_id){
    const siblings = pool
      .filter(q => q.set_id === next.set_id && !excluded.has(q.id))
      .sort((a,b) => a.id.localeCompare(b.id));
    // First one is shown now, rest go into the queue
    next = siblings[0];
    SESSION.sjt_queue = siblings.slice(1).map(q => q.id);
    // Mark all as picked so they won't be re-selected by pickNext
    for(const s of siblings){ SESSION.picked.push(s.id); }
    SESSION.sjt_first_reaction = true;  // Reaction 1 → double time for reading situation
  } else {
    SESSION.picked.push(next.id);
    SESSION.sjt_first_reaction = false;
  }

  SESSION.currentQid = next.id;
  SESSION.picked_letter = null;
  SESSION.revealed = false;
  SESSION.q_started_ms = Date.now();
  SESSION.q_elapsed_ms = null;
  saveSession(SESSION);
  MODE = 'practice';
  SCROLL_TARGET = 'top';
  render();
}
function pickAnswer(letter){
  if(SESSION.revealed) return;
  SESSION.picked_letter = letter;
  render();
}
// Effective target time:
//   - SJT: 120s for the first reaction of a situation (reading + first answer), 40s for r2/r3/r4.
//     If a question carries its own `target_sec`, that value wins.
//   - Non-SJT: user-configurable default from settings.
function effectiveTargetMs(){
  const q = DB && SESSION ? DB.questions.find(x => x.id === SESSION.currentQid) : null;
  if(q && q.type === 'sjt'){
    if(typeof q.target_sec === 'number') return q.target_sec * 1000;
    return (SESSION.sjt_first_reaction ? 120 : 40) * 1000;
  }
  if(q && q.type === 'mcq'){
    if(typeof q.target_sec === 'number') return q.target_sec * 1000;
    return 80 * 1000;  // default 40min / 30Q = 80s per question
  }
  const base = (loadSettings().targetSec || 120) * 1000;
  return base;
}

// SJT partial scoring: exact = 1, ±1 neighbor = 0.5, else = 0
const SJT_SCALE = ['A','B','C','D','E'];  // -- - +/- + ++
function sjtScore(picked, correct){
  const pi = SJT_SCALE.indexOf(picked);
  const ci = SJT_SCALE.indexOf(correct);
  if(pi < 0 || ci < 0) return 0;
  const dist = Math.abs(pi - ci);
  if(dist === 0) return 1;
  if(dist === 1) return 0.5;
  return 0;
}

function submitAnswer(){
  if(!SESSION.picked_letter || SESSION.revealed) return;
  const q = DB.questions.find(x => x.id === SESSION.currentQid);
  const elapsed = Date.now() - (SESSION.q_started_ms || Date.now());
  const targetMs = effectiveTargetMs();
  const withinTime = elapsed <= targetMs;

  // SJT uses partial scoring (0 / 0.5 / 1); other types are 0 or 1
  let isCorrect;
  let sjtPts = null;
  let score;
  if(q.type === 'sjt'){
    sjtPts = sjtScore(SESSION.picked_letter, q.correct);
    score = sjtPts;
    isCorrect = sjtPts >= 1;  // only exact match counts as "correct" for pickNext tiering
  } else {
    isCorrect = SESSION.picked_letter === q.correct;
    score = isCorrect ? 1 : 0;
  }

  recordAnswer(q.id, score, elapsed, withinTime);
  SESSION.revealed = true;
  SESSION.q_elapsed_ms = elapsed;
  SESSION.q_within_time = withinTime;
  SESSION.q_sjt_pts = sjtPts;
  SESSION.answered_count++;
  // Credit: SJT partial = 0.5, SJT exact = 1, other correct = 1, else 0
  const credit = (sjtPts != null) ? sjtPts : (isCorrect ? 1 : 0);
  // Always add credit to correct count (even if over time)
  SESSION.correct_count = (SESSION.correct_count||0) + credit;
  // Only add credit to in-time if within time
  if(withinTime && credit > 0) SESSION.correct_in_time_count = (SESSION.correct_in_time_count||0) + credit;

  // Timed exam: keep a lightweight answer trail for the results screen
  if(SESSION.mode === 'timed_exam'){
    SESSION.exam_answers = SESSION.exam_answers || [];
    SESSION.exam_answers.push({
      qid: q.id,
      picked: SESSION.picked_letter,
      correct: q.correct,
      isCorrect,
      topic: q.topic || null,
      elapsed,
    });
  }

  stopTimer();
  saveSession(SESSION);
  SCROLL_TARGET = 'explanation';
  render();
}
