              </svg><div class="tl-vcap">Keywords: 'on-prem engine' → ETL · 'cloud warehouse / dbt / SQL-native' → ELT.</div></div>
              <dl>
                <dt>Data cleaning</dt><dd>Handle <a class="term-link" data-target="dd-c3-missing">missing values</a> (drop · impute mean/median · forward-fill · model-predict) · <strong>outliers</strong> (investigate vs cap) · <strong>duplicates</strong> (dedup keys) · <strong>encoding</strong> (UTF-8, one-hot, label-encode).</dd>
                <dt>Transformation techniques</dt><dd><a class="term-link" data-target="dd-c3-normalisation">Normalisation</a> (0–1 min-max · z-score standardise) · <strong>aggregation</strong> · <strong>pivoting</strong> · joining · type casting · derived features (e.g. rolling average).</dd>
                <dt>ETL</dt><dd><a class="term-link" data-target="dd-c3-etl">Extract → Transform → Load</a>. On-prem pattern — transformations run in a dedicated engine (Informatica, SSIS, Talend) before landing in target. Best when source compute &gt; target compute.</dd>
                <dt>ELT</dt><dd><a class="term-link" data-target="dd-c3-elt">Extract → Load → Transform</a>. Modern cloud pattern — raw lands in the warehouse, transformations run in-warehouse using SQL (e.g. dbt). Works when warehouse compute is cheap + elastic.</dd>
                <dt>Integration approaches</dt><dd>ETL · ELT · <a class="term-link" data-target="dd-c3-virtualisation">data virtualisation</a> (federation — query without moving data) · streaming pipelines · API-to-API · <a class="term-link" data-target="dd-c3-cdc">CDC</a> (Change Data Capture — propagate source changes in near-real-time via log mining).</dd>
                <dt>Real-time processing</dt><dd>Event streams via <a class="term-link" data-target="dd-c3-kafka">Kafka</a> (partitioned topics, producer/consumer) or Kinesis. Stream processing: <a class="term-link" data-target="dd-c3-flink">Flink</a>, Spark Structured Streaming, Kafka Streams. Latency goals in ms–seconds.</dd>
                <dt>Big data processing</dt><dd>The <a class="term-link" data-target="dd-c3-5vs">5 Vs</a> (Volume · Velocity · Variety · Veracity · Value). Distributed frameworks: <a class="term-link" data-target="dd-c3-spark">Spark</a> (in-memory), <a class="term-link" data-target="dd-c3-hadoop">Hadoop MapReduce</a> (legacy batch), Dask (Python-native).</dd>
                <dt>Challenges</dt><dd>Schema drift · backfills · quality propagation · orchestration · performance tuning · cost.</dd>
                <dt>Pipelines</dt><dd>Orchestrators: <a class="term-link" data-target="dd-c3-airflow">Airflow</a> (DAGs of tasks, retries, SLAs) · Prefect · Dagster. Principles: <a class="term-link" data-target="dd-c3-idempotency">idempotency</a> (re-run safe) · <a class="term-link" data-target="dd-c3-incremental">incremental loads</a> (only new data) · observability (logs, metrics, alerts).</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> ETL vs ELT is the big one. Keywords: 'on-prem / dedicated engine' → ETL. 'cloud warehouse / dbt / SQL-native' → ELT. CDC is about <em>propagating</em> source changes, not batch loading.</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c3-missing"><div class="dd-name">Missing-value handling (imputation)</div><div class="dd-def">Strategies when a field is null: drop the row, fill with mean/median (numeric) or mode (categorical), forward-fill from the previous record, or predict with a model. Choice depends on % missing and downstream sensitivity.</div><div class="dd-ex"><strong>Ex.</strong> A Member State submits CAP payment data with 3% missing "farm size" values. DG AGRI imputes the median for that NUTS region rather than drop the whole row, since dropping would skew totals.</div></div>

                  <div class="dd-term" id="dd-c3-normalisation"><div class="dd-name">Normalisation</div><div class="dd-def">Rescaling numeric features so they're on a comparable range. <strong>Min-max</strong> squeezes to [0,1]. <strong>Z-score</strong> centers on mean 0, std 1. Required for algorithms sensitive to scale (k-NN, neural nets, PCA).</div><div class="dd-ex"><strong>Ex.</strong> Combining "GDP per capita" (€10k–€100k) with "unemployment %" (0–25) in a regional clustering — z-score both first, otherwise GDP dominates the distance metric.</div></div>

                  <div class="dd-term" id="dd-c3-etl"><div class="dd-name">ETL · Extract → Transform → Load</div><div class="dd-def">Classic pattern: pull data from source, run transformations in a <strong>dedicated processing engine</strong> (Informatica, Talend, SSIS), then load the cleaned result into the target. Best when source has more compute than target.</div><div class="dd-ex"><strong>Ex.</strong> A Commission on-prem warehouse fed by an Informatica server that joins, dedups, and validates Member State submissions before bulk-inserting into the analytical DB.</div></div>

                  <div class="dd-term" id="dd-c3-elt"><div class="dd-name">ELT · Extract → Load → Transform</div><div class="dd-def">Modern cloud pattern: dump raw data into the warehouse <em>first</em>, then transform in-warehouse with SQL (often via <strong>dbt</strong>). Works because cloud warehouses (Snowflake, BigQuery) have cheap elastic compute.</div><div class="dd-ex"><strong>Ex.</strong> Eurostat lands raw national submissions in a cloud lakehouse, then runs dbt models that produce the published indicators — same engine for storage and transformation.</div></div>

                  <div class="dd-term" id="dd-c3-virtualisation"><div class="dd-name">Data virtualisation (federation)</div><div class="dd-def">Query data <em>where it lives</em> without moving or copying it — a virtual layer presents multiple sources as if they were one. Trade speed for freshness and reduced data duplication.</div><div class="dd-ex"><strong>Ex.</strong> A Commission analyst issues one SQL query that transparently joins a DG REGIO Postgres DB and a Eurostat data cube — Denodo / Starburst federates the underlying systems.</div></div>

                  <div class="dd-term" id="dd-c3-cdc"><div class="dd-name">CDC · Change Data Capture</div><div class="dd-def">Tap a source system's transaction log to replicate every <em>change</em> (insert/update/delete) downstream in near-real time. Avoids re-scanning the full table.</div><div class="dd-ex"><strong>Ex.</strong> Debezium reads the WAL of a DG SANTE pharmacovigilance Postgres and pushes each adverse-event change into a Kafka topic for EMA's analytics. <strong>Trap:</strong> CDC propagates changes — it is <em>not</em> a batch loader.</div></div>

                  <div class="dd-term" id="dd-c3-kafka"><div class="dd-name">Kafka</div><div class="dd-def">Distributed log/streaming platform. Producers write events to <strong>topics</strong> partitioned across brokers; consumers read at their own pace. Decouples producers and consumers, scales horizontally, retains events.</div><div class="dd-ex"><strong>Ex.</strong> The European Tax Authority's CESOP system uses Kafka topics to ingest cross-border payment events from PSPs across all Member States, with downstream fraud-scoring consumers.</div></div>

                  <div class="dd-term" id="dd-c3-flink"><div class="dd-name">Flink (stream processing)</div><div class="dd-def">A stateful stream-processing engine — does windowed aggregations, joins, and pattern detection over event streams with millisecond latency and exactly-once guarantees.</div><div class="dd-ex"><strong>Ex.</strong> Frontex computes a 5-minute rolling risk score per border-crossing point by feeding gate events into a Flink job — alerts fire before traffic builds up.</div></div>

                  <div class="dd-term" id="dd-c3-5vs"><div class="dd-name">The 5 Vs of Big Data</div><div class="dd-def"><strong>Volume</strong> (size), <strong>Velocity</strong> (speed of arrival), <strong>Variety</strong> (formats), <strong>Veracity</strong> (trustworthiness), <strong>Value</strong> (business worth). The original framing of why big-data tooling exists.</div><div class="dd-ex"><strong>Ex.</strong> Copernicus Earth-observation data: petabytes (volume), continuous satellite passes (velocity), images + radar + telemetry (variety), sensor calibration matters (veracity), drives the EU Green Deal (value).</div></div>

                  <div class="dd-term" id="dd-c3-spark"><div class="dd-name">Apache Spark</div><div class="dd-def">Distributed in-memory compute engine for batch + streaming. Workloads are split across a cluster; intermediate results stay in RAM, making iterative jobs much faster than Hadoop MapReduce.</div><div class="dd-ex"><strong>Ex.</strong> JRC analysts run a Spark job to cross-correlate 10 years of Sentinel satellite imagery with NUTS-3 land-use stats — finishes in minutes on a Databricks cluster.</div></div>

                  <div class="dd-term" id="dd-c3-hadoop"><div class="dd-name">Hadoop MapReduce</div><div class="dd-def">Original distributed batch-processing model: a job is split into Map (parallel work) and Reduce (aggregation) phases, persisting intermediate state to disk. Largely <strong>superseded by Spark</strong> for new workloads.</div><div class="dd-ex"><strong>Ex.</strong> A legacy DG DIGIT pipeline still uses MapReduce on HDFS to crunch nightly log archives — kept running but no new code added.</div></div>

                  <div class="dd-term" id="dd-c3-airflow"><div class="dd-name">Airflow (orchestrator)</div><div class="dd-def">Schedules and monitors data pipelines as <strong>DAGs</strong> (directed acyclic graphs) of tasks. Each task can have retries, SLAs, dependencies. Authored in Python, run on a scheduler+workers.</div><div class="dd-ex"><strong>Ex.</strong> A nightly DAG at DG REGIO: extract from each MS → validate → load → refresh dashboards → email steward. Failure on validation triggers a retry, then a Slack alert.</div></div>

                  <div class="dd-term" id="dd-c3-idempotency"><div class="dd-name">Idempotency</div><div class="dd-def">A pipeline step that produces the same result whether you run it once or N times. Critical for safe re-runs after failure — no duplicates, no double-counting.</div><div class="dd-ex"><strong>Ex.</strong> A "load yesterday's CAP payments" job uses <code>MERGE</code> on a unique payment_id — running it twice doesn't insert duplicate rows.</div></div>

                  <div class="dd-term" id="dd-c3-incremental"><div class="dd-name">Incremental load</div><div class="dd-def">Process only the data that's new or changed since the last run, instead of re-scanning everything. Driven by a watermark column (timestamp, sequence) or a CDC stream.</div><div class="dd-ex"><strong>Ex.</strong> Eurostat reloads only the indicators a national statistical office revised in the last 24 h, not the entire historical series.</div></div>

                </div>
              </div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">Ch 4</div>
            <div class="tl-name">Data Storage &amp; Management</div>
            <div class="tl-tag">DBMS · types · warehousing · archiving · retention · optimisation</div>
            <div class="tl-body">
              <div class="tl-context">
                Choice of storage engine follows the access pattern. OLTP (many small transactions) and OLAP (few large scans) have opposite optimal designs. Lakehouses try to bridge both.
              </div>

              <dl>
                <dt>Types of storage</dt><dd><a class="term-link" data-target="dd-c4-rdbms">Relational</a> (RDBMS — PostgreSQL, MySQL, Oracle, SQL Server) · <strong>NoSQL</strong>: <a class="term-link" data-target="dd-c4-kv">key-value</a> (Redis), <a class="term-link" data-target="dd-c4-document">document</a> (MongoDB), <a class="term-link" data-target="dd-c4-columnfam">column-family</a> (Cassandra), <a class="term-link" data-target="dd-c4-graph">graph</a> (Neo4j), <a class="term-link" data-target="dd-c4-tsdb">time-series</a> (InfluxDB, Timestream). <a class="term-link" data-target="dd-c4-object">Object storage</a> (S3, Azure Blob, GCS). <strong>File systems</strong> (HDFS).</dd>
                <dt>DBMS</dt><dd>Software layer over storage providing transactions, queries, concurrency control. <a class="term-link" data-target="dd-c4-oltp">OLTP</a> (row-oriented, ACID, small transactions — order entry) vs <a class="term-link" data-target="dd-c4-olap">OLAP</a> (columnar, bulk scans — analytics). <a class="term-link" data-target="dd-c4-acid">ACID</a>: Atomicity, Consistency, Isolation, Durability.</dd>
                <dt>Data warehousing</dt><dd><a class="term-link" data-target="dd-c4-warehouse">Subject-oriented, integrated, time-variant, non-volatile (Inmon)</a>. Modern cloud warehouses: <strong>Snowflake</strong>, BigQuery, Redshift, Databricks SQL. Typically columnar, MPP. See also <a class="term-link" data-target="dd-c4-lakehouse">lakehouse</a>.</dd>
                <dt>Archiving &amp; backups</dt><dd>Snapshots · point-in-time recovery · disaster recovery. <a class="term-link" data-target="dd-c4-rpo">RPO</a> (Recovery Point Objective — data loss tolerance) · <a class="term-link" data-target="dd-c4-rto">RTO</a> (Recovery Time Objective — downtime tolerance).</dd>
                <dt>Blob lifecycle</dt><dd>Storage tiers by access frequency: <a class="term-link" data-target="dd-c4-tiers">hot · cool/warm · archive</a>. Lifecycle rules auto-transition objects.</dd>
                <dt>Retention &amp; compliance</dt><dd>Data retention policies align with GDPR (minimisation), sector-specific laws (health, finance, tax). Legal holds override retention.</dd>
                <dt>Storage optimisation</dt><dd>Compression (Parquet + Snappy/Zstd) · <a class="term-link" data-target="dd-c4-partitioning">partitioning</a> (by date, region) · <a class="term-link" data-target="dd-c4-indexing">indexing</a> (B-tree, hash, bitmap) · clustering (co-locate related rows) · compaction (merge small files).</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> OLTP vs OLAP · ACID meaning · RPO vs RTO definitions. NoSQL categories are memorised differently than RDBMS.</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c4-rdbms"><div class="dd-name">Relational DB (RDBMS)</div><div class="dd-def">Tables with rows and columns, fixed schema, related via foreign keys. Queried in SQL. Strongly ACID-compliant. The default choice for transactional systems.</div><div class="dd-ex"><strong>Ex.</strong> The Funding &amp; Tenders Portal stores grant applications, beneficiaries and signatures in PostgreSQL — referential integrity guarantees no orphaned records.</div></div>

                  <div class="dd-term" id="dd-c4-kv"><div class="dd-name">Key-value store</div><div class="dd-def">Simplest NoSQL — looks up an opaque value by a unique key. Microsecond latency, no query language beyond GET/PUT/DELETE. Perfect for caches, sessions, feature flags.</div><div class="dd-ex"><strong>Ex.</strong> Redis caches EU Login session tokens — every page load hits Redis once, the user database almost never.</div></div>

                  <div class="dd-term" id="dd-c4-document"><div class="dd-name">Document DB</div><div class="dd-def">Stores self-contained JSON-like documents. No fixed schema across documents — each can have different fields. Good for variable-shape content and rapid iteration.</div><div class="dd-ex"><strong>Ex.</strong> A DG CNECT consultation platform stores each public comment as a MongoDB document — comments may include free text, attachments, ratings, structured tags, all in one record.</div></div>

                  <div class="dd-term" id="dd-c4-columnfam"><div class="dd-name">Column-family DB</div><div class="dd-def">Wide-row store designed for write-heavy, large-scale workloads with predictable access patterns. Rows can have millions of columns; data is distributed across many nodes. Popular: Cassandra, ScyllaDB, HBase.</div><div class="dd-ex"><strong>Ex.</strong> Storing every event from every Copernicus satellite pass in Cassandra — billions of rows, queried by satellite_id + time range.</div></div>

                  <div class="dd-term" id="dd-c4-graph"><div class="dd-name">Graph DB</div><div class="dd-def">First-class storage for entities (nodes) and relationships (edges). Optimised for traversal queries ("find all paths between X and Y") that are painful in SQL.</div><div class="dd-ex"><strong>Ex.</strong> OLAF stores beneficial ownership in Neo4j — "show me every legal entity within 3 hops of this sanctioned individual" runs in milliseconds; the same in SQL would be a recursive nightmare.</div></div>

                  <div class="dd-term" id="dd-c4-tsdb"><div class="dd-name">Time-series DB</div><div class="dd-def">Optimised for append-only, timestamp-indexed measurements. Compresses well, supports time-range queries and downsampling natively. InfluxDB, TimescaleDB, Amazon Timestream.</div><div class="dd-ex"><strong>Ex.</strong> JRC stores hourly air-quality readings from EU monitoring stations in InfluxDB — querying "PM2.5 in Milan over the last 30 days" is one line.</div></div>

                  <div class="dd-term" id="dd-c4-object"><div class="dd-name">Object storage</div><div class="dd-def">Flat namespace of immutable blobs identified by a key. Practically infinite scale, very cheap, accessed via HTTP API. S3 (AWS), Blob Storage (Azure), GCS (Google).</div><div class="dd-ex"><strong>Ex.</strong> Sentinel satellite imagery sits in object storage — petabytes of scene files served as the foundation of the Copernicus Open Access Hub.</div></div>

                  <div class="dd-term" id="dd-c4-oltp"><div class="dd-name">OLTP · Online Transaction Processing</div><div class="dd-def">Many small, write-heavy transactions per second. Row-oriented storage, strong consistency (ACID), narrow queries by primary key. Powers operational systems.</div><div class="dd-ex"><strong>Ex.</strong> The TARIC customs declaration system: thousands of declarations per minute, each a small insert. PostgreSQL row-store, indexed by EORI + date.</div></div>

                  <div class="dd-term" id="dd-c4-olap"><div class="dd-name">OLAP · Online Analytical Processing</div><div class="dd-def">Few but huge read queries scanning millions of rows for aggregation and BI. Columnar storage, MPP (massively parallel processing). Slower per-row writes, fast scans.</div><div class="dd-ex"><strong>Ex.</strong> Eurostat's analytical cube on BigQuery — analysts run year-over-year aggregations across 30 years of indicators in seconds.</div></div>

                  <div class="dd-term" id="dd-c4-acid"><div class="dd-name">ACID</div><div class="dd-def"><strong>A</strong>tomicity (all-or-nothing), <strong>C</strong>onsistency (constraints hold before+after), <strong>I</strong>solation (concurrent txns appear sequential), <strong>D</strong>urability (committed data survives crashes). The transactional contract.</div><div class="dd-ex"><strong>Ex.</strong> A grant payment that debits the EU budget and credits the beneficiary either both happen or neither — Atomicity. Two payment officers editing the same record can't see each other's half-done work — Isolation.</div></div>

                  <div class="dd-term" id="dd-c4-warehouse"><div class="dd-name">Data warehouse (Inmon definition)</div><div class="dd-def">A central analytical store characterised by 4 properties: <strong>subject-oriented</strong> (organised by domain, not source system), <strong>integrated</strong> (consistent definitions), <strong>time-variant</strong> (history retained), <strong>non-volatile</strong> (no in-place updates).</div><div class="dd-ex"><strong>Ex.</strong> The Commission's central reporting warehouse organises data around "Beneficiary", "Grant", "Country" — not around "the system it came from".</div></div>

                  <div class="dd-term" id="dd-c4-lakehouse"><div class="dd-name">Lakehouse</div><div class="dd-def">Hybrid: object-storage data lake (cheap, raw) + warehouse-grade table format (Delta, Iceberg, Hudi) giving you ACID transactions, schema enforcement and BI performance on the lake. One copy of the data serves both data-science and BI.</div><div class="dd-ex"><strong>Ex.</strong> A DG REGIO Databricks lakehouse on Azure ADLS Gen2 — data scientists train models on Parquet files, BI users query the same files via Databricks SQL.</div></div>

                  <div class="dd-term" id="dd-c4-rpo"><div class="dd-name">RPO · Recovery Point Objective</div><div class="dd-def">Maximum acceptable amount of <strong>data loss</strong> after an incident, measured in time. RPO = 1 h means you can afford to lose at most 1 h of data — backups must run at least hourly.</div><div class="dd-ex"><strong>Ex.</strong> The CESOP fraud system has RPO = 5 min — supported by streaming replication. Eurostat's annual indicators have RPO = 24 h — nightly snapshots suffice.</div></div>

                  <div class="dd-term" id="dd-c4-rto"><div class="dd-name">RTO · Recovery Time Objective</div><div class="dd-def">Maximum acceptable <strong>downtime</strong> after an incident — how fast must service be restored. RTO = 30 min requires hot-standby; RTO = 24 h tolerates a cold restore.</div><div class="dd-ex"><strong>Ex.</strong> The EU Login service has RTO = minutes (multi-region active-active). An internal monthly reporting tool has RTO = 1 day.</div></div>

                  <div class="dd-term" id="dd-c4-tiers"><div class="dd-name">Hot / Cool / Archive tiers</div><div class="dd-def">Object-storage cost-vs-latency tiers. <strong>Hot</strong>: frequent reads, expensive storage, cheap retrieval. <strong>Cool/Warm</strong>: infrequent. <strong>Archive</strong>: rare reads, cheapest storage, expensive retrieval (hours of latency).</div><div class="dd-ex"><strong>Ex.</strong> Sentinel imagery from the last 90 days = Hot. 90 days–2 years = Cool. Older = Archive (Glacier / Azure Archive). Lifecycle rules transition automatically.</div></div>

                  <div class="dd-term" id="dd-c4-partitioning"><div class="dd-name">Partitioning</div><div class="dd-def">Splitting a large table by a key (date, region) so queries can read only the relevant partitions instead of scanning everything — partition pruning.</div><div class="dd-ex"><strong>Ex.</strong> Customs declarations partitioned by month + Member State — a query for "Belgium, March 2026" reads one partition instead of scanning the whole table.</div></div>

                  <div class="dd-term" id="dd-c4-indexing"><div class="dd-name">Indexing</div><div class="dd-def">A secondary structure (B-tree, hash, bitmap) that lets the engine find rows by a column value in log(n) instead of full scan. Speeds reads, slows writes (every insert updates the index).</div><div class="dd-ex"><strong>Ex.</strong> Indexing the PIC column on the beneficiary table makes "find this beneficiary" instant; without it, each lookup scans millions of rows.</div></div>

                </div>
              </div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">Ch 5</div>
            <div class="tl-name">Data Analysis &amp; Interpretation</div>
            <div class="tl-tag">EDA · predictive · ML · text/sentiment · time series</div>
            <div class="tl-body">
              <div class="tl-context">
                Extract insight from prepared data. The maturity ladder: descriptive (what happened) → diagnostic (why) → predictive (what will) → prescriptive (what to do).
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 200" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
                <text x="300" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">ANALYTICS MATURITY LADDER</text>

              <dl>
                <dt>EDA</dt><dd><a class="term-link" data-target="dd-c5-eda">Exploratory Data Analysis</a> — first pass on a new dataset. Summary stats (mean, median, std, min/max), distributions, correlations (Pearson/Spearman), quick visualisations (histogram, scatter, box plot). Goal: understand shape before modeling.</dd>
                <dt>Analytics maturity</dt><dd><a class="term-link" data-target="dd-c5-maturity">Descriptive → Diagnostic → Predictive → Prescriptive</a> — the four levels of analytical sophistication.</dd>
                <dt>Predictive analytics</dt><dd><a class="term-link" data-target="dd-c5-regression">Regression</a> (linear, logistic, polynomial) · <a class="term-link" data-target="dd-c5-trees">trees</a> (decision tree, Random Forest, Gradient Boosting — XGBoost, LightGBM) · <strong>neural networks</strong> (deep learning). Workflow: <a class="term-link" data-target="dd-c5-traintest">train / validate / test split</a>, cross-validation, hyperparameter tuning.</dd>
                <dt>Machine learning</dt><dd><a class="term-link" data-target="dd-c5-supervised">Supervised</a> (labeled data — regression + classification) · <a class="term-link" data-target="dd-c5-unsupervised">unsupervised</a> (clustering — <a class="term-link" data-target="dd-c5-kmeans">k-means, DBSCAN</a>; dimensionality reduction — <a class="term-link" data-target="dd-c5-pca">PCA, t-SNE, UMAP</a>) · <a class="term-link" data-target="dd-c5-rl">reinforcement</a> (agent + reward).</dd>
                <dt>Text &amp; sentiment analysis</dt><dd>Tokenisation · <a class="term-link" data-target="dd-c5-ner">NER</a> (Named Entity Recognition) · <a class="term-link" data-target="dd-c5-embeddings">embeddings</a> (word2vec, BERT, OpenAI embeddings) · sentiment classification (positive/negative/neutral). Tools: Azure AI Language, Hugging Face, spaCy.</dd>
                <dt>Time series analysis</dt><dd>Decomposition: trend + seasonality + residual. Models: <a class="term-link" data-target="dd-c5-arima">ARIMA</a> (requires stationarity — differencing) · <a class="term-link" data-target="dd-c5-prophet">Prophet</a> (handles seasonality + holidays natively) · <a class="term-link" data-target="dd-c5-lstm">LSTM</a> (deep learning, long-range dependencies). Key concept: <a class="term-link" data-target="dd-c5-stationarity">stationarity</a> (mean/variance constant over time).</dd>
                <dt>Interpreting</dt><dd>Confidence intervals · <a class="term-link" data-target="dd-c5-pvalue">p-values</a> · <a class="term-link" data-target="dd-c5-abtest">A/B testing</a> · correlation ≠ causation (needs randomised design or careful causal inference). Always cross-check with domain expert.</dd>
                <dt>Communicating</dt><dd>Match audience (exec vs analyst) · lead with the headline · show uncertainty · use visuals (chapter 6).</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> supervised vs unsupervised is basic — don't miss. Time-series: ARIMA needs stationarity. EDA is the phase before modeling, not after.</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c5-eda"><div class="dd-name">EDA · Exploratory Data Analysis</div><div class="dd-def">The first pass on a fresh dataset — compute summary stats, plot distributions, check correlations and missingness. Purpose: <strong>understand the data before modelling it</strong>. Always before, never after.</div><div class="dd-ex"><strong>Ex.</strong> Receiving a new beneficiary register from a Member State, a JRC analyst plots histograms of "annual turnover", spots a spike at exactly €0 (default value), and investigates before training any model.</div></div>

                  <div class="dd-term" id="dd-c5-maturity"><div class="dd-name">Analytics maturity ladder</div><div class="dd-def">Four levels of insight: <strong>Descriptive</strong> ("what happened") → <strong>Diagnostic</strong> ("why did it") → <strong>Predictive</strong> ("what will happen") → <strong>Prescriptive</strong> ("what should we do"). Value and complexity rise together.</div><div class="dd-ex"><strong>Ex.</strong> CAP payments dashboard: descriptive = total spent per region; diagnostic = why region X is low; predictive = forecast next year; prescriptive = recommend allocation changes.</div></div>

                  <div class="dd-term" id="dd-c5-regression"><div class="dd-name">Regression models</div><div class="dd-def">Predict a continuous numeric value from input features. <strong>Linear</strong>: straight-line fit. <strong>Logistic</strong>: outputs a probability for binary classification (despite the name). <strong>Polynomial</strong>: curved fit.</div><div class="dd-ex"><strong>Ex.</strong> Linear regression of "regional GDP growth" on R&amp;D investment, education spend and demographic indicators for cohesion-policy analysis.</div></div>

                  <div class="dd-term" id="dd-c5-trees"><div class="dd-name">Tree-based models</div><div class="dd-def">A single <strong>decision tree</strong> splits data on feature thresholds. <strong>Random Forest</strong> averages many independent trees. <strong>Gradient Boosting</strong> (XGBoost, LightGBM) builds trees that fix the previous tree's errors — usually the strongest tabular ML.</div><div class="dd-ex"><strong>Ex.</strong> XGBoost on a labelled set of historical OLAF cases to flag suspicious grant claims by combining 50+ features.</div></div>

                  <div class="dd-term" id="dd-c5-traintest"><div class="dd-name">Train / validate / test split</div><div class="dd-def">Split data three ways: <strong>train</strong> (model learns), <strong>validate</strong> (tune hyperparameters), <strong>test</strong> (final unbiased performance estimate, used once). Prevents over-optimistic accuracy claims.</div><div class="dd-ex"><strong>Ex.</strong> 70/15/15 split on a fraud-detection dataset; the test set is locked in a vault and only opened to report final precision/recall in the AI-system documentation.</div></div>

                  <div class="dd-term" id="dd-c5-supervised"><div class="dd-name">Supervised learning</div><div class="dd-def">Training data has <strong>labels</strong> (the right answer). Two flavours: regression (predict a number) and classification (predict a category). Most common ML setup.</div><div class="dd-ex"><strong>Ex.</strong> Train a model on 5 years of past CAP audits labelled "fraud / not fraud" to score new claims.</div></div>

                  <div class="dd-term" id="dd-c5-unsupervised"><div class="dd-name">Unsupervised learning</div><div class="dd-def">No labels — algorithm finds structure on its own. Two flavours: <strong>clustering</strong> (group similar items) and <strong>dimensionality reduction</strong> (compress features while preserving structure).</div><div class="dd-ex"><strong>Ex.</strong> Cluster Erasmus+ host institutions by their student-mix profile to discover natural archetypes nobody pre-defined.</div></div>

                  <div class="dd-term" id="dd-c5-kmeans"><div class="dd-name">k-means / DBSCAN clustering</div><div class="dd-def"><strong>k-means</strong>: choose k, iteratively assign points to the nearest centroid (assumes round, similar-sized clusters). <strong>DBSCAN</strong>: density-based, finds arbitrary shapes and labels low-density points as noise — no k needed.</div><div class="dd-ex"><strong>Ex.</strong> k-means on NUTS-3 regions to define 5 socio-economic typologies for cohesion policy. DBSCAN on geo-coordinates of border-crossing incidents to detect hotspots without pre-specifying their number.</div></div>

                  <div class="dd-term" id="dd-c5-pca"><div class="dd-name">PCA / t-SNE / UMAP (dimensionality reduction)</div><div class="dd-def">Compress many features into 2–3 dimensions while preserving structure. <strong>PCA</strong>: linear, fast, interpretable. <strong>t-SNE</strong> / <strong>UMAP</strong>: nonlinear, better for visualising clusters but lose global distances.</div><div class="dd-ex"><strong>Ex.</strong> 50 socio-economic indicators per Member State → PCA reduces to 2 components used to plot countries on a map and explain ~70% of variance.</div></div>

                  <div class="dd-term" id="dd-c5-rl"><div class="dd-name">Reinforcement learning</div><div class="dd-def">An agent takes actions in an environment, receives rewards, and learns a policy to maximise long-run reward. No labelled data — feedback comes from outcomes.</div><div class="dd-ex"><strong>Ex.</strong> Optimising the schedule of a fleet of inspection drones (Frontex / EFCA) where each route choice eventually pays off in detected violations.</div></div>

                  <div class="dd-term" id="dd-c5-ner"><div class="dd-name">NER · Named Entity Recognition</div><div class="dd-def">NLP technique that identifies and classifies entities in text — persons, organisations, places, dates, money amounts, legal-act IDs.</div><div class="dd-ex"><strong>Ex.</strong> Run NER on a citizen complaint to DG JUST to extract every mentioned company name and Court ruling reference, then auto-route to the right unit.</div></div>

                  <div class="dd-term" id="dd-c5-embeddings"><div class="dd-name">Embeddings</div><div class="dd-def">Numeric vector representations of text (or images, audio) where semantic similarity ↔ vector proximity. Foundation for semantic search, RAG, and most modern NLP.</div><div class="dd-ex"><strong>Ex.</strong> Embed every regulation in EUR-Lex; "find me acts similar to GDPR" returns Reg 2018/1725 and the AI Act because their embeddings sit nearby — even without keyword matches.</div></div>

                  <div class="dd-term" id="dd-c5-arima"><div class="dd-name">ARIMA</div><div class="dd-def">Classical time-series model: combines <strong>A</strong>uto<strong>R</strong>egressive, <strong>I</strong>ntegrated (differencing), <strong>M</strong>oving <strong>A</strong>verage components. <strong>Requires stationarity</strong> — usually achieved by differencing.</div><div class="dd-ex"><strong>Ex.</strong> Forecast monthly EU airport passenger volumes by differencing the trend, fitting ARIMA(1,1,1), and projecting 12 months ahead.</div></div>

                  <div class="dd-term" id="dd-c5-prophet"><div class="dd-name">Prophet</div><div class="dd-def">Open-source forecasting library (Meta) that handles trend, multiple seasonalities and holidays out of the box. Robust to missing data and forecasters with little stats background.</div><div class="dd-ex"><strong>Ex.</strong> Forecast the daily volume of EU Login authentications including weekly cycles and EU public-holiday effects in a few lines.</div></div>

                  <div class="dd-term" id="dd-c5-lstm"><div class="dd-name">LSTM (deep-learning time series)</div><div class="dd-def">A recurrent neural network architecture with gates that retain long-range dependencies. Strong on long, complex time series; expensive and harder to interpret.</div><div class="dd-ex"><strong>Ex.</strong> Forecast intraday electricity demand across Member States using 5 years of hourly data, weather features and macro indicators.</div></div>

                  <div class="dd-term" id="dd-c5-stationarity"><div class="dd-name">Stationarity</div><div class="dd-def">A time series whose statistical properties (mean, variance, autocorrelation) are constant over time. Many classical models (ARIMA) assume it; non-stationary series usually need differencing first.</div><div class="dd-ex"><strong>Ex.</strong> EU annual GDP is non-stationary (it trends up); first-differenced GDP growth ≈ stationary, suitable for ARIMA.</div></div>

                  <div class="dd-term" id="dd-c5-pvalue"><div class="dd-name">p-value</div><div class="dd-def">Probability of observing a result as extreme as the one seen, <em>assuming the null hypothesis is true</em>. Small p (often &lt; 0.05) → reject the null. Not a probability that the hypothesis is true.</div><div class="dd-ex"><strong>Ex.</strong> Comparing fraud rates of two Member States: p = 0.03 → unlikely to be pure chance. Beware multiple-testing inflation when running 50 such tests.</div></div>

                  <div class="dd-term" id="dd-c5-abtest"><div class="dd-name">A/B testing</div><div class="dd-def">Randomly split users into two groups, expose to variants A and B, measure the difference in a chosen metric. Gold standard for causal inference about a change.</div><div class="dd-ex"><strong>Ex.</strong> Test two onboarding flows on the Funding &amp; Tenders Portal — 50% see A, 50% see B, measure the proportal completing the application within 7 days.</div></div>

                </div>
              </div>
            </div>
          </div>

            <div class="tl-tag">Principles · tools · dashboards · storytelling</div>
            <div class="tl-body">
              <div class="tl-context">

              <dl>
                <dt>Principles</dt><dd>Chart matches the data: <a class="term-link" data-target="dd-c6-bar">bar</a> for categorical comparisons · <a class="term-link" data-target="dd-c6-line">line</a> for trends over time · <a class="term-link" data-target="dd-c6-scatter">scatter</a> for correlation · <a class="term-link" data-target="dd-c6-heatmap">heatmap</a> for matrices. Use <a class="term-link" data-target="dd-c6-preattentive">pre-attentive attributes</a> (position, length, colour, size) — the brain processes these before conscious thought. Minimise <a class="term-link" data-target="dd-c6-chartjunk">chartjunk</a> (Tufte).</dd>
                <dt>Tools</dt><dd><a class="term-link" data-target="dd-c6-powerbi">Power BI</a> (Microsoft, integrated with <a class="term-link" data-target="dd-c6-fabric">Microsoft Fabric</a> — unified lakehouse + BI) · <a class="term-link" data-target="dd-c6-tableau">Tableau</a> · <strong>Metabase</strong> (open source) · <strong>Looker</strong> · code-first: Matplotlib, Plotly, Seaborn, Altair.</dd>
                <dt>Dashboards</dt><dd>Two archetypes: <a class="term-link" data-target="dd-c6-operational">operational</a> (real-time, narrow, single-purpose) · <a class="term-link" data-target="dd-c6-analytical">analytical</a> (broader, interactive, drill-downs). Layout: KPI summary at top, details below. Self-service vs curated governance tradeoff.</dd>
                <dt>Interactive</dt><dd>Filters · drill-downs · cross-highlighting · tooltips · parameterised views. Let users answer their own follow-up questions without a new request.</dd>
                <dt>Storytelling</dt><dd>Narrative arc: hook → context → insight → recommendation → next step. The <a class="term-link" data-target="dd-c6-minto">Minto Pyramid</a>: lead with the answer, support with evidence.</dd>
                <dt>Reporting best practices</dt><dd>Consistent naming · dated snapshots · audit trail · accessible (colourblind-safe palettes, alt text) · mobile-friendly · versioned.</dd>
                <dt>Common pitfalls</dt><dd><a class="term-link" data-target="dd-c6-pie-pitfall">Pie charts with &gt; 7 slices</a> · <a class="term-link" data-target="dd-c6-truncated">truncated y-axis</a> inflating small differences · 3-D perspective distortion · missing units · rainbow colourmap for ordered data (use <a class="term-link" data-target="dd-c6-viridis">viridis</a>).</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> chart-type-by-data is a classic MCQ. Pre-attentive attributes: position &gt; length &gt; angle &gt; area &gt; colour (in accuracy).</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c6-bar"><div class="dd-name">Bar chart</div><div class="dd-def">Compares a numeric value across <strong>categorical</strong> items. Length encodes the value — easy to read accurately. Vertical (column) or horizontal (bar) — horizontal preferred for long category labels.</div><div class="dd-ex"><strong>Ex.</strong> Cohesion-fund spending per Member State in 2025 — one bar per country, sorted descending.</div></div>

                  <div class="dd-term" id="dd-c6-line"><div class="dd-name">Line chart</div><div class="dd-def">Best for showing a value's <strong>change over time</strong> with a continuous x-axis (date/time). Multiple lines for comparing series. Don't use for purely categorical x-axis.</div><div class="dd-ex"><strong>Ex.</strong> EU27 quarterly unemployment rate from 2008 to 2026 — one line, x = quarter.</div></div>

                  <div class="dd-term" id="dd-c6-scatter"><div class="dd-name">Scatter plot</div><div class="dd-def">Points in 2-D space — visualises the <strong>relationship between two numeric variables</strong>. Adds size/colour as third/fourth dimensions. Reveals correlation, clusters, outliers.</div><div class="dd-ex"><strong>Ex.</strong> Member State R&amp;D spend (% GDP) on x vs patent filings on y — points reveal the correlation and the outliers.</div></div>

                  <div class="dd-term" id="dd-c6-heatmap"><div class="dd-name">Heatmap</div><div class="dd-def">A grid where cell colour encodes a numeric value. Best for <strong>matrices</strong> — correlation matrices, two-categorical-dimension comparisons, calendar-style displays.</div><div class="dd-ex"><strong>Ex.</strong> Correlation heatmap of 30 Eurostat indicators; or trade flows matrix between MS pairs.</div></div>

                  <div class="dd-term" id="dd-c6-preattentive"><div class="dd-name">Pre-attentive attributes</div><div class="dd-def">Visual properties the brain processes <em>before</em> conscious attention (~200 ms). Ranked by accuracy: <strong>position &gt; length &gt; angle &gt; area &gt; volume &gt; colour hue</strong>. Use higher-ranked attributes for the most important comparison.</div><div class="dd-ex"><strong>Ex.</strong> Encode "% spent" as bar length (rank 2) instead of pie-slice angle (rank 3) so readers compare values accurately at a glance.</div></div>

                  <div class="dd-term" id="dd-c6-chartjunk"><div class="dd-name">Chartjunk (Tufte)</div><div class="dd-def">Edward Tufte's term for non-data ink — gridlines, 3-D effects, decorations, redundant labels — that adds visual noise without conveying information. Maximise the <strong>data-ink ratio</strong>.</div><div class="dd-ex"><strong>Ex.</strong> Replace a 3-D pie with shadows and texture by a flat horizontal bar chart with direct value labels.</div></div>

                  <div class="dd-term" id="dd-c6-powerbi"><div class="dd-name">Power BI</div><div class="dd-def">Microsoft's BI platform — drag-and-drop visualisations, semantic model (DAX), publishing to a service with row-level security. Tightly integrated with Microsoft Fabric.</div><div class="dd-ex"><strong>Ex.</strong> Many Commission DGs publish operational dashboards in Power BI Service against an Azure SQL or Fabric lakehouse backend.</div></div>

                  <div class="dd-term" id="dd-c6-fabric"><div class="dd-name">Microsoft Fabric</div><div class="dd-def">Microsoft's unified analytics platform — combines data lake (OneLake), pipelines, warehouse, real-time analytics and Power BI in one SaaS product. Single copy of data across workloads.</div><div class="dd-ex"><strong>Ex.</strong> A DG REGIO Fabric workspace where one OneLake delta table feeds engineering pipelines, a Power BI semantic model, and an ML notebook — no extra copies.</div></div>

                  <div class="dd-term" id="dd-c6-tableau"><div class="dd-name">Tableau</div><div class="dd-def">Best-in-class visual exploration tool (Salesforce). Strong drag-and-drop UX, rich chart library, public-facing Tableau Server / Cloud for publishing.</div><div class="dd-ex"><strong>Ex.</strong> Eurostat publishes some interactive visualisations on Tableau Public for journalists and researchers.</div></div>

                  <div class="dd-term" id="dd-c6-operational"><div class="dd-name">Operational dashboard</div><div class="dd-def"><strong>Real-time, narrow, single-purpose</strong> — supports a specific operational decision being made now. Few KPIs, large fonts, refreshes seconds-to-minutes.</div><div class="dd-ex"><strong>Ex.</strong> A Frontex situation room dashboard showing live border-crossing volumes per gate, refreshed every 30 s.</div></div>

                  <div class="dd-term" id="dd-c6-analytical"><div class="dd-name">Analytical dashboard</div><div class="dd-def"><strong>Broader, interactive, exploratory</strong> — supports investigation across many slices. Filters, drill-downs, more depth, refreshes hourly to daily.</div><div class="dd-ex"><strong>Ex.</strong> An ECFIN macro dashboard letting analysts pivot GDP, debt and unemployment across MS, sectors and time.</div></div>

                  <div class="dd-term" id="dd-c6-minto"><div class="dd-name">Minto Pyramid</div><div class="dd-def">Communication framework: <strong>lead with the conclusion</strong>, support with grouped arguments, then evidence. Designed for executive audiences who want the answer first.</div><div class="dd-ex"><strong>Ex.</strong> Briefing for a College of Commissioners: line 1 = "spend €X on programme Y"; lines 2–4 = three reasons; rest = supporting analysis.</div></div>

                  <div class="dd-term" id="dd-c6-pie-pitfall"><div class="dd-name">Pie chart pitfall</div><div class="dd-def">Pies are hard to read past 5–7 slices because angle is a low-rank pre-attentive attribute. <strong>Prefer a sorted horizontal bar chart</strong>.</div><div class="dd-ex"><strong>Ex.</strong> "EU budget by heading" with 11 headings → never a pie. A sorted bar chart shows the order and magnitudes instantly.</div></div>

                  <div class="dd-term" id="dd-c6-truncated"><div class="dd-name">Truncated y-axis trap</div><div class="dd-def">Cutting the y-axis baseline above zero (or starting it close to data values) <strong>visually inflates small differences</strong>. Misleading for bar charts; sometimes acceptable for line charts where the reader expects relative change.</div><div class="dd-ex"><strong>Ex.</strong> A bar chart of MS unemployment 7.1% vs 7.3% with y-axis [7.0–7.4] makes a 0.2-pt difference look like a doubling.</div></div>

                  <div class="dd-term" id="dd-c6-viridis"><div class="dd-name">Viridis colourmap</div><div class="dd-def">A perceptually uniform sequential palette — equal data steps look like equal colour steps. <strong>Replaces the legacy "rainbow" colourmap</strong> which is non-uniform and confusing for colour-blind users.</div><div class="dd-ex"><strong>Ex.</strong> Plot regional GDP per capita with viridis — a colour-blind reader can still rank values; rainbow would not allow that.</div></div>

                </div>
              </div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">Ch 7</div>
            <div class="tl-name">Data Governance &amp; Compliance</div>
            <div class="tl-tag">Policies · privacy · security · risk · monitoring</div>
            <div class="tl-body">
              <div class="tl-context">
                Governance is the operating system for data: who owns what, what can be done with it, how quality is measured, and how violations are detected. EU regs (Timeline tab) give the legal framing; operational frameworks give the implementation.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 215" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
                <text x="300" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">POLICY → STANDARD → PROCEDURE</text>

                <polygon points="300,74 295,66 305,66" fill="#185FA5"/>

                <text x="300" y="102" text-anchor="middle" font-size="9.5" fill="#3d3d3a">"AES-256 · KMS-managed keys · 90-day rotation"</text>

                <polygon points="300,120 295,112 305,112" fill="#185FA5"/>

                <rect x="126" y="178" width="112" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/><text x="182" y="195" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">2 · Protect</text>
                <rect x="242" y="178" width="112" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/><text x="298" y="195" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">3 · Detect</text>
                <rect x="358" y="178" width="112" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/><text x="414" y="195" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">4 · Respond</text>
                <rect x="474" y="178" width="116" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/><text x="532" y="195" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">5 · Recover</text>
              </svg><div class="tl-vcap">DPIA trigger = "likely to result in high risk to rights and freedoms" (GDPR Art 35).</div></div>
              <dl>
                <dt>Policies vs standards</dt><dd><a class="term-link" data-target="dd-c7-policy">Policy</a> = the rule. <a class="term-link" data-target="dd-c7-standard">Standard</a> = the specific implementation. <a class="term-link" data-target="dd-c7-procedure">Procedure</a> = the steps. Policies are stable; standards evolve.</dd>
                <dt>Regulatory compliance</dt><dd>EU: GDPR (2016/679), Reg 2018/1725, DGA, Data Act, AI Act, EHDS (see Timeline). Regional: HIPAA (US health), CCPA (California), PIPEDA (Canada). Sector: PCI-DSS (cards), SOX (financial reporting).</dd>
                <dt>Privacy principles</dt><dd>GDPR / Reg 2018/1725 core principles: <a class="term-link" data-target="dd-c7-lawfulness">lawfulness, fairness, transparency</a> · <a class="term-link" data-target="dd-c7-purpose">purpose limitation</a> · <a class="term-link" data-target="dd-c7-minimisation">data minimisation</a> · accuracy · <a class="term-link" data-target="dd-c7-storage-limit">storage limitation</a> · integrity &amp; confidentiality · <a class="term-link" data-target="dd-c7-accountability">accountability</a>. Data-subject rights (Art 15–22): access, rectification, erasure, portability, objection.</dd>
                <dt>Security frameworks</dt><dd><a class="term-link" data-target="dd-c7-cis">CIS Controls</a> (18 critical controls, prioritised) · <a class="term-link" data-target="dd-c7-nist">NIST CSF</a> (Identify, Protect, Detect, Respond, Recover) · <a class="term-link" data-target="dd-c7-iso27001">ISO 27001</a> (ISMS certification standard). Azure Policy can auto-enforce CIS benchmarks on cloud resources.</dd>
                <dt>Risk management</dt><dd>Identify → Assess (likelihood × impact) → Mitigate → Monitor. Formal tools: <a class="term-link" data-target="dd-c7-dpia">DPIA</a> (Data Protection Impact Assessment — GDPR Art 35) · <a class="term-link" data-target="dd-c7-aia">AI Impact Assessment</a> (AI Act). <a class="term-link" data-target="dd-c7-risk-register">Risk register</a> is a living document.</dd>
                <dt>Monitoring &amp; auditing</dt><dd>Continuous not annual. <a class="term-link" data-target="dd-c7-siem">SIEM</a> (Security Information and Event Management — Splunk, Sentinel, Elastic) aggregates logs and alerts. Audit trails for any change to sensitive data. Quarterly access reviews.</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> policy vs standard vs procedure distinction. NIST CSF 5 functions in order. DPIA trigger = "high risk to rights &amp; freedoms" (Art 35).</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c7-policy"><div class="dd-name">Policy</div><div class="dd-def">A high-level <strong>rule</strong> stating what must happen and why. Stable, principle-level, signed off by leadership.</div><div class="dd-ex"><strong>Ex.</strong> "All personal data of EU citizens must be encrypted at rest and in transit." Doesn't say <em>how</em>.</div></div>

                  <div class="dd-term" id="dd-c7-standard"><div class="dd-name">Standard</div><div class="dd-def">The <strong>specific implementation</strong> of a policy — concrete technologies, parameters, configurations. Evolves as technology evolves.</div><div class="dd-ex"><strong>Ex.</strong> "Use AES-256 with KMS-managed keys, rotated every 90 days, TLS 1.3 in transit." Implements the encryption policy.</div></div>

                  <div class="dd-term" id="dd-c7-procedure"><div class="dd-name">Procedure</div><div class="dd-def">The <strong>step-by-step instructions</strong> someone follows to apply a standard. Operational, with named actors and tools.</div><div class="dd-ex"><strong>Ex.</strong> "1. Open Azure portal · 2. Create KMS key · 3. Enable TDE on the database · 4. Verify with audit log · 5. Tick the checklist."</div></div>

                  <div class="dd-term" id="dd-c7-lawfulness"><div class="dd-name">Lawfulness, fairness, transparency</div><div class="dd-def">Three intertwined GDPR / Reg 2018/1725 principles. Lawfulness: a valid legal basis (Art 6/Art 5). Fairness: no surprise to the subject. Transparency: clear, accessible information about processing.</div><div class="dd-ex"><strong>Ex.</strong> An EU staff portal collecting biometric login data must rely on an explicit legal basis, behave as the privacy notice described, and link to that notice from the login page.</div></div>

                  <div class="dd-term" id="dd-c7-purpose"><div class="dd-name">Purpose limitation</div><div class="dd-def">Personal data collected for one specified purpose <strong>cannot be reused</strong> for incompatible purposes without a new lawful basis.</div><div class="dd-ex"><strong>Ex.</strong> A list of EU staff collected for emergency-evacuation contact cannot then be used for HR performance analytics.</div></div>

                  <div class="dd-term" id="dd-c7-minimisation"><div class="dd-name">Data minimisation</div><div class="dd-def">Process only the data <strong>strictly necessary</strong> for the stated purpose. Don't collect "just in case".</div><div class="dd-ex"><strong>Ex.</strong> A grant evaluation needs the legal entity's name and PIC, not the personal home addresses of its researchers.</div></div>

                  <div class="dd-term" id="dd-c7-storage-limit"><div class="dd-name">Storage limitation</div><div class="dd-def">Personal data is kept <strong>no longer than necessary</strong> for the purpose. Define a retention period upfront and delete or anonymise on expiry.</div><div class="dd-ex"><strong>Ex.</strong> Unsuccessful job applications to the Commission are deleted after a defined period (typically 2 years), unless the candidate consented to a reserve list.</div></div>

                  <div class="dd-term" id="dd-c7-accountability"><div class="dd-name">Accountability</div><div class="dd-def">The controller must be able to <strong>demonstrate compliance</strong> — written records of processing (ROPA), DPIAs, audit trails, governance evidence. "Show your work."</div><div class="dd-ex"><strong>Ex.</strong> The Commission's Article 31 register documents every processing activity; the EDPS can request it during an audit.</div></div>

                  <div class="dd-term" id="dd-c7-cis"><div class="dd-name">CIS Controls</div><div class="dd-def">18 prioritised cyber-security controls maintained by the Center for Internet Security. Tier 1 (basic hygiene) covers ~80% of common attacks. Often used as a starting baseline.</div><div class="dd-ex"><strong>Ex.</strong> A Commission cloud-services unit enforces CIS Benchmarks for Azure via Azure Policy — drift triggers a non-compliance flag.</div></div>

                  <div class="dd-term" id="dd-c7-nist"><div class="dd-name">NIST Cybersecurity Framework</div><div class="dd-def">5 functions in order: <strong>Identify → Protect → Detect → Respond → Recover</strong>. Govern (added in 2.0) sits over the rest. Outcome-based: not a checklist of controls but of capabilities.</div><div class="dd-ex"><strong>Ex.</strong> A DG SANTE security assessment maps each pharmacovigilance system to the 5 functions to find gaps (e.g. weak Detect on insider threats).</div></div>

                  <div class="dd-term" id="dd-c7-iso27001"><div class="dd-name">ISO 27001</div><div class="dd-def">International standard for an Information Security Management System (<strong>ISMS</strong>). Certifiable. Risk-based — pick controls from Annex A justified by your risk assessment.</div><div class="dd-ex"><strong>Ex.</strong> An EU agency hosting health-related data (EMA) maintains ISO 27001 certification audited annually by an external body.</div></div>

                  <div class="dd-term" id="dd-c7-dpia"><div class="dd-name">DPIA · Data Protection Impact Assessment</div><div class="dd-def">Required when processing is <strong>likely to result in high risk</strong> to rights and freedoms (GDPR Art 35 / Reg 2018/1725 Art 39). Documents purpose, necessity, risks and mitigations. Consult the DPO; in some cases consult the supervisor.</div><div class="dd-ex"><strong>Ex.</strong> Before deploying an OLAF AI fraud-scoring system, a DPIA covers the lawful basis, the rights affected, the false-positive impact, and the mitigations.</div></div>

                  <div class="dd-term" id="dd-c7-aia"><div class="dd-name">AI Impact Assessment (FRIA)</div><div class="dd-def">Under the AI Act, deployers of high-risk AI systems must perform a Fundamental Rights Impact Assessment before first use. Different from DPIA but often combined.</div><div class="dd-ex"><strong>Ex.</strong> A national authority deploying an AI tool to triage asylum applications performs a FRIA on top of the DPIA — covering bias and Charter rights, not just data protection.</div></div>

                  <div class="dd-term" id="dd-c7-risk-register"><div class="dd-name">Risk register</div><div class="dd-def">A living document listing risks: description, owner, likelihood, impact, mitigation, residual risk, review date. Updated periodically (e.g. quarterly), reviewed by a risk committee.</div><div class="dd-ex"><strong>Ex.</strong> A DG DIGIT risk register lists "Member State PSP fails to deliver CESOP feed" → high impact, medium likelihood, mitigation = backup ingest path.</div></div>

                  <div class="dd-term" id="dd-c7-siem"><div class="dd-name">SIEM · Security Information and Event Management</div><div class="dd-def">Centralises and correlates logs/events from across the IT estate (servers, identity, apps, network), runs detection rules, and raises alerts on suspicious patterns.</div><div class="dd-ex"><strong>Ex.</strong> The Commission's CERT-EU consumes logs in Microsoft Sentinel / Splunk to detect lateral movement after an account compromise within minutes.</div></div>

                </div>
              </div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">Ch 8</div>
            <div class="tl-name">Data Management Meets AI</div>
            <div class="tl-tag">AI-assisted collection · processing · viz · governance · future</div>
            <div class="tl-body">
              <div class="tl-context">
                AI is now both a consumer and a contributor to the data stack. The interesting pattern: AI tools accelerate each DM phase, and AI systems need DM rigor (Art 10) to be safe.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 200" class="tl-svg" xmlns="http://www.w3.org/2000/svg">

              </svg><div class="tl-vcap">Synthetic data is ALLOWED by AI Act, not mandated.</div></div>
              <dl>
                <dt>AI-assisted collection</dt><dd><a class="term-link" data-target="dd-c8-ocr">OCR</a> + form recognisers turn paper/PDF into structured data. <a class="term-link" data-target="dd-c8-synthetic">Synthetic data</a> generation (<a class="term-link" data-target="dd-c8-gans">GANs</a>, diffusion, LLMs) creates realistic samples that protect privacy. Smart web scrapers handle JavaScript, CAPTCHAs.</dd>
                <dt>AI in processing</dt><dd>Auto-cleaning (<a class="term-link" data-target="dd-c8-anomaly">anomaly detection</a>, duplicate resolution via embeddings) · <a class="term-link" data-target="dd-c8-entity-res">entity resolution</a> (matching records across systems) · <a class="term-link" data-target="dd-c8-schema-inf">schema inference</a> from raw files · <a class="term-link" data-target="dd-c8-auto-impute">auto-imputation</a> of missing values with predictive models.</dd>
                <dt>AI-driven visualisation</dt><dd><a class="term-link" data-target="dd-c8-nl2chart">Natural-language to chart</a> ("show me sales by region last quarter" → Power BI Copilot builds it). <a class="term-link" data-target="dd-c8-auto-insight">Auto-insight</a> detection highlights anomalies in dashboards. Automated narrative generation drafts summary paragraphs.</dd>
                <dt>AI-assisted governance</dt><dd>Auto-classification of data sensitivity · <a class="term-link" data-target="dd-c8-pii-detect">PII detection</a> in free text · auto-tagging of new datasets · policy violation detection · <a class="term-link" data-target="dd-c8-drift">drift monitoring</a> on AI models themselves.</dd>
                <dt>Future trends</dt><dd>AI-native platforms (<a class="term-link" data-target="dd-c8-vector-db">vector DBs</a> as first-class citizens — Pinecone, pgvector, Azure AI Search) · <a class="term-link" data-target="dd-c8-semantic">semantic layers</a> over lakehouses · self-healing pipelines (auto-remediate common failures) · autonomous analytics (AI agents that ask and answer their own data questions).</dd>
                <dt>Practical examples</dt><dd>Azure SQL automatic tuning · <a class="term-link" data-target="dd-c8-cortex">Snowflake Cortex</a> (LLM functions in SQL) · Databricks Genie · <a class="term-link" data-target="dd-c8-copilot">Microsoft Fabric Copilot</a>.</dd>
                <dt>Regulatory anchor</dt><dd><a class="term-link" data-target="dd-c8-ai-act-10">AI Act Art 10</a> — data governance obligations for high-risk AI training data: relevance, representativeness, bias detection, provenance.</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> AI Act Art 10 returns here — data governance for high-risk AI training data (relevance, representativeness, bias detection). Synthetic data is allowed by AI Act, not mandated.</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c8-ocr"><div class="dd-name">OCR · Optical Character Recognition</div><div class="dd-def">Turns images of text (scans, photos, PDFs) into machine-readable text. Modern variants (Document AI, Form Recognizer) also extract structured fields from forms.</div><div class="dd-ex"><strong>Ex.</strong> Digitising 30 years of paper customs declarations for archival search; or auto-extracting fields from a paper grant report scan.</div></div>

                  <div class="dd-term" id="dd-c8-synthetic"><div class="dd-name">Synthetic data</div><div class="dd-def">Artificially generated data that mimics the statistical properties of real data without containing real records. Useful for testing, ML training, and sharing without privacy exposure. <strong>Allowed by AI Act, not mandated.</strong></div><div class="dd-ex"><strong>Ex.</strong> A DG generates 100 000 fake beneficiary records so an external contractor can develop a portal without touching real personal data.</div></div>

                  <div class="dd-term" id="dd-c8-gans"><div class="dd-name">GANs · Generative Adversarial Networks</div><div class="dd-def">Two neural networks compete: a <strong>generator</strong> creates synthetic samples, a <strong>discriminator</strong> tries to spot fakes. Both improve until the fakes are statistically realistic. One technique among several for synthetic data (diffusion, VAEs, LLMs).</div><div class="dd-ex"><strong>Ex.</strong> Generate synthetic satellite imagery to augment training of a deforestation-detection model used by JRC.</div></div>

                  <div class="dd-term" id="dd-c8-anomaly"><div class="dd-name">Anomaly detection</div><div class="dd-def">Algorithms that flag data points or events that deviate significantly from the norm. Statistical (z-score, IQR), ML (isolation forest, autoencoders), or rule-based.</div><div class="dd-ex"><strong>Ex.</strong> Flag a CAP claim whose declared yield is 5σ above the regional historical distribution for that crop — sent for OLAF review.</div></div>

                  <div class="dd-term" id="dd-c8-entity-res"><div class="dd-name">Entity resolution</div><div class="dd-def">Determining when two records (different spellings, formats, sources) refer to the <strong>same real-world entity</strong>. Uses fuzzy matching, embeddings, graph algorithms.</div><div class="dd-ex"><strong>Ex.</strong> Reconciling that "Universidad de Madrid", "Univ. Autonoma Madrid" and "UAM" all map to the same PIC across Horizon Europe, Erasmus+ and EAFRD records.</div></div>

                  <div class="dd-term" id="dd-c8-schema-inf"><div class="dd-name">Schema inference</div><div class="dd-def">Automatically deducing the schema (column names, types, constraints) of a raw file or stream by sampling its content. Useful when ingesting unknown sources.</div><div class="dd-ex"><strong>Ex.</strong> A Microsoft Fabric pipeline auto-detects that a new MS submission is a JSON array of objects with a specific schema — no manual definition needed.</div></div>

                  <div class="dd-term" id="dd-c8-auto-impute"><div class="dd-name">Auto-imputation</div><div class="dd-def">Filling missing values using a model (regression, k-NN, deep model) instead of a simple mean/median. More accurate but harder to audit; document the imputation strategy in lineage.</div><div class="dd-ex"><strong>Ex.</strong> Predicting missing "company size" from sector + turnover + employee count using a gradient-boosted model on the rest of the beneficiary register.</div></div>

                  <div class="dd-term" id="dd-c8-nl2chart"><div class="dd-name">Natural-language-to-chart</div><div class="dd-def">A user types a question in plain language; an LLM translates it into a query + chart spec. Lowers the barrier for non-analysts.</div><div class="dd-ex"><strong>Ex.</strong> A Commission policy officer types "show me CAP spending by Member State and year as a stacked bar" into Power BI Copilot — gets the chart in seconds.</div></div>

                  <div class="dd-term" id="dd-c8-auto-insight"><div class="dd-name">Auto-insight detection</div><div class="dd-def">Algorithms that scan a dataset or dashboard and surface anomalies, trend changes, outliers — without the user pre-specifying what to look for.</div><div class="dd-ex"><strong>Ex.</strong> Power BI's "Analyze" feature highlights "Beneficiary type X received 40% more than expected this quarter" without anyone asking.</div></div>

                  <div class="dd-term" id="dd-c8-pii-detect"><div class="dd-name">PII auto-detection</div><div class="dd-def">Models that scan free text or new datasets for Personally Identifiable Information (names, IDs, emails, addresses) so it can be tagged, redacted, or restricted.</div><div class="dd-ex"><strong>Ex.</strong> A Microsoft Purview scan tags every new file in the lake that contains EU national IDs or passport numbers, enforcing tighter access automatically.</div></div>

                  <div class="dd-term" id="dd-c8-drift"><div class="dd-name">Model drift monitoring</div><div class="dd-def">Once an ML model is in production, its performance degrades as the world changes (<strong>concept drift</strong>) or input distributions shift (<strong>data drift</strong>). Monitor both, retrain when triggered.</div><div class="dd-ex"><strong>Ex.</strong> An OLAF fraud-scoring model trained pre-COVID degrades as fraudsters adopt new patterns — monthly drift checks on input features and predictions trigger retraining.</div></div>

                  <div class="dd-term" id="dd-c8-vector-db"><div class="dd-name">Vector database (in DM context)</div><div class="dd-def">Storage optimised for embedding vectors — enables semantic search and RAG. Pinecone, Weaviate, Milvus, pgvector, Azure AI Search.</div><div class="dd-ex"><strong>Ex.</strong> Embedding the entire EUR-Lex corpus in pgvector lets policy officers search the EU acquis by meaning, not just keywords.</div></div>

                  <div class="dd-term" id="dd-c8-semantic"><div class="dd-name">Semantic layer</div><div class="dd-def">A unified business-meaning model sitting above the physical data — defines metrics ("active beneficiary"), dimensions, hierarchies once, queried consistently from BI, notebooks, APIs.</div><div class="dd-ex"><strong>Ex.</strong> Microsoft Fabric / Looker semantic models — every report agrees on what "EU budget commitment" means because it's defined once.</div></div>

                  <div class="dd-term" id="dd-c8-cortex"><div class="dd-name">Snowflake Cortex / LLM-in-DB</div><div class="dd-def">Calling LLMs from inside SQL queries — sentiment scoring, summarisation, classification on a column without leaving the warehouse. Same idea: BigQuery ML, Databricks AI Functions.</div><div class="dd-ex"><strong>Ex.</strong> <code>SELECT SNOWFLAKE.CORTEX.SUMMARIZE(complaint_text) FROM citizen_feedback</code> — summarise thousands of citizen comments in one query.</div></div>

                  <div class="dd-term" id="dd-c8-copilot"><div class="dd-name">Microsoft Fabric Copilot</div><div class="dd-def">An LLM assistant embedded across Fabric (Data Factory, Power BI, notebooks) that drafts SQL, explains data, generates visuals, and summarises insights from natural-language prompts.</div><div class="dd-ex"><strong>Ex.</strong> A DG REGIO analyst asks Copilot to "build a model that joins these three tables and computes spend per inhabitant" — gets generated DAX/SQL to review and tweak.</div></div>

                  <div class="dd-term" id="dd-c8-ai-act-10"><div class="dd-name">AI Act Article 10 — Data &amp; Data Governance</div><div class="dd-def">For <strong>high-risk AI systems</strong>, training/validation/testing data must meet quality criteria: relevance, representativeness, freedom from errors, completeness, statistical properties for the target population, plus bias examination and mitigation.</div><div class="dd-ex"><strong>Ex.</strong> An asylum-triage AI built on European data must demonstrate the training set is representative of all relevant nationality groups — not skewed to one source country.</div></div>

                </div>
