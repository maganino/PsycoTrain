              <div class="tl-exam"><strong>Exam signal:</strong> if a question asks 'which policy launched the Data Spaces?' — this is it. 'Strategy' = Communication = non-binding.</div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">2022</div>
            <div class="tl-name">Data Governance Act · Reg (EU) 2022/868</div>
            <div class="tl-tag">4 pillars · horizontal data-sharing enabler</div>
            <div class="tl-body">
              <div class="tl-context">
                The DGA is horizontal plumbing: it creates <em>roles</em> and <em>mechanisms</em>, not individual rights. Public bodies sitting on valuable but protected data (health records, confidential commercial info, IP-protected data) finally have a legal path to let others reuse it. Data intermediation services get a notification regime so people can trust neutral go-betweens. Data altruism becomes a formal category with a standard consent form.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 175" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
                <text x="300" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">DGA · 4 PILLARS · horizontal enabler</text>
                <rect x="20" y="26" width="560" height="12" rx="3" fill="#185FA5"/>
                <rect x="30" y="46" width="125" height="92" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="92" y="68" text-anchor="middle" font-size="13" font-weight="800" fill="#185FA5">1</text>
                <text x="92" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a18">Protected PSI</text>
                <text x="92" y="104" text-anchor="middle" font-size="10.5" fill="#3d3d3a">reuse</text>
                <text x="92" y="124" text-anchor="middle" font-size="9.5" fill="#888">health · IP · confid.</text>
                <rect x="170" y="46" width="125" height="92" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="232" y="68" text-anchor="middle" font-size="13" font-weight="800" fill="#185FA5">2</text>
                <text x="232" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a18">Intermediation</text>
                <text x="232" y="104" text-anchor="middle" font-size="10.5" fill="#3d3d3a">services (Ch III)</text>
                <text x="232" y="124" text-anchor="middle" font-size="9.5" fill="#888">neutral · notified</text>
                <rect x="310" y="46" width="125" height="92" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="372" y="68" text-anchor="middle" font-size="13" font-weight="800" fill="#185FA5">3</text>
                <text x="372" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a18">Data altruism</text>
                <text x="372" y="104" text-anchor="middle" font-size="10.5" fill="#3d3d3a">(Ch IV)</text>
                <text x="372" y="124" text-anchor="middle" font-size="9.5" fill="#888">standard consent</text>
                <rect x="450" y="46" width="125" height="92" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="512" y="68" text-anchor="middle" font-size="13" font-weight="800" fill="#185FA5">4</text>
                <text x="512" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a18">EDIB</text>
                <text x="512" y="104" text-anchor="middle" font-size="10.5" fill="#3d3d3a">advisory board</text>
                <text x="512" y="124" text-anchor="middle" font-size="9.5" fill="#888">data-spaces</text>
                <rect x="20" y="142" width="560" height="10" rx="2" fill="#185FA5"/>
                <text x="300" y="170" text-anchor="middle" font-size="10" fill="#888" font-style="italic">applicable 24 Sep 2023 — mechanisms &amp; roles, not individual rights</text>
              </svg><div class="tl-vcap">Traps: cloud switching is NOT a DGA pillar (that's Data Act Ch VI).</div></div>
              <dl>
                <dt>Adopted</dt><dd>30 May 2022</dd>
                <dt>Applicable</dt><dd>24 Sep 2023</dd>
                <dt>Pillar 1</dt><dd><strong>Reuse of protected public-sector data</strong> — health, statistics, IP-protected, confidential commercial.</dd>
                <dt>Pillar 2</dt><dd><strong>Data intermediation services</strong> — neutral third parties connecting data holders and users; notification regime (Ch III).</dd>
                <dt>Pillar 3</dt><dd><strong>Data altruism</strong> (Ch IV) — donating data for causes of general interest + standardised European Data Altruism Consent Form.</dd>
                <dt>Pillar 4</dt><dd><strong>European Data Innovation Board (EDIB)</strong> — expert body advising the Commission on data-spaces deployment and interoperability.</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> memorise the four pillars in order. A question will swap one of them with 'cloud switching' (which is Data Act Ch VI, not DGA) to trick you.</div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">2023</div>
            <div class="tl-name">Data Act · Reg (EU) 2023/2854</div>
            <div class="tl-tag">IoT data rights · cloud switching · B2B/B2C/B2G</div>
            <div class="tl-body">
              <div class="tl-context">
                Where the DGA built mechanisms, the Data Act hands out actual rights. If you own a connected coffee machine, tractor or car, you can demand the data it generates — and pass that data to the repair shop or service of your choice (Ch II). If you're a cloud customer, you can move to another provider without paying ransom fees (Ch VI). Public bodies get emergency access in crises (Ch V). It's the IoT + cloud rights package.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 185" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
                <text x="300" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">DATA ACT · chapters by use-case keyword</text>
                <rect x="15" y="28" width="280" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="30" y="48" font-size="11" font-weight="800" fill="#185FA5">Ch II · IoT user rights</text>
                <text x="30" y="65" font-size="10.5" fill="#3d3d3a">User of a connected product accesses</text>
                <text x="30" y="79" font-size="10.5" fill="#3d3d3a">its data · can share with a 3rd party</text>
                <text x="30" y="93" font-size="9.5" fill="#888">keywords: connected product · IoT</text>
                <rect x="305" y="28" width="280" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="320" y="48" font-size="11" font-weight="800" fill="#185FA5">Ch III · B2B (FRAND)</text>
                <text x="320" y="65" font-size="10.5" fill="#3d3d3a">When a legal duty to share exists,</text>
                <text x="320" y="79" font-size="10.5" fill="#3d3d3a">terms must be Fair / Reasonable / ND</text>
                <text x="320" y="93" font-size="9.5" fill="#888">keywords: FRAND · data holder</text>
                <rect x="15" y="105" width="280" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="30" y="125" font-size="11" font-weight="800" fill="#185FA5">Ch V · B2G emergency access</text>
                <text x="30" y="142" font-size="10.5" fill="#3d3d3a">Public bodies access private data</text>
                <text x="30" y="156" font-size="10.5" fill="#3d3d3a">in 'exceptional need' only</text>
                <text x="30" y="170" font-size="9.5" fill="#888">keywords: public emergency · crisis</text>
                <rect x="305" y="105" width="280" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="320" y="125" font-size="11" font-weight="800" fill="#185FA5">Ch VI · Cloud switching</text>
                <text x="320" y="142" font-size="10.5" fill="#3d3d3a">No egress / switching fees by 2027</text>
                <text x="320" y="156" font-size="10.5" fill="#3d3d3a">Functional equivalence required</text>
                <text x="320" y="170" font-size="9.5" fill="#888">keywords: egress fees · provider switch</text>
              </svg><div class="tl-vcap">Spot the keyword in the question → you already know the chapter.</div></div>
              <dl>
                <dt>Adopted</dt><dd>13 Dec 2023</dd>
                <dt>Applicable</dt><dd>12 Sep 2025</dd>
                <dt>Ch II</dt><dd>User access to data generated by connected products (IoT). Users can also ask the data holder to share with a third party of their choice.</dd>
                <dt>Ch III</dt><dd>B2B data-sharing obligations on FRAND terms when a legal obligation to share exists.</dd>
                <dt>Ch V</dt><dd>B2G access for public bodies in situations of exceptional need (public emergency, crisis).</dd>
                <dt>Ch VI</dt><dd>Cloud / edge provider switching rights — no switching fees allowed by 2027; functional equivalence required.</dd>
                <dt>Ch VIII</dt><dd>Data-space interoperability + essential requirements for smart contracts.</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal — keywords per chapter:</strong> 'connected product' / 'IoT user' → Ch II · 'FRAND' / 'B2B data holder' → Ch III · 'exceptional need' / 'public emergency' → Ch V · 'cloud switching' / 'egress fees' → Ch VI.</div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">2024 · Mar</div>
            <div class="tl-name">Interoperable Europe Act · Reg (EU) 2024/903</div>
            <div class="tl-tag">Cross-border public services · EIF as reference</div>
            <div class="tl-body">
              <div class="tl-context">
                Focused narrowly on public-sector digital services that cross borders — the tech stack behind eIDAS wallets, pan-European health services, cross-border tax or social-security exchanges. Its new weapon: mandatory interoperability assessments (Art. 3) before spending money on new public IT. It also blesses the EIF (Legal / Organisational / Semantic / Technical) as <em>the</em> reference model.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 180" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
                <text x="300" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">EIF · 4-LAYER REFERENCE MODEL</text>
                <rect x="40" y="26" width="520" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-dasharray="3 2"/>
                <text x="300" y="43" text-anchor="middle" font-size="10.5" font-weight="700" fill="#534AB7">Integrated Public Service Governance (overarching)</text>
                <rect x="40" y="56" width="520" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="52" y="74" font-size="11" font-weight="800" fill="#185FA5">LEGAL</text>
                <text x="550" y="74" text-anchor="end" font-size="10.5" fill="#3d3d3a">aligned legal frameworks</text>
                <rect x="40" y="86" width="520" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="52" y="104" font-size="11" font-weight="800" fill="#185FA5">ORGANISATIONAL</text>
                <text x="550" y="104" text-anchor="end" font-size="10.5" fill="#3d3d3a">business processes &amp; responsibilities</text>
                <rect x="40" y="116" width="520" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="52" y="134" font-size="11" font-weight="800" fill="#185FA5">SEMANTIC</text>
                <text x="550" y="134" text-anchor="end" font-size="10.5" fill="#3d3d3a">meaning of exchanged data preserved</text>
                <rect x="40" y="146" width="520" height="26" rx="4" fill="#E6F1FB" stroke="#185FA5"/>
                <text x="52" y="164" font-size="11" font-weight="800" fill="#185FA5">TECHNICAL</text>
                <text x="550" y="164" text-anchor="end" font-size="10.5" fill="#3d3d3a">systems · applications · infrastructure</text>
              </svg><div class="tl-vcap">Reg (EU) 2024/903 makes EIF assessments mandatory before new public IT spend.</div></div>
              <dl>
                <dt>Adopted</dt><dd>13 Mar 2024</dd>
                <dt>Applicable</dt><dd>12 Jul 2024</dd>
                <dt>Scope</dt><dd>Cross-border interoperability of public services delivered in/by the Union — not private-sector services.</dd>
                <dt>Governance</dt><dd>Interoperable Europe Board (MS representatives + Commission).</dd>
                <dt>Key tools</dt><dd>Mandatory interoperability assessments (Art 3) · Interoperable Europe Portal (reusable building blocks like eDelivery, eSignature, SEMIC) · GovTech pilots · regulatory sandboxes · EIF as the reference framework.</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> public administrations exchanging information across Member States → this act. Not GDPR, not DGA. Keywords to recognise: 'Interoperable Europe Board', 'EIF', 'interoperability assessment'.</div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">2024 · Jun</div>
            <div class="tl-name">AI Act · Reg (EU) 2024/1689</div>
            <div class="tl-tag">Risk pyramid · GPAI · Art 10 data governance</div>
            <div class="tl-body">
              <div class="tl-context">
                Classifies AI by <em>risk</em>, not by technology. Unacceptable uses (government social scoring, real-time biometric ID in public for police) are banned outright. High-risk AI (in hiring, credit scoring, medical devices, migration, critical infrastructure) needs conformity assessment — a CE-mark-style regime. Generative AI and foundation models fall under the new GPAI chapter. Article 10 spells out the data-governance rules you must satisfy when training, validating or testing a high-risk model.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 180" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
                <text x="300" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">AI ACT · 4-TIER RISK PYRAMID</text>
                <polygon points="240,28 360,28 378,58 222,58" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
                <text x="300" y="49" text-anchor="middle" font-size="11" font-weight="800" fill="#A32D2D">UNACCEPTABLE · Art 5</text>
                <text x="390" y="44" font-size="10" fill="#3d3d3a">→ BANNED</text>
                <text x="390" y="57" font-size="9.5" fill="#888">social scoring · biometric ID</text>
                <polygon points="222,58 378,58 396,94 204,94" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
                <text x="300" y="81" text-anchor="middle" font-size="11" font-weight="800" fill="#854F0B">HIGH-RISK · Annex I + III</text>
                <text x="402" y="78" font-size="10" fill="#3d3d3a">→ conformity assessment</text>
                <text x="402" y="91" font-size="9.5" fill="#888">Art 10 data-governance applies</text>
                <polygon points="204,94 396,94 414,126 186,126" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
                <text x="300" y="115" text-anchor="middle" font-size="11" font-weight="800" fill="#185FA5">LIMITED</text>
                <text x="420" y="112" font-size="10" fill="#3d3d3a">→ transparency duty</text>
                <text x="420" y="125" font-size="9.5" fill="#888">chatbot must disclose</text>
                <polygon points="186,126 414,126 432,158 168,158" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
                <text x="300" y="147" text-anchor="middle" font-size="11" font-weight="800" fill="#0F6E56">MINIMAL</text>
                <text x="440" y="144" font-size="10" fill="#3d3d3a">→ voluntary codes</text>
                <text x="300" y="175" text-anchor="middle" font-size="10" fill="#888" font-style="italic">GPAI sits in a parallel chapter (Ch V) · authority = EU AI Office</text>
              </svg><div class="tl-vcap">Two hot spots: Art 5 (banned) and Art 10 (training-data governance).</div></div>
              <dl>
                <dt>Adopted</dt><dd>13 Jun 2024</dd>
                <dt>Applicable</dt><dd>Staggered: prohibited practices from Feb 2025 · GPAI from Aug 2025 · high-risk general Aug 2026 · embedded high-risk Aug 2027.</dd>
                <dt>Risk pyramid</dt><dd><strong>Unacceptable</strong> (Art 5 — banned) · <strong>High-risk</strong> (Annex I + III, conformity assessment) · <strong>Limited</strong> (transparency, e.g. chatbots must disclose) · <strong>Minimal</strong> (voluntary codes).</dd>
                <dt>Art 10</dt><dd>Training / validation / test sets of high-risk AI: relevance + representativeness, error-free to the extent possible, bias examined and mitigated, design choices documented, provenance traceable.</dd>
                <dt>GPAI</dt><dd>General-purpose AI models (Ch V) — transparency, copyright compliance, a systemic-risk tier for very capable models.</dd>
                <dt>Authority</dt><dd>EU AI Office (centralised, within the Commission).</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal — two hot spots:</strong> Art. 5 (banned practices — real-time remote biometric ID in public for law enforcement is the canonical example) and Art. 10 (data governance for training data).</div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">2025 · Feb</div>
            <div class="tl-name">EHDS · Reg (EU) 2025/327</div>
            <div class="tl-tag">First operational European Data Space · health</div>
            <div class="tl-body">
              <div class="tl-context">
                The first of the 14 Common European Data Spaces to become a binding regulation — health led the way because it was the most politically ready, and the business case was clear: secondary use of health data unlocks research, drug development and public-health policy. Patients get portable access to their own records across borders; researchers get a safe path to anonymised / pseudonymised datasets through 'Health Data Access Bodies'.
              </div>

              <dl>
                <dt>Adopted</dt><dd>11 Feb 2025</dd>
                <dt>Applicable</dt><dd>First obligations from 26 Mar 2027 (staggered).</dd>
                <dt>Primary use</dt><dd>Citizens' rights over their electronic health data — access, portability, cross-border use.</dd>
                <dt>Secondary use</dt><dd>Research, innovation, policy-making, regulatory activities — channelled through Health Data Access Bodies (HDABs).</dd>

          </div>

          <div class="tl-card">
            <div class="tl-year">2025 · Nov</div>
            <div class="tl-name">Data Union Strategy · COM(2025) 835</div>
            <div class="tl-tag">Consolidation of the 2020 Strategy</div>
            <div class="tl-body">
              <div class="tl-context">
                A Commission Communication published in November 2025 to update the 2020 European Strategy for Data. After five years of legislating (DGA, Data Act, AI Act, EHDS, Interoperable Europe Act), the emphasis shifts from <em>making laws</em> to <em>consolidating</em>: simplifying where rules overlap, accelerating data-space roll-out, maturing the ecosystem. Think of it as 'Strategy 2.0'.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 140" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
                <text x="300" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">STRATEGY 1.0 → STRATEGY 2.0</text>
                <circle cx="80" cy="72" r="30" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
                <text x="80" y="70" text-anchor="middle" font-size="13" font-weight="800" fill="#185FA5">2020</text>
                <text x="80" y="84" text-anchor="middle" font-size="9" fill="#3d3d3a">Strategy 1.0</text>
                <text x="80" y="116" text-anchor="middle" font-size="9.5" fill="#888">COM(2020) 66</text>
                <text x="80" y="128" text-anchor="middle" font-size="9.5" fill="#888">"make laws"</text>
                <line x1="113" y1="72" x2="485" y2="72" stroke="#185FA5" stroke-width="2"/>
                <polygon points="492,72 480,66 480,78" fill="#185FA5"/>
                <circle cx="180" cy="72" r="3" fill="#185FA5"/>
                <text x="180" y="55" text-anchor="middle" font-size="9.5" fill="#3d3d3a">DGA</text>
                <text x="180" y="92" text-anchor="middle" font-size="9" fill="#888">2022</text>
                <circle cx="260" cy="72" r="3" fill="#185FA5"/>
                <text x="260" y="55" text-anchor="middle" font-size="9.5" fill="#3d3d3a">Data Act</text>
                <text x="260" y="92" text-anchor="middle" font-size="9" fill="#888">2023</text>
                <circle cx="340" cy="72" r="3" fill="#185FA5"/>
                <text x="340" y="55" text-anchor="middle" font-size="9.5" fill="#3d3d3a">AI Act · IEA</text>
                <text x="340" y="92" text-anchor="middle" font-size="9" fill="#888">2024</text>
                <circle cx="420" cy="72" r="3" fill="#185FA5"/>

        <div class="duty-wheel">

          <div class="duty-card" data-open>
            <div class="dc-title">1 · Data architecture &amp; interoperability</div>
            <div class="dc-key">Reference architectures · EIF 4 layers · AI-enabled cloud</div>
            <div class="dc-body">Designing how data flows across systems so that 'product' in system A means the same as 'product' in system B — that's semantic interoperability. The EU reference is the EIF (Legal / Organisational / Semantic / Technical layers), with an Interoperability Governance overlay. For public administrations specifically, the Interoperable Europe Act (2024/903) turns this into a legal obligation: mandatory interoperability assessments before new public IT spend, plus a shared portal of reusable building blocks (eDelivery, eSignature, SEMIC).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">2 · Data policies &amp; strategy</div>
            <div class="dc-key">Lifecycle · EU strategies · data spaces</div>
            <div class="dc-body">Translating business or legal goals into written data policies — how long we keep data, who can use it, which quality bar applies — and governing the data lifecycle from acquisition through archival to disposal. At EU level, the compass is the European Strategy for Data (Feb 2020) and its successor, the Data Union Strategy (Nov 2025). Policy becomes concrete through the 14 Common European Data Spaces (health, agriculture, energy, mobility, etc.), the Interoperable Europe Act and supporting programmes like DSSC and Simpl.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">3 · Data engineering &amp; integration</div>
            <div class="dc-key">ETL · ELT · APIs · Kafka · Airflow</div>
            <div class="dc-body">Moving data from sources into analytics or operational stores. Classic batch = ETL (Extract → Transform → Load in an external engine); modern cloud pattern = ELT (load raw first, transform inside the warehouse's cheap compute). Real-time streaming uses Kafka (producer / consumer, partitioned topics, replay by offset). Synchronous exchange uses APIs: REST (resource-oriented, HTTP verbs) and GraphQL (single endpoint, client-defined queries). Orchestration ties it together — Airflow schedules DAGs of tasks with retries and SLAs.</div>
          </div>

          <div class="duty-card hub">
            <div class="dc-title">HUB · Data governance &amp; compliance</div>
            <div class="dc-key">Policies · roles · EU law · maturity · audits</div>
            <div class="dc-body">DAMA-DMBOK puts this at the centre because every other duty feeds into it. Governance decides <em>who owns what</em> (Data Owner, accountable), <em>who maintains quality and definitions</em> (Steward), <em>who handles storage and ops</em> (Custodian), and <em>who plays GDPR roles</em> (Controller / Processor / DPO). At the org level a CDO sets strategy. EU law anchors: GDPR for Member States (national DPAs) · Reg 2018/1725 for EU institutions (supervised by EDPS). Maturity is typically assessed against DAMA or CMMI-DM models.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">4 · Data platforms</div>
            <div class="dc-key">Warehouse · Lake · Lakehouse · big data · mining</div>
            <div class="dc-body">Three archetypes. <strong>Warehouse</strong>: structured, schema-on-write, curated — optimised for BI but costly for raw/unstructured data. <strong>Lake</strong>: cheap object storage, schema-on-read, any format — but no ACID, weak governance. <strong>Lakehouse</strong>: the modern compromise — open table formats (Delta Lake, Iceberg, Hudi) add transactions, schema enforcement and time-travel on top of lake storage, serving BI and ML from the same substrate. 'Big data' = the 3 Vs (volume, velocity, variety); often extended to 5 Vs (veracity, value).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">5 · BI &amp; reporting</div>
            <div class="dc-key">Dashboards · self-service · KPIs · predictive</div>
            <div class="dc-body">The analytics maturity ladder: descriptive (what happened — dashboards) → diagnostic (why — drill-downs) → predictive (what might happen — ML models) → prescriptive (what to do — optimisation). KPIs are the subset of metrics you've consciously tied to objectives; tracking them over time tells you if your strategy is working. Self-service BI (Power BI, Tableau, Metabase) lets business users build reports without IT tickets — fast, but only safe when governance (definitions, certified datasets) is in place.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">6 · Master &amp; reference data (MDM)</div>
            <div class="dc-key">Glossaries · IATE · EuroVoc · multilingual</div>
            <div class="dc-body"><strong>Master data</strong> = the 'nouns' of the business that everyone needs to agree on — Customer, Product, Employee, Location — usually consolidated into a golden record across source systems. <strong>Reference data</strong> = closed controlled code lists (country codes, currency codes, status enums). At EU scale multilingualism is mandatory: <strong>IATE</strong> is the inter-institutional terminology database (concepts in 24 languages), <strong>EuroVoc</strong> is the EU thesaurus used to index documents across institutions (SKOS-based).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">7 · Metadata &amp; taxonomy</div>
            <div class="dc-key">DCAT-AP · SKOS · RDF/OWL/SPARQL · 5-star · Dublin Core</div>
            <div class="dc-body">Describing data about the data — so catalogues are searchable, lineage is traceable, and meaning survives across systems. The EU portal <strong>data.europa.eu</strong> uses DCAT-AP (an application profile of W3C DCAT) to describe datasets; SKOS models thesauri; Dublin Core provides 15 core elements (title, creator, date…). Underneath sits the Semantic Web stack: RDF (subject-predicate-object triples), OWL (formal ontology), SPARQL (query language). Tim Berners-Lee's 5-star scheme grades openness from ★ (on web, open license) to ★★★★★ (linked open data).</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">8 · Data quality</div>
            <div class="dc-key">Profiling · cleansing · ISO 8000 · ISO/IEC 25012</div>
            <div class="dc-body">Two complementary standards. <strong>ISO 8000</strong> is oriented toward master-data exchange and provenance (where did it come from, is it intact, is it fit for purpose?). <strong>ISO/IEC 25012</strong> defines 15 characteristics that together describe 'quality': accuracy, completeness, consistency, credibility, currentness, accessibility, compliance, confidentiality, efficiency, precision, traceability, understandability, availability, portability, recoverability. In practice you don't measure all 15 — you pick the ones that matter for the use case and build profiling + cleansing pipelines around them.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">9 · Data security &amp; privacy</div>
            <div class="dc-key">RBAC/ABAC · encryption · DPIA · anon vs pseudo · CIA</div>
            <div class="dc-body">Security and privacy sit side by side but aren't the same thing. Security's classical objectives are the CIA triad: <strong>C</strong>onfidentiality (who can see it), <strong>I</strong>ntegrity (correct and untampered), <strong>A</strong>vailability (accessible when needed). Access is enforced via RBAC (role-based) or ABAC (attribute-based). GDPR Art 25 ('privacy by design &amp; by default') bakes controls in from architecture stage. Art 35 triggers a DPIA whenever processing is 'likely to result in high risk' to rights and freedoms. Key distinction: anonymisation (irreversible) takes data out of GDPR; pseudonymisation (reversible with a separate key) keeps it in GDPR as a safeguard.</div>
          </div>

          <div class="duty-card">
            <div class="dc-title">10 · Advanced analytics &amp; AI prep</div>
            <div class="dc-key">Feature engineering · labelling · AI Act Art 10</div>
            <div class="dc-body">The ML-specific data-prep stack. <strong>Feature engineering</strong> = crafting the input variables a model will learn from (rolling averages, flags, encodings). <strong>Labelling</strong> = assigning ground truth to supervised examples. <strong>Augmentation</strong> = generating synthetic variants to boost minority classes or improve robustness. The EU anchor is AI Act Art. 10: if your system is classified as high-risk, your training / validation / test sets must be relevant and representative, as free of errors as possible, and examined for biases likely to affect health, safety or fundamental rights — with mitigation measures documented.</div>
          </div>

        </div>
      </div>

          <div class="fw-card">
            <h4>DCAT-AP · SKOS · RDF</h4>
            <div class="desc">The EU open-data metadata stack. DCAT-AP describes the <em>datasets</em>; SKOS structures the <em>vocabularies</em> used to classify them; RDF/OWL/SPARQL is the underlying semantic-web plumbing.</div>

              <text x="300" y="39" text-anchor="middle" font-size="9" fill="#3d3d3a">describes datasets on data.europa.eu</text>

              <text x="170" y="84" text-anchor="middle" font-size="9" fill="#3d3d3a">vocabularies · EuroVoc</text>
              <rect x="320" y="55" width="220" height="32" rx="8" fill="#fff" stroke="#85B7EB"/>
              <text x="430" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#185FA5">Dublin Core</text>
              <text x="430" y="84" text-anchor="middle" font-size="9" fill="#3d3d3a">15 core elements</text>
              <rect x="60" y="100" width="480" height="42" rx="8" fill="#F8F7F4" stroke="#E4E2DA"/>

            </svg><div class="tl-vcap">Application profiles sit on top of the semantic-web stack.</div></div>
            <ul>
              <li><strong>DCAT-AP</strong> — EU application profile of DCAT; powers data.europa.eu</li>
              <li>Extensions: StatDCAT-AP (statistics) · GeoDCAT-AP (geospatial) · HVD profile</li>

            <h4>5-star Open Data</h4>
            <div class="desc">Tim Berners-Lee's deployment scheme (2010). A simple 1-to-5 ladder for how 'open' an open dataset really is — each star adds reusability on top of the previous.</div>

          <div class="fw-card">
            <h4>CIA triad</h4>
            <div class="desc">The classical objectives of information security. Predates GDPR by decades but remains the backbone of any security control set. Often extended with Authenticity and Non-repudiation ('AIC' + N/R in some textbooks).</div>

              <li><strong>I</strong>ntegrity — data not altered improperly</li>

          <div class="fw-card">
            <h4>Roles cheatsheet</h4>
            <div class="desc">Two role families are often blurred in exam questions. <strong>Data-management roles</strong> (Owner, Steward, Custodian) come from DAMA. <strong>GDPR roles</strong> (Controller, Processor, DPO) come from the regulation. CDO is an org-level leadership role; don't confuse with DPO.</div>

              <text x="495" y="85" text-anchor="middle" font-size="9.5" fill="#3d3d3a">≠ DPO</text>

              <text x="495" y="117" text-anchor="middle" font-size="9" fill="#888">DPO audits compliance)</text>

          <div class="trap-body">

                <li>Applies to Member-State public + private sector</li>
                <li><strong>Excludes EU institutions</strong></li>
                <li>Supervisor: national DPA + EDPB</li>
                <li>Fines up to 4% global turnover</li>

            </div>
            <div>
              <h5>Reg 2018/1725</h5>
              <ul>
                <li>Applies to <strong>EU institutions, bodies, offices, agencies</strong></li>
                <li>Mirrors GDPR obligations (same rights, same DPIA logic)</li>
                <li>Supervisor: <strong>EDPS</strong> (European Data Protection Supervisor)</li>
                <li>Question mentions 'Commission', 'Parliament', 'ECB' → 2018/1725</li>

        <div class="trap-row">
          <div class="trap-head">DGA (2022/868) vs Data Act (2023/2854)</div>
          <div class="trap-body">

              <h5>DGA — horizontal enabler</h5>
              <ul>
                <li>4 pillars: protected PSI reuse · intermediation services · altruism · EDIB</li>
                <li>Creates <strong>mechanisms &amp; roles</strong> for data sharing</li>
                <li>Target: confidential / IP-protected / personal public-sector data</li>
                <li>Keywords: 'data intermediary', 'altruism', 'EDIB'</li>
              </ul>
            </div>
            <div>
              <h5>Data Act — specific rights</h5>
              <ul>
                <li>IoT-generated data access for users (Ch II)</li>
                <li>B2B FRAND sharing (Ch III) + B2G exceptional need (Ch V)</li>
                <li>Cloud / edge switching rights (Ch VI)</li>
                <li>Keywords: 'IoT', 'connected product', 'cloud switching', 'smart contract'</li>
              </ul>

        <div class="trap-row">
          <div class="trap-head">Anonymisation vs Pseudonymisation</div>
          <div class="trap-body">
            <div>
              <h5>Anonymisation</h5>
              <ul>
                <li><strong>Irreversible</strong> — no way back to the data subject</li>
                <li>Data is no longer personal — <strong>outside GDPR scope</strong> (Recital 26)</li>
                <li>Requires removing/altering all identifiers + limiting re-identification risk</li>
                <li>Real-world test: even combined with other data sets, you can't re-identify</li>
              </ul>
            </div>
            <div>
              <h5>Pseudonymisation</h5>
              <ul>
                <li><strong>Reversible</strong> with a separate key (kept secure)</li>
                <li>Data is <strong>still personal</strong> — GDPR still applies</li>
                <li>A safeguard / risk-reduction measure (GDPR Art 4(5), Art 25, Art 32)</li>
                <li>Examples: replacing name with an ID in a table while the mapping is held elsewhere</li>
              </ul>
            </div>
          </div>
          <div class="tl-viz"><svg viewBox="0 0 600 185" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
            <rect x="160" y="10" width="280" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B"/>
            <text x="300" y="26" text-anchor="middle" font-size="11" font-weight="800" fill="#854F0B">CAN RE-IDENTIFICATION HAPPEN?</text>
            <text x="300" y="40" text-anchor="middle" font-size="10" fill="#3d3d3a">is there a way back to the data subject?</text>
            <line x1="300" y1="48" x2="150" y2="72" stroke="#854F0B"/>
            <line x1="300" y1="48" x2="450" y2="72" stroke="#854F0B"/>
            <rect x="20" y="72" width="260" height="40" rx="6" fill="#fff" stroke="#85B7EB"/>
            <text x="150" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a18">YES — with a separate key</text>
            <text x="150" y="105" text-anchor="middle" font-size="10" fill="#3d3d3a">kept secure, held elsewhere</text>
            <rect x="320" y="72" width="260" height="40" rx="6" fill="#fff" stroke="#85B7EB"/>
            <text x="450" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a18">NO — irreversible</text>
            <text x="450" y="105" text-anchor="middle" font-size="10" fill="#3d3d3a">even combined with other datasets</text>
            <line x1="150" y1="112" x2="150" y2="132" stroke="#185FA5"/>
            <polygon points="150,136 146,128 154,128" fill="#185FA5"/>
            <line x1="450" y1="112" x2="450" y2="132" stroke="#185FA5"/>
            <polygon points="450,136 446,128 454,128" fill="#185FA5"/>
            <rect x="20" y="136" width="260" height="42" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
            <text x="150" y="154" text-anchor="middle" font-size="12" font-weight="800" fill="#185FA5">PSEUDONYMISATION</text>
            <text x="150" y="168" text-anchor="middle" font-size="10" fill="#3d3d3a">still personal data · GDPR applies</text>
            <rect x="320" y="136" width="260" height="42" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
            <text x="450" y="154" text-anchor="middle" font-size="12" font-weight="800" fill="#0F6E56">ANONYMISATION</text>
            <text x="450" y="168" text-anchor="middle" font-size="10" fill="#3d3d3a">no longer personal · OUT of GDPR</text>
          </svg></div>
          <div class="trap-signal"><strong>Signal:</strong> one-way function vs two-way. If there's a 'key' that can re-identify — pseudonymisation, GDPR still applies. If the identifiers are gone for good with no re-ID path — anonymisation, out of scope.</div>
        </div>

        <div class="trap-row">
          <div class="trap-head">Open Data Directive vs DGA scope</div>
          <div class="trap-body">
            <div>
              <h5>Open Data Dir. — 2019/1024</h5>
              <ul>
                <li>Covers <strong>open / non-sensitive</strong> public sector information</li>
                <li>Principle: free of charge, machine-readable, open by default</li>
                <li>HVDs: six categories defined in Implementing Reg 2023/138</li>
                <li>Replaces the older PSI Directive 2003/98/EC</li>
              </ul>
            </div>
            <div>
              <h5>DGA — 2022/868</h5>
              <ul>
                <li>Covers <strong>protected</strong> public-sector data (confidential, IP, personal)</li>
                <li>Establishes conditions, not default openness</li>
                <li>Complements Open Data Dir. — does not replace it; the two co-exist</li>
                <li>Adds intermediation services + data altruism on top</li>
              </ul>
            </div>
          </div>
          <div class="tl-viz"><svg viewBox="0 0 600 175" class="tl-svg" xmlns="http://www.w3.org/2000/svg">
            <rect x="165" y="10" width="270" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B"/>

            <text x="300" y="40" text-anchor="middle" font-size="10" fill="#3d3d3a">public-sector information</text>
            <line x1="300" y1="48" x2="150" y2="72" stroke="#854F0B"/>

            <text x="150" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a18">OPEN / non-sensitive</text>
            <text x="150" y="105" text-anchor="middle" font-size="10" fill="#3d3d3a">weather · statistics · companies · mobility</text>
            <rect x="320" y="72" width="260" height="40" rx="6" fill="#fff" stroke="#85B7EB"/>

            <rect x="20" y="136" width="260" height="36" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
            <text x="150" y="154" text-anchor="middle" font-size="12" font-weight="800" fill="#185FA5">Open Data Dir. 2019/1024</text>
            <text x="150" y="166" text-anchor="middle" font-size="10" fill="#3d3d3a">open by default · HVDs · free</text>
            <rect x="320" y="136" width="260" height="36" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
            <text x="450" y="154" text-anchor="middle" font-size="12" font-weight="800" fill="#185FA5">DGA · 2022/868</text>
            <text x="450" y="166" text-anchor="middle" font-size="10" fill="#3d3d3a">conditions · intermediaries · altruism</text>
          </svg></div>
          <div class="trap-signal"><strong>Signal:</strong> Open = default. DGA = with conditions. If the data is open public-sector info → Directive. If it's confidential / IP / personal → DGA.</div>
        </div>

        <div class="trap-row">
          <div class="trap-head">Warehouse vs Lake vs Lakehouse</div>
          <div class="trap-body">
            <div>
              <h5>Warehouse</h5>
              <ul>
                <li>Schema-on-<strong>write</strong> · structured data only</li>
                <li>Optimised for BI / reporting · curated dimensional models</li>
                <li>Costly for unstructured / raw data (text, audio, images)</li>
                <li>Proprietary storage (Snowflake, Redshift, BigQuery)</li>
              </ul>
            </div>
            <div>
              <h5>Lake (and Lakehouse)</h5>
              <ul>
                <li>Lake: schema-on-<strong>read</strong>, raw, cheap, any format</li>
                <li>Lakehouse: adds ACID + schema enforcement + time-travel via open table formats</li>
                <li>Open table formats: Delta Lake · Apache Iceberg · Apache Hudi</li>
                <li>Lakehouse = one platform for BI + ML on the same Parquet files</li>
              </ul>
            </div>
          </div>

              <dl>
                <dt>Definition</dt><dd>Systematic practice of collecting, organising, protecting and using data throughout its lifecycle.</dd>
                <dt>Benefits</dt><dd>Better decisions · operational efficiency · reduced risk · regulatory compliance · innovation velocity · competitive edge.</dd>
                <dt>Data lifecycle</dt><dd><a class="term-link" data-target="dd-c1-lifecycle">Create → Store → Use → Share → Archive → Destroy</a>. Governance and security touch every stage.</dd>
                <dt>Key concepts</dt><dd><a class="term-link" data-target="dd-c1-master-data">Master data</a> (business nouns — Customer, Product) · <a class="term-link" data-target="dd-c1-reference-data">reference data</a> (code lists) · <a class="term-link" data-target="dd-c1-metadata">metadata</a> (data about data) · <a class="term-link" data-target="dd-c1-lineage">lineage</a> (origin + transformations) · <a class="term-link" data-target="dd-c1-stewardship">stewardship</a>.</dd>
                <dt>QA &amp; cleansing</dt><dd>Profile → detect issues → correct → monitor continuously. Standards: <a class="term-link" data-target="dd-c1-iso8000">ISO 8000</a> (MDM-oriented) · <a class="term-link" data-target="dd-c1-iso25012">ISO/IEC 25012</a> (15 quality characteristics).</dd>
                <dt>Roles</dt><dd><a class="term-link" data-target="dd-c1-owner">Owner</a> (accountable) · <a class="term-link" data-target="dd-c1-steward">Steward</a> (executes, maintains quality) · <a class="term-link" data-target="dd-c1-custodian">Custodian</a> (IT-operational) · <a class="term-link" data-target="dd-c1-cdo">CDO</a> (strategy) · <a class="term-link" data-target="dd-c1-dpo">DPO</a> (privacy compliance).</dd>
                <dt>Challenges</dt><dd><a class="term-link" data-target="dd-c1-silo">Data silos</a> · quality decay · compliance burden · skills gap · legacy integration.</dd>
                <dt>Emerging trends</dt><dd><a class="term-link" data-target="dd-c1-dataops">DataOps</a> (CI/CD for data pipelines) · <a class="term-link" data-target="dd-c1-mesh">data mesh</a> (domain-oriented decentralised ownership) · <a class="term-link" data-target="dd-c1-fabric">data fabric</a> (metadata-driven auto-integration layer) · <a class="term-link" data-target="dd-c1-contract">data contracts</a> (producer/consumer schema agreements) · <a class="term-link" data-target="dd-c1-vector-db">vector databases</a> (AI-era storage of embeddings) · <a class="term-link" data-target="dd-c1-synthetic">synthetic data</a> · <a class="term-link" data-target="dd-c1-federated">federated learning</a> (train without centralising data).</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> roles are the most-tested slice. Owner (accountable) vs Steward (executes) vs Custodian (IT) vs CDO (strategy) vs DPO (privacy).</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c1-lifecycle">
                    <div class="dd-name">Data lifecycle (6 stages)</div>
                    <div class="dd-def">The cradle-to-grave path of any data item: Create → Store → Use → Share → Archive → Destroy. Governance, security and quality are not stages — they apply at every stage.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A Horizon Europe grant application is <em>created</em> on the Funding &amp; Tenders Portal, <em>stored</em> in DG R&amp;I systems, <em>used</em> for evaluation and payment, <em>shared</em> with the project consortium, <em>archived</em> per Financial Regulation retention rules, then <em>destroyed</em> at the end of the retention window.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-master-data">
                    <div class="dd-name">Master data</div>
                    <div class="dd-def">The core business "nouns" shared across multiple systems: Customer, Product, Employee, Account. Slow-changing, high-value, must have one golden record.</div>
                    <div class="dd-ex"><strong>Ex.</strong> "Beneficiary" at the Commission — the same legal entity (a university, an SME) is referenced across Horizon Europe, Erasmus+, and EAFRD. MDM keeps its PIC (Participant Identification Code) consistent across all DGs.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-reference-data">
                    <div class="dd-name">Reference data</div>
                    <div class="dd-def">Controlled code lists used to classify or qualify other data — country codes, currency codes, status enums. Smaller and more stable than master data.</div>
                    <div class="dd-ex"><strong>Ex.</strong> ISO 3166 country codes ("BE", "FR", "DE") in beneficiary addresses. NUTS region codes (Eurostat) classifying cohesion-policy spending. CPV codes classifying procurement notices on TED.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-metadata">
                    <div class="dd-name">Metadata</div>
                    <div class="dd-def">Data about data. Three flavours: <strong>technical</strong> (schema, types, sizes), <strong>business</strong> (definitions, owners, glossary), <strong>operational</strong> (load times, row counts, freshness).</div>
                    <div class="dd-ex"><strong>Ex.</strong> The column <code>beneficiary.legal_status</code> has metadata: type=VARCHAR(20) (technical), "Public body / SME / Research org / NGO — drives funding rate" (business), last refreshed 2026-04-25 02:14 UTC (operational).</div>
                  </div>

                  <div class="dd-term" id="dd-c1-lineage">
                    <div class="dd-name">Lineage</div>
                    <div class="dd-def">The end-to-end map of where a piece of data came from and every transformation it went through. Critical for trust, debugging, and Reg 2018/1725 audit.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A Eurostat unemployment figure traces back to: national statistical-office submission → SDMX validation → seasonal adjustment → aggregation → Eurobase publication. When a journalist queries it, every transformation can be shown. Tools: OpenLineage, Marquez, Microsoft Purview.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-stewardship">
                    <div class="dd-name">Stewardship</div>
                    <div class="dd-def">The day-to-day practice of caring for data in a defined domain — fixing quality issues, maintaining definitions, approving access, enforcing standards.</div>
                    <div class="dd-ex"><strong>Ex.</strong> The "Beneficiary" domain steward in DG R&amp;I owns the definition of "active beneficiary", reviews quality dashboards on the participant register, and signs off on schema changes to the PIC.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-owner">
                    <div class="dd-name">Owner (Data Owner)</div>
                    <div class="dd-def"><strong>Accountable</strong> for a data domain — decides who can access it, what it's used for, retention rules. Usually a senior business person, not IT.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A Head of Unit in DG SANTE is the Owner of "Pharmacovigilance Data" — she signs the access request when EMA needs a new feed, even though DG DIGIT's DBAs actually grant the SQL access.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-steward">
                    <div class="dd-name">Steward (Data Steward)</div>
                    <div class="dd-def"><strong>Executes</strong> the rules the Owner sets. Maintains quality, glossary, lineage, and resolves day-to-day data issues. Operational, hands-on.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A data analyst in DG REGIO who flags 1 200 cohesion-fund payment records with malformed beneficiary IDs, fixes the validation rule with the IT team, and re-runs the load.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-custodian">
                    <div class="dd-name">Custodian (Data Custodian)</div>
                    <div class="dd-def">The <strong>IT-operational</strong> role — runs the database, applies backups, manages the storage, executes the access grants. Cares about uptime and security plumbing, not the data's meaning.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A DBA at DG DIGIT who restores the CORDIS database from snapshot after an outage, or applies the AES-256 encryption-at-rest setting on a production tablespace.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-cdo">
                    <div class="dd-name">CDO (Chief Data Officer)</div>
                    <div class="dd-def">Executive responsible for data <strong>strategy</strong>: enterprise data vision, governance program, ROI on data initiatives. Reports to CEO/COO. Different from CIO (IT systems) and CTO (technology).</div>
                    <div class="dd-ex"><strong>Ex.</strong> The Commission has a CDO since 2020, driving the "data-driven Commission" agenda — e.g. consolidating beneficiary data across DG R&amp;I, DG EAC and DG REGIO into one Single Beneficiary View, with a multi-year roadmap and College-level KPIs.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-dpo">
                    <div class="dd-name">DPO (Data Protection Officer)</div>
                    <div class="dd-def">Mandated independent advisor on privacy compliance. For EU institutions, the legal basis is <strong>Reg 2018/1725 Art 43</strong> (not GDPR Art 37) — and the supervisor is the <strong>EDPS</strong>, not a national DPA.</div>
                    <div class="dd-ex"><strong>Ex.</strong> The Commission's DPO reviews the DPIA for a new OLAF fraud-detection AI before go-live, and is the named contact for any access request from a citizen.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-iso8000">
                    <div class="dd-name">ISO 8000</div>
                    <div class="dd-def">International standard family for <strong>data quality</strong>, with a strong focus on master-data quality and exchange. Defines syntactic, semantic and pragmatic quality dimensions.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A Member State exchanging master-data records with the Commission (e.g. agricultural land parcels for CAP) can claim "ISO 8000-110 compliant" — each record carries its own quality metadata (provenance, validation status), so the receiving DG knows exactly what it's ingesting.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-iso25012">
                    <div class="dd-name">ISO/IEC 25012</div>
                    <div class="dd-def">Defines <strong>15 data-quality characteristics</strong> grouped into inherent (accuracy, completeness, consistency, credibility, currentness) and system-dependent (availability, portability, recoverability) plus shared (accessibility, compliance, confidentiality, efficiency, precision, traceability, understandability).</div>
                    <div class="dd-ex"><strong>Ex.</strong> When DG R&amp;I scores its beneficiary register, "accuracy" = % of legal entities matching the national business register; "currentness" = max age of an address change before the PIC is flagged stale.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-silo">
                    <div class="dd-name">Data silo</div>
                    <div class="dd-def">A dataset locked inside one team or system, invisible to the rest of the organisation. Causes duplicated work, inconsistent definitions, missed insight.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A spreadsheet in one DG unit tracking infringement cases that no other DG can query — silo. Fix: expose via a Commission-internal API or load into the central data lake.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-dataops">
                    <div class="dd-name">DataOps</div>
                    <div class="dd-def">CI/CD principles applied to data pipelines: version-controlled SQL/transforms, automated testing, monitored deployments, fast iteration. Inspired by DevOps.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A CAP payment calculation lives in Git, gets tested on a sample dataset by the CI pipeline on each pull request, and only deploys to production after green checks.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-mesh">
                    <div class="dd-name">Data mesh</div>
                    <div class="dd-def"><strong>Decentralised</strong> ownership of data: each business domain owns its data products end-to-end, instead of a central data team being a bottleneck. Four principles: domain ownership · data-as-a-product · self-serve platform · federated governance.</div>
                    <div class="dd-ex"><strong>Ex.</strong> Instead of one central Commission data team being a bottleneck, DG REGIO publishes a "cohesion-fund payments" data product with its own SLA, schema and steward — DG ECFIN consumes it like a product for macroeconomic analysis.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-fabric">
                    <div class="dd-name">Data fabric</div>
                    <div class="dd-def">A <strong>metadata-driven integration layer</strong> that uses active metadata + AI to auto-discover, connect, and orchestrate data across silos. Less about org structure (data mesh) than about technology glue.</div>
                    <div class="dd-ex"><strong>Ex.</strong> Microsoft Purview / Talend Data Fabric scans every database across the Commission, catalogues columns, auto-detects PII, and lets analysts query across them with one semantic layer — aligned with the Common European Data Spaces strategy.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-contract">
                    <div class="dd-name">Data contract</div>
                    <div class="dd-def">A formal, version-controlled agreement between a data <strong>producer</strong> and its <strong>consumers</strong>: schema, freshness, quality SLAs, breaking-change policy.</div>
                    <div class="dd-ex"><strong>Ex.</strong> Eurostat commits: "the GDP nowcast dataset is published by the 15th of every month, in this SDMX schema, with at most 0.2% revisions, and we'll give 60 days notice before any breaking change." Downstream DGs and external researchers code against that contract.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-vector-db">
                    <div class="dd-name">Vector database</div>
                    <div class="dd-def">A database optimised for storing and querying <strong>embeddings</strong> — high-dimensional numeric vectors representing text, images or other unstructured content. Powers semantic search and RAG (Retrieval-Augmented Generation).</div>
                    <div class="dd-ex"><strong>Ex.</strong> Pinecone, Weaviate, pgvector (PostgreSQL extension), Azure AI Search. The Commission could embed the entire EUR-Lex corpus and let policy officers ask "which acts limit biometric ID in public spaces?" in natural language.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-synthetic">
                    <div class="dd-name">Synthetic data</div>
                    <div class="dd-def">Artificially generated data that mimics the statistical properties of a real dataset without containing real records. Useful for testing, training models, and sharing without privacy exposure.</div>
                    <div class="dd-ex"><strong>Ex.</strong> A DG generates 100 000 fake beneficiary records (model trained on real distributions) so an external contractor can develop a new portal without ever touching real personal data. Allowed by AI Act, not mandated.</div>
                  </div>

                  <div class="dd-term" id="dd-c1-federated">
                    <div class="dd-name">Federated learning</div>
                    <div class="dd-def">Train a machine-learning model across multiple data holders <strong>without centralising the data</strong>: each holder trains locally, only model updates (gradients) are aggregated. Strong privacy and data-sovereignty posture.</div>
                    <div class="dd-ex"><strong>Ex.</strong> Several Member State tax administrations jointly train a VAT-fraud detection model — each MS's tax data stays in its own jurisdiction, only the model weights cross borders.</div>
                  </div>

                </div>
              </div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">Ch 2</div>
            <div class="tl-name">Data Collection &amp; Acquisition</div>
            <div class="tl-tag">Sources · methods · sampling · validation · ethics</div>
            <div class="tl-body">
              <div class="tl-context">
                Every downstream quality problem starts (or is prevented) at collection. The job is to gather the right data, from trustworthy sources, under a consent and validation regime that survives audit.
              </div>
              <div class="tl-viz"><svg viewBox="0 0 600 195" class="tl-svg" xmlns="http://www.w3.org/2000/svg">

                <rect x="290" y="70" width="130" height="24" rx="5" fill="#E1F5EE" stroke="#5DCAA5"/><text x="355" y="86" text-anchor="middle" font-size="10" fill="#1a1a18">Streaming (Kafka)</text>

                <rect x="430" y="90" width="160" height="22" rx="4" fill="#FAEEDA" stroke="#854F0B"/><text x="510" y="105" text-anchor="middle" font-size="10" fill="#1a1a18">Systematic — every Nth</text>
                <rect x="430" y="114" width="160" height="22" rx="4" fill="#FAEEDA" stroke="#854F0B"/><text x="510" y="129" text-anchor="middle" font-size="10" fill="#1a1a18">Cluster — whole groups</text>

              </svg><div class="tl-vcap">Stratified ≠ systematic. Anonymisation is a privacy control, not a validation step.</div></div>
              <dl>
                <dt>Types of sources</dt><dd><strong>Internal vs external</strong> (CRM/ERP vs third-party feeds). <a class="term-link" data-target="dd-c2-structured">Structured</a> (RDB, tabular) vs <a class="term-link" data-target="dd-c2-semi">semi-structured</a> (JSON, XML, logs) vs <a class="term-link" data-target="dd-c2-unstructured">unstructured</a> (text, images, audio, video). <a class="term-link" data-target="dd-c2-streaming">Streaming</a> vs <a class="term-link" data-target="dd-c2-batch">batch</a>.</dd>
                <dt>Practical examples</dt><dd>Operational systems (CRM, ERP), IoT sensors, clickstream logs, third-party APIs, social media, surveys, censuses, open data portals.</dd>
                <dt>Collection methods</dt><dd><a class="term-link" data-target="dd-c2-active">Active</a> — surveys, interviews, experiments (subject aware). <a class="term-link" data-target="dd-c2-passive">Passive</a> — sensors, logs, web analytics, scraping (subject often unaware — ethics!). <a class="term-link" data-target="dd-c2-integration-collect">Integration</a> — API ingestion, ETL feeds, CDC from source systems.</dd>
                <dt>Data sampling</dt><dd>When the population is too big: <a class="term-link" data-target="dd-c2-random">random</a> (equal chance) · <a class="term-link" data-target="dd-c2-stratified">stratified</a> (preserves group proportions) · <a class="term-link" data-target="dd-c2-systematic">systematic</a> (every Nth) · <a class="term-link" data-target="dd-c2-cluster">cluster</a> (sample whole groups). Sample size depends on confidence level + margin of error.</dd>
                <dt>Data validation</dt><dd>Syntax (type, format, regex) · domain (enums, ranges) · <a class="term-link" data-target="dd-c2-referential">referential integrity</a> (FK exists) · <a class="term-link" data-target="dd-c2-crossfield">cross-field</a> (end_date ≥ start_date) · business rules (order total = sum of lines). Validate <em>at ingestion</em>, not later — cost compounds.</dd>
                <dt>Best practices</dt><dd>Document <a class="term-link" data-target="dd-c2-provenance">provenance</a> (source, timestamp, owner) · log every ingestion · version schemas · validate at boundary · isolate raw vs curated zones.</dd>
                <dt>Challenges</dt><dd><a class="term-link" data-target="dd-c2-schema-drift">Source drift</a> (schema changes unannounced) · access rights · consent tracking · latency vs completeness tradeoff · volume.</dd>
                <dt>Ethics</dt><dd>Consent (GDPR Art 6 lawful basis) · purpose limitation · minimisation · bias mitigation (AI Act Art 10) · fair use · transparency. Distinct privacy control: <a class="term-link" data-target="dd-c2-anonymisation">anonymisation</a>.</dd>
              </dl>
              <div class="tl-exam"><strong>Exam signal:</strong> sampling types are classic MCQ fodder. Stratified ≠ systematic. Validation trap: anonymisation is not a validation step — it's a privacy control.</div>
              <div class="tl-deep">
                <div class="dd-toggle"><span class="dd-chev">▸</span>Deep dive — definitions &amp; examples</div>
                <div class="dd-body">

                  <div class="dd-term" id="dd-c2-structured"><div class="dd-name">Structured data</div><div class="dd-def">Data with a fixed schema — rows and columns, predefined types. Lives natively in relational databases. Easy to query in SQL.</div><div class="dd-ex"><strong>Ex.</strong> A CORDIS table of Horizon Europe projects: project_id, acronym, start_date, total_cost, coordinator_country. Queryable in seconds with a SQL <code>WHERE</code> clause.</div></div>

                  <div class="dd-term" id="dd-c2-semi"><div class="dd-name">Semi-structured data</div><div class="dd-def">Has tags or markers separating fields, but no rigid schema — fields can be missing, nested, or vary per record. JSON, XML, YAML, log lines.</div><div class="dd-ex"><strong>Ex.</strong> A Funding &amp; Tenders Portal API returns a project as JSON with nested arrays of partners and work-packages — different projects can have different optional fields.</div></div>

                  <div class="dd-term" id="dd-c2-unstructured"><div class="dd-name">Unstructured data</div><div class="dd-def">Free-form content with no machine-readable schema: prose, PDFs, scanned documents, images, audio, video. Needs OCR / NLP / vision models to extract structure.</div><div class="dd-ex"><strong>Ex.</strong> A scanned PDF of a Court of Justice ruling, or a citizen complaint email to DG JUST. Becomes useful only after OCR + entity extraction.</div></div>

                  <div class="dd-term" id="dd-c2-streaming"><div class="dd-name">Streaming ingestion</div><div class="dd-def">Data flows continuously as it's produced; processed event-by-event with millisecond-to-second latency. Opposite of batch.</div><div class="dd-ex"><strong>Ex.</strong> Each border-crossing scan from a Frontex eIDAS gate streams to the central system in real time so risk scoring happens before the next traveller approaches.</div></div>

                  <div class="dd-term" id="dd-c2-batch"><div class="dd-name">Batch ingestion</div><div class="dd-def">Data is collected and processed in periodic chunks — every hour, every night, every month. Lower complexity, higher latency.</div><div class="dd-ex"><strong>Ex.</strong> Eurostat ingests Member State statistical submissions in monthly batches via SDMX, then validates and publishes in a scheduled pipeline.</div></div>

                  <div class="dd-term" id="dd-c2-active"><div class="dd-name">Active collection</div><div class="dd-def">Data is gathered with the subject's awareness and (usually) cooperation: surveys, interviews, structured experiments, direct submissions. GDPR consent paths are clearest here.</div><div class="dd-ex"><strong>Ex.</strong> Eurobarometer surveys explicitly ask EU citizens for their views — respondents know they're contributing data to the Commission.</div></div>

                  <div class="dd-term" id="dd-c2-passive"><div class="dd-name">Passive collection</div><div class="dd-def">Data is captured as a side-effect of activity, often without the subject's active engagement: server logs, sensor telemetry, web analytics. Ethics + lawful-basis questions are sharpest here.</div><div class="dd-ex"><strong>Ex.</strong> EU Login captures browser fingerprints and IP geolocation for fraud detection — passive, requires explicit transparency under Reg 2018/1725.</div></div>

                  <div class="dd-term" id="dd-c2-integration-collect"><div class="dd-name">Integration collection</div><div class="dd-def">Pulling data from another system through a programmatic interface: API calls, ETL feeds, Change Data Capture. The subject is a system, not a person.</div><div class="dd-ex"><strong>Ex.</strong> DG REGIO ingests cohesion-fund payment records from each Member State's managing authority via a standardised XML web service.</div></div>

                  <div class="dd-term" id="dd-c2-random"><div class="dd-name">Random sampling</div><div class="dd-def">Every member of the population has the same probability of being selected. Simplest design, unbiased on average — but small subgroups can be under-represented by chance.</div><div class="dd-ex"><strong>Ex.</strong> An OLAF auditor randomly picks 200 of 50 000 grant claims to check — every claim had an equal selection chance.</div></div>

                  <div class="dd-term" id="dd-c2-stratified"><div class="dd-name">Stratified sampling</div><div class="dd-def">The population is divided into groups (strata) and a fixed share is sampled from each. <strong>Preserves the proportion</strong> of each group in the sample — guarantees small subgroups are represented.</div><div class="dd-ex"><strong>Ex.</strong> A Eurostat survey on energy poverty samples X% from each NUTS 2 region so rural areas don't get drowned out by Île-de-France or Lombardia.</div></div>

                  <div class="dd-term" id="dd-c2-systematic"><div class="dd-name">Systematic sampling</div><div class="dd-def">Pick every <em>k</em>-th element from an ordered list (start at a random position). Simple to operate; <strong>biased if the list has a hidden periodicity</strong>.</div><div class="dd-ex"><strong>Ex.</strong> Audit every 100th customs declaration on the TARIC log. Risk: if every 100th item is a Monday-morning record, you systematically miss week-end patterns.</div></div>

                  <div class="dd-term" id="dd-c2-cluster"><div class="dd-name">Cluster sampling</div><div class="dd-def">Divide the population into clusters, randomly pick whole clusters, sample everything inside. Cheaper logistics; less precise than stratified for the same sample size.</div><div class="dd-ex"><strong>Ex.</strong> Inspect 5 Member States chosen at random and audit every CAP beneficiary in those countries — much cheaper than visiting all 27.</div></div>

                  <div class="dd-term" id="dd-c2-referential"><div class="dd-name">Referential integrity</div><div class="dd-def">A foreign-key value must point to an existing primary-key value. Catches "orphan" rows that reference something that doesn't exist.</div><div class="dd-ex"><strong>Ex.</strong> Reject a Horizon Europe payment row whose <code>beneficiary_id</code> does not match any record in the PIC register.</div></div>

                  <div class="dd-term" id="dd-c2-crossfield"><div class="dd-name">Cross-field validation</div><div class="dd-def">A rule that checks the consistency of <em>multiple fields together</em> — not each field in isolation.</div><div class="dd-ex"><strong>Ex.</strong> A grant period must satisfy <code>end_date ≥ start_date</code>; a beneficiary's "SME" status must match an annual turnover ≤ €50M.</div></div>

                  <div class="dd-term" id="dd-c2-provenance"><div class="dd-name">Provenance</div><div class="dd-def">The recorded origin of data — who produced it, when, from what source, under which transformations. Foundation for trust, audit, and lineage.</div><div class="dd-ex"><strong>Ex.</strong> Every Eurostat dataset publishes provenance metadata: which national statistical office submitted it, version, methodology, last revision date.</div></div>

                  <div class="dd-term" id="dd-c2-schema-drift"><div class="dd-name">Schema / source drift</div><div class="dd-def">When an upstream system changes its schema (new field, renamed column, new code value) without warning the downstream consumers — pipelines silently break or corrupt.</div><div class="dd-ex"><strong>Ex.</strong> A Member State customs system adds a new "EORI status" code; the Commission's ingestion job ignores it and miscategorises 12 000 declarations until someone notices.</div></div>

                  <div class="dd-term" id="dd-c2-anonymisation"><div class="dd-name">Anonymisation</div><div class="dd-def">Irreversibly transforming personal data so the subject can no longer be identified, even in combination with other data. Different from pseudonymisation (reversible with a key) — anonymised data falls <em>outside</em> GDPR / Reg 2018/1725.</div><div class="dd-ex"><strong>Ex.</strong> Aggregating Erasmus+ mobility records to "X students from country Y to country Z in year N" — no individual can be re-identified. <strong>Trap:</strong> anonymisation is a <em>privacy</em> control, not a <em>validation</em> step.</div></div>

                </div>
              </div>
            </div>
          </div>

          <div class="tl-card">
            <div class="tl-year">Ch 3</div>
            <div class="tl-name">Data Processing &amp; Integration</div>
            <div class="tl-tag">Cleaning · transformation · ETL/ELT · streaming · pipelines</div>
            <div class="tl-body">
              <div class="tl-context">
                Raw data becomes usable here. Three goals: standardise (same format), reconcile (same meaning across sources), enrich (add derived signal). Every transformation is documented lineage.
              </div>
